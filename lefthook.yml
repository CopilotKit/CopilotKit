output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  parallel: true
  commands:
    check-binaries:
      tags: binaries
      run: bash scripts/hooks/check-binaries.sh
    sync-lockfile:
      tags: lockfile
      glob: "**/package.json"
      run: pnpm i --lockfile-only
      stage_fixed: true
    lint-fix:
      tags: lint
      run: pnpm run lint && pnpm run format
      stage_fixed: true
    test-and-check-packages:
      tags: test-packages
      env:
        NX_TUI: "false"
      run: pnpm run test && pnpm run check:packages

commit-msg:
  commands:
    commitlint:
      tags: commitlint
      run: pnpm commitlint --edit {1}
