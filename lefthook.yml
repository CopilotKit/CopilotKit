output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  piped: true
  commands:
    sync-lockfile:
      tags: lockfile
      priority: 1
      run: pnpm i --lockfile-only
      stage_fixed: true
    lint-fix:
      tags: lint
      priority: 2
      run: pnpm run lint --fix && pnpm run format
      stage_fixed: true
    test-and-check-packages:
      tags: test-packages
      priority: 3
      env:
        NX_TUI: "false"
      run: pnpm run test && pnpm run check:packages

commit-msg:
  commands:
    commitlint:
      tags: commitlint
      run: pnpm commitlint --edit {1}
