output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  parallel: true
  commands:
    check-binaries:
      tags: binaries
      run: bash scripts/hooks/check-binaries.sh
    sync-lockfile:
      tags: lockfile
      glob: "**/package.json"
      run: pnpm i --lockfile-only
      stage_fixed: true
    lint-fix:
      tags: lint
      run: pnpm run lint && pnpm run format
      stage_fixed: true
    test-and-check-packages:
      tags: test-packages
      env:
        NX_TUI: "false"
      run: pnpm run test && pnpm run check:packages

    check-plugin-skills:
      tags: plugin-skills
      glob: "{packages/*/skills/**,skills/runtime/**,skills/react-core/**,skills/a2ui-renderer/**,scripts/sync-plugin-skills.ts,.claude-plugin/**}"
      run: pnpm check:plugin-skills
      fail_text: |
        Plugin skill mirror is out of sync with the Intent source.
        Run: pnpm sync:plugin-skills
        Then stage the changes and re-commit.

commit-msg:
  commands:
    commitlint:
      tags: commitlint
      run: pnpm commitlint --edit {1}
