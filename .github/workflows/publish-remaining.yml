name: release / publish-remaining-1.57.4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Publish remaining packages
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /home/runner/work/_temp/.npmrc
        run: |
          echo "npm version: $(npx --yes npm@11.15.0 --version)"
          echo "registry: $(npx --yes npm@11.15.0 config get registry)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+SET}"
          PACKAGES=(
            agentcore-runner
            core
            react-core
            react-native
            react-textarea
            react-ui
            runtime
            runtime-client-gql
            sdk-js
            shared
            sqlite-runner
            voice
            vue
            web-inspector
          )
          for pkg in "${PACKAGES[@]}"; do
            DIR="packages/$pkg"
            NAME=$(jq -r '.name' "$DIR/package.json")
            VERSION=$(jq -r '.version' "$DIR/package.json")
            echo "=== Publishing $NAME@$VERSION ==="
            cd "$DIR"
            pnpm pack
            TARBALL="${NAME//@/}"
            TARBALL="${TARBALL////-}-${VERSION}.tgz"
            npx --yes npm@11.15.0 publish "$TARBALL" --tag latest --access public --registry https://registry.npmjs.org
            cd /home/runner/work/CopilotKit/CopilotKit
            echo "Done: $NAME@$VERSION"
            echo ""
          done
