name: static / quality

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NX_VERBOSE_LOGGING: true
  NX_CI_EXECUTION_ID: ${{ github.head_ref }}-${{ github.sha }}-${{ github.run_attempt }}
  NX_CI_EXECUTION_ENV: "Static Quality"

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR-changed files for formatting
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          # Scope to files changed between the PR's merge-base and HEAD so
          # advances on main don't drag unrelated files into this PR.
          # Restrict to oxfmt-supported extensions so oxfmt never errors on
          # an unknown target.
          git diff --name-only --diff-filter=ACMR "$base_sha"...HEAD -- \
            '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' \
            '*.json' '*.jsonc' '*.json5' \
            '*.md' '*.mdx' \
            '*.css' '*.yml' '*.yaml' '*.html' '*.vue' \
            > .pr-format-files.txt
          : > .pr-format-files.existing.txt
          while IFS= read -r f; do
            [ -n "$f" ] && [ -f "$f" ] && printf '%s\n' "$f" >> .pr-format-files.existing.txt
          done < .pr-format-files.txt
          count=$(wc -l < .pr-format-files.existing.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "PR-changed format candidates: $count"
          cat .pr-format-files.existing.txt

      - name: Run formatter (check on push, fix on PR)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ steps.changed.outputs.count }}" = "0" ]; then
              echo "No formattable files changed in this PR — skipping oxfmt."
              exit 0
            fi
            if ! xargs -a .pr-format-files.existing.txt pnpm exec oxfmt --write; then
              echo "::warning::Formatter exited with error — auto-fix may be incomplete"
            fi
            if [ -n "$(git diff --name-only)" ]; then
              echo "format_fixed=true" >> $GITHUB_ENV
            fi
            xargs -a .pr-format-files.existing.txt pnpm exec oxfmt --check
          else
            pnpm run check-format
          fi

      - name: Commit formatting fixes
        if: >-
          env.format_fixed == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          if [ -z "$(git diff --name-only)" ]; then
            echo "No formatting changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --name-only -z | xargs -0 git add
          git commit -m "style: auto-fix formatting"
          git push

  oxlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run oxlint check
        run: pnpm run lint

  package-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Nx Cloud environment
        run: |
          echo "NX_CI_EXECUTION_ID=${{ github.run_id }}-${{ github.run_attempt }}-quality-packages" >> $GITHUB_ENV
          echo "NX_CLOUD_NO_TIMEOUTS=true" >> $GITHUB_ENV
          echo "NX_CLOUD_DISTRIBUTED_EXECUTION=false" >> $GITHUB_ENV
          echo "NX_NO_CLOUD=true" >> $GITHUB_ENV

      - name: Run publint and attw
        run: pnpm run check:packages

  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: |
          # Skip merge commits. GitHub's "Create a merge commit" option takes
          # the message from the PR body, which can contain markdown lists
          # that parse as additional (empty) commit subjects and fail
          # subject-empty / type-empty — see commit 5ed233f01.
          parents=$(git rev-list --parents -n 1 HEAD | awk '{print NF - 1}')
          if [ "$parents" -gt 1 ]; then
            echo "HEAD is a merge commit ($parents parents) — skipping commitlint."
            exit 0
          fi
          npx commitlint --last --verbose

      - name: Validate PR commits with commitlint
        id: commitlint
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose 2>&1 | tee /tmp/commitlint-output.txt

      - name: Post fix suggestion on failure
        if: github.event_name == 'pull_request' && steps.commitlint.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/commitlint-output.txt', 'utf8');
            const body = `### ❌ Commitlint failed\n\nCommit messages must follow [Conventional Commits](https://www.conventionalcommits.org/).\n\n**Valid prefixes:** \`feat:\`, \`fix:\`, \`docs:\`, \`style:\`, \`refactor:\`, \`test:\`, \`chore:\`, \`ci:\`, \`perf:\`, \`build:\`\n\n**Example:** \`feat: add user authentication\`\n\n<details><summary>Full output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>\n\nTo fix, amend your commit messages:\n\`\`\`bash\ngit rebase -i HEAD~N  # N = number of commits to fix\n# Change 'pick' to 'reword' for bad commits\n\`\`\``;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Commitlint failed'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if commitlint failed
        if: github.event_name == 'pull_request' && steps.commitlint.outcome == 'failure'
        run: exit 1
