name: static / quality

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"
      - ".github/workflows/demos_preview.yml"
      - ".github/workflows/release.yml"
      - "packages/v1/**/package.json"
      - "packages/v1/**/CHANGELOG.md"
      - ".changeset/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"
      - ".changeset/**"

jobs:
  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "quality-prettier"
          install-uv: "true"

      - name: Run Prettier check
        run: pnpm run check-prettier

  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "quality-eslint"
          install-uv: "true"

      - name: Run ESLint check
        run: pnpm run lint

  package-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "quality-packages"
          install-uv: "true"

      - name: Run publint and attw
        run: pnpm run check:packages
