name: Starter Smoke Tests

on:
  schedule:
    # Every 6 hours — catches floating dep breakage
    - cron: "0 */6 * * *"
  workflow_run:
    workflows: ["publish / release"]
    types: [completed]
  pull_request:
    paths:
      - "examples/integrations/**"
      - ".github/workflows/starter-smoke.yml"
  workflow_dispatch: {}

jobs:
  starter-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        starter:
          - langgraph-python
          - mastra
          - langgraph-js
          - crewai-crews
          - pydantic-ai
          - adk
          - agno
          - llamaindex
          - langgraph-fastapi
          - strands-python
          - ms-agent-framework-python
          - ms-agent-framework-dotnet
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Run starter smoke tests
        working-directory: examples/integrations/${{ matrix.starter }}
        env:
          STARTER: ${{ matrix.starter }}
        run: |
          docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from tests

      - name: Tear down
        if: always()
        working-directory: examples/integrations/${{ matrix.starter }}
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: starter-smoke-${{ matrix.starter }}
          path: showcase/tests/test-results/
          retention-days: 7

      - name: Alert Slack on failure
        if: failure() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_OSS_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Starter smoke test failing: *${{ matrix.starter }}*\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Create GitHub issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Drift] Starter smoke test failing: ${{ matrix.starter }}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'starter-drift',
              state: 'open',
            });
            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['starter-drift'],
                body: `The scheduled starter smoke test for \`${{ matrix.starter }}\` is failing.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis likely means a floating dependency update broke the starter. Check the test artifacts for details.`,
              });
            }
