            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"d7979eb7-2405-4aab-ad21-438f4a1b08af\", environmentId: \"b14919f4-6417-429f-848d-c6ae2201e04f\") }"}' \
