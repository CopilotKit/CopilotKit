name: release / pre

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "What to release"
        required: true
        type: choice
        options:
          - monorepo
          - angular
      suffix:
        description: "Version suffix (e.g. 'fix-user-issue'). Leave blank for timestamp."
        required: false
        type: string
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_VERBOSE_LOGGING: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      # No credential persistence needed: the build job only reads source.
      # Keeping credentials out of the artifact avoids leaking tokens.
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump prerelease versions
        env:
          INPUT_SCOPE: ${{ inputs.scope }}
          INPUT_SUFFIX: ${{ inputs.suffix }}
        run: |
          ARGS="--scope $INPUT_SCOPE"
          if [ -n "$INPUT_SUFFIX" ]; then
            ARGS="$ARGS --suffix $INPUT_SUFFIX"
          fi
          pnpm tsx scripts/release/bump-prerelease.ts $ARGS

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

      # Exclude node_modules and build caches from the artifact. Including
      # them produces ~6M files for this monorepo, which OOMs
      # upload-artifact's Node process at its 4GB heap limit during
      # enumeration (each pnpm symlink resolves to a separate entry, and
      # the action holds the full manifest in memory before streaming).
      # The publish job runs `pnpm install --frozen-lockfile` after
      # download to restore node_modules from pnpm-lock.yaml — mirrors
      # publish-release.yml.
      - name: Upload workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workspace
          path: |
            .
            !**/node_modules/**
            !**/.next/**
            !**/.turbo/**
            !**/.nx/**
          include-hidden-files: true
          retention-days: 1

  publish:
    needs: build
    # Delegate publish to the parametrized reusable workflow. npm's OIDC
    # trust binding uses the `job_workflow_ref` claim, which for a
    # reusable workflow resolves to the callee — so the existing trust
    # record on publish-release.yml @ CopilotKit/CopilotKit matches when
    # invoked from here. No second trusted publisher required.
    #
    # Input-name mapping at the with: boundary: the caller's
    # workflow_dispatch.inputs.dry_run (underscore, preserved for
    # backwards compatibility) maps to the callee's dry-run (hyphen,
    # matching publish-release.yml's schema). Independent keys in
    # independent namespaces.
    #
    # No secrets passed: NOTION_API_KEY is not needed for prereleases;
    # the callee declares it as optional.
    uses: ./.github/workflows/publish-release.yml
    with:
      scope: ${{ inputs.scope }}
      mode: prerelease
      dry-run: ${{ inputs.dry_run }}
      publish-script: prerelease.ts
