name: "Showcase: Validate"

on:
  pull_request:
    paths:
      - "showcase/**"
      - "examples/integrations/**/fixtures/**"
      - "scripts/doc-tests/fixtures/**"
  push:
    branches: [main]
    paths:
      - "showcase/**"
      - "examples/integrations/**/fixtures/**"
      - "scripts/doc-tests/fixtures/**"

concurrency:
  group: showcase-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Showcase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Verify lockfile is up to date
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Enforce e2e spec count (min 9 per package)
        run: |
          set -euo pipefail
          MIN=9
          failed=0
          found=0
          for dir in showcase/packages/*/tests/e2e/; do
            [ -d "$dir" ] || continue
            found=$((found + 1))
            count=$(find "$dir" -maxdepth 1 -name '*.spec.ts' | wc -l | tr -d ' ')
            pkg=$(echo "$dir" | awk -F/ '{print $3}')
            if [ "$count" -lt "$MIN" ]; then
              echo "::error file=$dir::Package '$pkg' has $count e2e spec(s); minimum required is $MIN"
              failed=1
            else
              echo "ok: $pkg has $count spec(s)"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No showcase/packages/*/tests/e2e/ directories found — baseline check cannot run"
            exit 1
          fi
          exit "$failed"

      - name: Run build pipeline tests
        working-directory: showcase/scripts
        run: npx vitest run

      - name: Validate manifests & generate registry
        working-directory: showcase/scripts
        run: npx tsx generate-registry.ts

      - name: Bundle demo content
        working-directory: showcase/scripts
        run: npx tsx bundle-demo-content.ts

      - name: Install showcase shell dependencies
        working-directory: showcase/shell
        run: npm install --ignore-scripts

      - name: Build showcase shell
        working-directory: showcase/shell
        run: npm run build

      - name: Notify Slack (failure)
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_OSS_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            { "text": ":x: *Showcase validate*: failed | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>" }
