name: "Showcase: Validate"

on:
  pull_request:
    paths:
      - "showcase/**"
      - "examples/integrations/**"
  push:
    branches: [main]
    paths:
      - "showcase/**"
      - "examples/integrations/**"

concurrency:
  group: showcase-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Showcase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Verify lockfile is up to date
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Enforce e2e spec count (min 9 per package)
        run: |
          set -euo pipefail
          shopt -s nullglob
          # MIN=9 is the baseline demo count (see BASELINE_DEMO_COUNT in
          # showcase/scripts/validate-parity.ts). Keep these in sync.
          MIN=9
          failed=0
          found=0
          for pkg_dir in showcase/packages/*/; do
            [ -d "$pkg_dir" ] || continue
            found=$((found + 1))
            pkg=$(basename "$pkg_dir")
            e2e_dir="${pkg_dir}tests/e2e/"
            if [ ! -d "$e2e_dir" ]; then
              echo "::error file=$pkg_dir::Package '$pkg' is missing tests/e2e/ directory (required for baseline e2e coverage)"
              failed=1
              continue
            fi
            # Capture `find` exit status directly: piping into `wc -l | tr -d ' '`
            # hides failures because `tr` always succeeds, defeating pipefail.
            find_output=$(find "$e2e_dir" -maxdepth 1 -type f -name '*.spec.ts') || {
              echo "::error file=$e2e_dir::find failed while enumerating specs for '$pkg'"
              exit 1
            }
            count=$(printf '%s\n' "$find_output" | grep -c . || true)
            if [ "$count" -lt "$MIN" ]; then
              echo "::error file=$e2e_dir::Package '$pkg' has $count e2e spec(s); minimum required is $MIN"
              failed=1
            else
              echo "ok: $pkg has $count spec(s)"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No showcase/packages/*/ directories found — baseline check cannot run"
            exit 1
          fi
          exit "$failed"

      - name: Run validate-parity (MUST checks gating)
        working-directory: showcase/scripts
        # MUST failures (missing manifest, missing src/app/demos dir) exit 1 and
        # fail the PR. SHOULD deviations print warnings and exit 0. See
        # showcase/scripts/validate-parity.ts for the full policy.
        run: npx tsx validate-parity.ts

      - name: Run validate-pins (ratchet)
        working-directory: showcase/scripts
        # --- Drift ratchet -------------------------------------------------
        # We cannot yet gate on FAIL=0 because there is a grandfathered
        # allowlist of pin drift (currently ~111 entries) that needs a
        # product decision (align showcase -> Dojo vs bump Dojo -> showcase)
        # before we can flip to strict gating.
        #
        # Until then, we ratchet: `fail-baseline.json` holds the last known
        # FAIL count, and this step compares the live count against it.
        #   - count >  baseline  => NEW drift introduced; fail CI.
        #   - count == baseline  => neutral; pass.
        #   - count <  baseline  => drift reduced; fail CI with an explicit
        #                           instruction to ratchet the baseline down
        #                           (so the number can never creep back up
        #                           silently).
        #
        # To adjust the baseline, edit
        # `showcase/scripts/fail-baseline.json` in the same PR.
        #
        # Reference: Notion "Bugs-Found-During-Blitz-Deferred-Not-Fixed"
        #   https://www.notion.so/3443aa38-1852-812f-b595-c5118dd68818
        #
        # TODO(showcase-drift): drive the baseline to zero; re-audit quarterly.
        # -------------------------------------------------------------------
        run: |
          set -euo pipefail
          baseline=$(node -e "console.log(require('./fail-baseline.json').validatePinsFailCount)")
          # validate-pins prints '[FAIL] ...' to stderr and a 'Summary: ... FAIL=N'
          # line to stdout. It exits 1 whenever FAIL>0, so do not let pipefail
          # short-circuit the pipeline — we want the summary even on non-zero.
          output=$(npx tsx validate-pins.ts 2>&1 || true)
          printf '%s\n' "$output"
          actual=$(printf '%s\n' "$output" | awk -F'FAIL=' '/^Summary:/ {print $2+0; exit}')
          if [ -z "${actual:-}" ]; then
            echo "::error::Could not parse validate-pins Summary line"
            exit 1
          fi
          echo "validate-pins FAIL count: actual=$actual baseline=$baseline"
          if [ "$actual" -gt "$baseline" ]; then
            echo "::error::Pin drift increased: $actual FAIL(s) vs baseline $baseline. Fix the new drift or, with explicit sign-off, update showcase/scripts/fail-baseline.json."
            exit 1
          fi
          if [ "$actual" -lt "$baseline" ]; then
            echo "::error::Pin drift decreased: $actual FAIL(s) vs baseline $baseline. Ratchet down the baseline in showcase/scripts/fail-baseline.json to $actual."
            exit 1
          fi
          echo "Pin drift unchanged at baseline ($baseline)."

      - name: Run build pipeline tests
        working-directory: showcase/scripts
        # Use pnpm to resolve the workspace-installed vitest (pinned via
        # pnpm-lock.yaml) rather than `npx`, which could fetch a different
        # version on a registry cache miss.
        run: pnpm exec vitest run

      - name: Validate manifests & generate registry
        working-directory: showcase/scripts
        run: npx tsx generate-registry.ts

      - name: Bundle demo content
        working-directory: showcase/scripts
        run: npx tsx bundle-demo-content.ts

      - name: Install showcase shell dependencies
        working-directory: showcase/shell
        # `showcase/shell` is NOT a pnpm workspace member (see pnpm-workspace.yaml)
        # and ships its own `package-lock.json`. Use `npm ci` to get a
        # reproducible install; `npm install` would re-resolve ranges.
        run: npm ci --ignore-scripts

      - name: Build showcase shell
        working-directory: showcase/shell
        run: npm run build

      # NOTE: Slack failure alert only fires on `push` (i.e. main-branch
      # merges) by design. PR failures already surface in the PR checks UI
      # and the PR author's inbox, and we don't want PR-author noise
      # pinging the OSS alerts channel. Tradeoff: a broken PR that sneaks
      # past review won't alert Slack until after merge.
      - name: Notify Slack (failure)
        if: failure() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_OSS_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            { "text": ":x: *Showcase validate*: failed | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>" }
