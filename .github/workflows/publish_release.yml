name: publish / release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  NX_VERBOSE_LOGGING: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: pnpm i

      - name: Check if in prerelease mode
        id: check-pre
        run: |
          if [ -f ".changeset/pre.json" ]; then
            MODE=$(node -p "require('./.changeset/pre.json').mode")
            if [ "$MODE" = "pre" ]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release-packages
          commit: "chore(release): version packages"
          title: ${{ steps.check-pre.outputs.prerelease == 'true' && 'chore(release): version packages (next)' || 'chore(release): version packages' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get new version
        id: new-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "version=$(node -p "require('./packages/react-core/package.json').version")" >> "$GITHUB_OUTPUT"

      # For full releases: create git tag, GitHub release, and PR to re-enter pre mode
      - name: Create git tag
        if: steps.changesets.outputs.published == 'true' && steps.check-pre.outputs.prerelease == 'false'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -a "v${{ steps.new-version.outputs.version }}" -m "Release v${{ steps.new-version.outputs.version }}"
          git push origin "v${{ steps.new-version.outputs.version }}"

      - name: Generate changelog
        id: changelog
        if: steps.changesets.outputs.published == 'true' && steps.check-pre.outputs.prerelease == 'false'
        run: |
          node -p "require('./scripts/release/generate-changelog')('${{ steps.new-version.outputs.version }}')" > changelog.txt

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true' && steps.check-pre.outputs.prerelease == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.new-version.outputs.version }}" \
            --title "v${{ steps.new-version.outputs.version }}" \
            --notes-file changelog.txt

      - name: Re-enter pre mode
        if: steps.changesets.outputs.published == 'true' && steps.check-pre.outputs.prerelease == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.new-version.outputs.version }}"
          BRANCH="chore/re-enter-pre-mode-v${VERSION}"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git checkout -b "$BRANCH"
          pnpm changeset pre enter next
          git add .changeset/pre.json
          git commit -m "chore(release): re-enter pre mode after v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create --base main --head "$BRANCH" \
            --title "chore(release): re-enter pre mode after v${VERSION}" \
            --body "Automatically re-enters pre-release mode (next) after publishing v${VERSION}."
