name: test / runtime-servers

on:
  push:
    branches: [main]
    paths:
      - "packages/v2/runtime/**"
      - "examples/v2/runtime/**"
      - ".github/workflows/test_runtime-servers.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/v2/runtime/**"
      - "examples/v2/runtime/**"
      - ".github/workflows/test_runtime-servers.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "main"
        type: string

jobs:
  node:
    name: "servers / node"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm nx run @copilotkitnext/runtime:build

      - name: Run Node.js server integration tests
        working-directory: packages/v2/runtime
        run: npx vitest run src/__tests__/integration/node-servers.integration.test.ts

  bun:
    name: "servers / bun"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm nx run @copilotkitnext/runtime:build

      - name: Run Bun server integration tests
        working-directory: packages/v2/runtime
        run: bun test src/__tests__/integration/bun/bun-servers.integration.test.ts

  deno:
    name: "servers / deno"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.13.1"

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm nx run @copilotkitnext/runtime:build

      - name: Run Deno server integration tests
        working-directory: packages/v2/runtime
        run: deno test --allow-net --allow-read --allow-env src/__tests__/integration/deno/deno-servers.integration.test.ts
