name: test / integration

on:
  push:
    branches: [main]
    paths:
      - "packages/v2/runtime/**"
      - "examples/v2/runtime/**"
      - ".github/workflows/test_runtime-servers.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/v2/runtime/**"
      - "examples/v2/runtime/**"
      - ".github/workflows/test_runtime-servers.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "main"
        type: string

jobs:
  node:
    name: "runtime / node"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "integration-node"

      - name: Build runtime
        run: pnpm nx run @copilotkitnext/runtime:build

      - name: Run Node.js server integration tests
        working-directory: packages/v2/runtime
        run: npx vitest run src/__tests__/integration/node-servers.integration.test.ts

  bun:
    name: "runtime / bun"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "integration-bun"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build runtime
        run: pnpm nx run @copilotkitnext/runtime:build

      - name: Run Bun server integration tests
        working-directory: packages/v2/runtime
        run: bun test src/__tests__/integration/bun/bun-servers.integration.test.ts
