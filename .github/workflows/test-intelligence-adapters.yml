name: test / Intelligence adapters

on:
  push:
    branches: [main]
    paths:
      - "sdk-python-adk/**"
      - "sdk-python-langgraph/**"
      - "packages/intelligence-langgraph/**"
      - "sdk-python-agent-framework/**"
      - "sdk-dotnet-agent-framework/**"
      - "packages/intelligence/**"
      - "sdk-python/**"
      - "sdk-dotnet/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/test-intelligence-adapters.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk-python-adk/**"
      - "sdk-python-langgraph/**"
      - "packages/intelligence-langgraph/**"
      - "sdk-python-agent-framework/**"
      - "sdk-dotnet-agent-framework/**"
      - "packages/intelligence/**"
      - "sdk-python/**"
      - "sdk-dotnet/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/test-intelligence-adapters.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_CLOUD_DISTRIBUTED_EXECUTION: "false"
  NX_NO_CLOUD: "true"
  NX_TUI: "false"

jobs:
  matrix:
    name: Load adapter compatibility matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      adapter_matrix: ${{ steps.matrix.outputs.adapter_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Read checked-in matrix
        id: matrix
        run: |
          adapter_matrix="$(jq -c '{include: .cells}' packages/intelligence/conformance/adapter-ci-matrix-v1.json)"
          echo "adapter_matrix=${adapter_matrix}" >> "$GITHUB_OUTPUT"

  generic-sdk-tests:
    name: Test generic SDK prerequisites
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Set up .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: "8.0.x"
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Test TypeScript generic SDK
        run: pnpm nx test @copilotkit/intelligence
      - name: Test and build Python generic SDK
        run: |
          cd sdk-python
          poetry install --with dev
          poetry run python -m pytest tests/ -v
          poetry build
      - name: Test .NET generic SDK
        run: pnpm nx test @copilotkit/intelligence-dotnet
      - name: Upload generic Python SDK wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generic-python-sdk-wheel
          path: sdk-python/dist/copilotkit-0.1.95-py3-none-any.whl
          if-no-files-found: error

  adapter-matrix:
    name: ${{ matrix.adapter }} / ${{ matrix.boundary }}
    needs: [matrix, generic-sdk-tests]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.adapter_matrix) }}
    env:
      ADAPTER_ROOT: ${{ matrix.adapterRoot }}
      NX_PROJECT: ${{ matrix.nxProject }}
      BOUNDARY: ${{ matrix.boundary }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.nodeVersion }}
      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.runtimeVersion }}
      - name: Install Poetry
        if: matrix.language == 'python'
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: latest
          virtualenvs-create: false
      - name: Set up .NET
        if: matrix.language == 'dotnet'
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: ${{ matrix.runtimeVersion }}
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build local generic Python SDK wheel
        if: matrix.language == 'python'
        run: cd sdk-python && poetry build && cd ..
      - name: Install Python boundary
        if: matrix.language == 'python'
        run: |
          python3.10 -m venv "${ADAPTER_ROOT}/.venv"
          mapfile -t FRAMEWORK_ARGS < <(jq -r '.[]' <<< '${{ toJSON(matrix.frameworkRequirements) }}')
          "${ADAPTER_ROOT}/.venv/bin/pip" install sdk-python/dist/copilotkit-0.1.95-py3-none-any.whl pytest pytest-asyncio build twine "${FRAMEWORK_ARGS[@]}"
          "${ADAPTER_ROOT}/.venv/bin/pip" install --no-deps -e "${ADAPTER_ROOT}"
          "${ADAPTER_ROOT}/.venv/bin/python" -c 'from copilotkit import IntelligenceSkillDescriptor'
          "${ADAPTER_ROOT}/.venv/bin/pip" freeze | tee dependency-versions.txt
      - name: Install TypeScript boundary
        if: matrix.language == 'typescript'
        run: |
          mapfile -t FRAMEWORK_ARGS < <(jq -r '.[]' <<< '${{ toJSON(matrix.frameworkRequirements) }}')
          pnpm --dir "${ADAPTER_ROOT}" add --save-dev --lockfile=false "${FRAMEWORK_ARGS[@]}"
          pnpm --dir "${ADAPTER_ROOT}" list --depth 0 --json | tee dependency-versions.txt
      - name: Install .NET boundary
        if: matrix.language == 'dotnet'
        run: |
          mapfile -t FRAMEWORK_ARGS < <(jq -r '.[]' <<< '${{ toJSON(matrix.frameworkRequirements) }}')
          if [[ ${#FRAMEWORK_ARGS[@]} -ne 1 ]]; then
            echo ".NET cells require exactly one framework requirement" >&2
            exit 1
          fi
          case "${BOUNDARY}" in
            minimum)
              if [[ "${FRAMEWORK_ARGS[0]}" != "Microsoft.Agents.AI.Abstractions@1.13.0" ]]; then
                echo "unexpected .NET minimum requirement: ${FRAMEWORK_ARGS[0]}" >&2
                exit 1
              fi
              FRAMEWORK_VERSION="${FRAMEWORK_ARGS[0]##*@}"
              ;;
            latest)
              if [[ "${FRAMEWORK_ARGS[0]}" != "Microsoft.Agents.AI.Abstractions@[1.13.0,2.0.0)" ]]; then
                echo "unexpected .NET latest requirement: ${FRAMEWORK_ARGS[0]}" >&2
                exit 1
              fi
              FRAMEWORK_VERSION="$(
                curl -fsSL "https://api.nuget.org/v3-flatcontainer/microsoft.agents.ai.abstractions/index.json" |
                  jq -er '
                    .versions
                    | map(select(test("-") | not))
                    | map(select(
                        (split(".") | map(tonumber)) as $version
                        | $version[0] == 1
                        and ($version[1] > 13 or ($version[1] == 13 and $version[2] >= 0))
                      ))
                    | last
                  '
              )"
              ;;
            *)
              echo "unsupported .NET boundary: ${BOUNDARY}" >&2
              exit 1
              ;;
          esac
          printf '%s\n' \
            '<Project>' \
            '  <PropertyGroup>' \
            "    <AgentFrameworkVersion>${FRAMEWORK_VERSION}</AgentFrameworkVersion>" \
            '  </PropertyGroup>' \
            '</Project>' \
            > "${ADAPTER_ROOT}/Directory.Packages.props"
          echo "Microsoft.Agents.AI.Abstractions=${FRAMEWORK_VERSION}" | tee dependency-versions.txt
          dotnet restore "${ADAPTER_ROOT}/CopilotKit.Intelligence.AgentFramework.Tests/CopilotKit.Intelligence.AgentFramework.Tests.csproj" --force-evaluate
          dotnet list "${ADAPTER_ROOT}/CopilotKit.Intelligence.AgentFramework.Tests/CopilotKit.Intelligence.AgentFramework.Tests.csproj" package --include-transitive | tee -a dependency-versions.txt
      - name: Run Nx target and shared corpus runner
        run: |
          set -o pipefail
          pnpm nx run "${NX_PROJECT}:test" 2>&1 | tee adapter-test-report.txt
      - name: Upload compatibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adapter-${{ matrix.adapter }}-${{ matrix.boundary }}
          path: |
            dependency-versions.txt
            adapter-test-report.txt
          if-no-files-found: error

  python-artifact-smoke:
    name: Python artifact smoke / ${{ matrix.python-version }}
    needs: generic-sdk-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: latest
          virtualenvs-create: false
      - name: Build and inspect wheels and source distributions
        run: |
          python -m pip install twine
          for package_root in sdk-python sdk-python-adk sdk-python-langgraph sdk-python-agent-framework; do
            (cd "${package_root}" && poetry build)
            python -m twine check "${package_root}"/dist/*
          done
          python -m zipfile -l sdk-python-adk/dist/*.whl
          python -m zipfile -l sdk-python-langgraph/dist/*.whl
          python -m zipfile -l sdk-python-agent-framework/dist/*.whl
      - name: Import wheels in a clean environment
        run: |
          python -m venv .artifact-smoke
          .artifact-smoke/bin/pip install sdk-python/dist/*.whl sdk-python-adk/dist/*.whl sdk-python-langgraph/dist/*.whl sdk-python-agent-framework/dist/*.whl
          .artifact-smoke/bin/python -c 'from copilotkit_intelligence_adk import SkillRegistry, SkillToolset; from copilotkit_intelligence_langgraph import create_skill_registry_before_model, create_skill_registry_middleware; from copilotkit_intelligence_agent_framework import SkillRegistryContextProvider'
      - name: Upload Python artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-adapter-artifacts-${{ matrix.python-version }}
          path: |
            sdk-python-adk/dist/*
            sdk-python-langgraph/dist/*
            sdk-python-agent-framework/dist/*
          if-no-files-found: error

  typescript-artifact-smoke:
    name: TypeScript artifact smoke
    needs: generic-sdk-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build, inspect, and compile clean consumers
        run: pnpm nx run @copilotkit/intelligence-langgraph:pack-check
      - name: Upload npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typescript-adapter-artifact
          path: packages/intelligence-langgraph/artifacts/*.tgz
          if-no-files-found: error

  dotnet-artifact-smoke:
    name: .NET artifact smoke
    needs: generic-sdk-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Set up .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: "8.0.x"
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build, inspect, and compile clean consumer
        run: pnpm nx run @copilotkit/intelligence-agent-framework-dotnet:pack-check
      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-adapter-artifacts
          path: |
            sdk-dotnet-agent-framework/artifacts/*.nupkg
            sdk-dotnet-agent-framework/artifacts/*.snupkg
          if-no-files-found: error
