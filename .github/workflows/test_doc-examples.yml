name: test / doc-examples
on:
  pull_request:
    paths: ["docs/**"]
  push:
    branches: [main]
    paths: ["docs/**"]

jobs:
  validate-model-names:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx scripts/validate-doc-model-names.ts

  doc-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-model-names
    services:
      aimock:
        image: ghcr.io/copilotkit/aimock:latest
        ports:
          - 4010:4010
        options: >-
          --health-cmd "curl -sf http://localhost:4010/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsx scripts/doc-tests/extract.ts
      - run: pnpm tsx scripts/doc-tests/run.ts
