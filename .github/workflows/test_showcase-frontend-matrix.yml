name: test / showcase frontend matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the complete matrix on"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NX_CLOUD_DISTRIBUTED_EXECUTION: "false"
  NX_NO_CLOUD: "true"
  NX_TUI: "false"

jobs:
  plan:
    name: plan 1,288-cell matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate measured shard plan
        run: >-
          pnpm --dir showcase/harness exec tsx src/cli/frontend-matrix-ci.ts plan
          --output "$RUNNER_TEMP/frontend-matrix-plan.json"

      - name: Export dynamic matrix
        id: matrix
        run: |
          MATRIX=$(jq -c '{include: [.shards[] | {shard_index: .index}]}' "$RUNNER_TEMP/frontend-matrix-plan.json")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Upload shard plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-matrix-plan
          path: ${{ runner.temp }}/frontend-matrix-plan.json
          if-no-files-found: error
          retention-days: 14

  build-angular-host:
    name: build canonical Angular host
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular package
        run: pnpm nx run @copilotkit/angular:build

      - name: Build production Angular host
        run: pnpm --dir showcase/angular build

      - name: Upload immutable host build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-matrix-angular-host
          path: showcase/angular/dist
          if-no-files-found: error
          retention-days: 14

  matrix:
    name: cell shard ${{ matrix.shard_index }}
    needs: [plan, build-angular-host]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download shard plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-matrix-plan
          path: ${{ runner.temp }}/frontend-matrix-plan

      - name: Download canonical Angular host
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-matrix-angular-host
          path: showcase/angular/dist

      - name: Install Chromium
        run: pnpm --dir showcase/harness exec playwright install --with-deps chromium

      - name: Start canonical Angular host
        env:
          PORT: "4300"
          NODE_ENV: production
          SHOWCASE_BACKEND_HOST_PATTERN: "showcase-{slug}-production.up.railway.app"
        run: |
          pnpm --dir showcase/angular start > "$RUNNER_TEMP/angular-host.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/angular-host.pid"
          for _ in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:4300/healthz > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Angular host did not become ready" >&2
          exit 1

      - name: Run exact frontend cells
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: >-
          pnpm --dir showcase/harness exec tsx src/cli/frontend-matrix-ci.ts run
          --plan "$RUNNER_TEMP/frontend-matrix-plan/frontend-matrix-plan.json"
          --shard-index "$SHARD_INDEX"
          --angular-base-url "http://127.0.0.1:4300"
          --output "$RUNNER_TEMP/matrix-results/shard-$SHARD_INDEX.json"

      - name: Stop Angular host
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/angular-host.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/angular-host.pid")" 2>/dev/null || true
          fi

      - name: Upload exact-cell result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-matrix-shard-${{ matrix.shard_index }}
          path: ${{ runner.temp }}/matrix-results/shard-${{ matrix.shard_index }}.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload host log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-matrix-host-log-${{ matrix.shard_index }}
          path: ${{ runner.temp }}/angular-host.log
          if-no-files-found: warn
          retention-days: 7

  verify:
    name: verify complete matrix
    if: always()
    needs: [plan, build-angular-host, matrix]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download matrix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: frontend-matrix-shard-*
          path: ${{ runner.temp }}/frontend-matrix-artifacts
          merge-multiple: true

      - name: Verify exact coverage, results, and p95
        run: >-
          pnpm --dir showcase/harness exec tsx src/cli/frontend-matrix-ci.ts aggregate
          --artifacts "$RUNNER_TEMP/frontend-matrix-artifacts"
          --output "$RUNNER_TEMP/frontend-matrix-report.json"
          --timings-output "$RUNNER_TEMP/frontend-matrix-timings.json"

      - name: Upload aggregate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-matrix-report
          path: |
            ${{ runner.temp }}/frontend-matrix-report.json
            ${{ runner.temp }}/frontend-matrix-timings.json
          if-no-files-found: error
          retention-days: 30
