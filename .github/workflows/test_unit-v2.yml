name: test / unit / v2

on:
  push:
    branches: [main]
    paths:
      - "packages/v2/**"
      - "examples/v2/**"
      - ".github/workflows/test_unit-v2.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/v2/**"
      - "examples/v2/**"
      - ".github/workflows/test_unit-v2.yml"
      - ".changeset/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "main"
        type: string

jobs:
  v2:
    name: "unit / v2.x"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "unit-v2-${{ matrix.node-version }}"
          node-version: ${{ matrix.node-version }}
          install-uv: "true"

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm run test:next
