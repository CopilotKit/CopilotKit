name: skill / eval-lift

# Daily skill-lift eval for copilotkit-setup: runs the with/without comparison
# (skill-evals/copilotkit-setup) and posts the lift table to the run's Step
# Summary. Scheduled + manual only — never on PRs, since each run spins Docker
# containers and burns agent tokens. Scheduled runs fire from the default branch
# only; to try it on a branch use `gh workflow run skill_eval-lift.yml --ref <branch>`.
on:
  schedule:
    # Daily at 14:00 UTC (07:00 PT / 10:00 ET) — matches the low-traffic window
    # used by the other daily crons in this repo.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      trials:
        description: "Trials per arm (with + without)"
        required: false
        default: "3"
        type: string

# Least-privilege: the eval only reads the repo and writes its Step Summary.
permissions:
  contents: read

# Don't stack daily runs on top of a still-running one; let the in-flight run finish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  lift:
    name: "copilotkit-setup lift"
    # GitHub-hosted runner: Docker Engine is preinstalled, which the eval drives
    # via the docker CLI to build its image and run each trial in a container.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-store-20-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-20-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run skill-lift eval
        # TRIALS comes from the dispatch input (default "3"); scheduled runs have
        # no input, so the `|| '3'` fallback applies. Passed via env, not inline
        # ${{ }} in the run script, to avoid template injection.
        env:
          TRIALS: ${{ github.event.inputs.trials || '3' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm eval:skill:setup --trials="$TRIALS"
