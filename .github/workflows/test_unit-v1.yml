name: test / unit / v1

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"
      - ".github/workflows/demos_preview.yml"
      - ".github/workflows/release.yml"
      - "packages/v1/**/package.json"
      - "packages/v1/**/CHANGELOG.md"
      - ".changeset/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "examples/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: "main"
        type: string

jobs:
  v1:
    name: "unit / v1.x"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Nx
        uses: ./.github/actions/setup-nx
        with:
          workflow-name: "unit-v1-${{ matrix.node-version }}"
          node-version: ${{ matrix.node-version }}
          install-uv: "true"

      - name: Generate GraphQL codegen files
        run: npx nx run @copilotkit/runtime-client-gql:graphql-codegen

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: npm run test:classic
