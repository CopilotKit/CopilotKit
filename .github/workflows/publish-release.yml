name: release / publish

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Escape hatch for failed releases. Covers failures BEFORE the "Publish to
  # npm" step succeeds (build errors, infra blips, git config bugs). Does
  # NOT cover post-npm-publish failures: if npm publish already succeeded
  # but a later step failed, the retry will fail at "Publish to npm" with
  # an "already published" error, and the "Check for pre-existing tags"
  # step will also block retries where the tag was pushed. For those cases,
  # remediate by hand using release-notes.md from the merged release PR.
  workflow_dispatch:
    inputs:
      scope:
        description: |
          ⚠️ MANUAL RETRIGGER — republishes from the latest commit on main,
          bypassing the normal release-PR flow. Only use this when the
          normal flow failed BEFORE npm publish succeeded. If npm publish
          already happened, finish the release by hand instead — dispatching
          here will fail at "Publish to npm" with "already published".
        required: true
        type: choice
        options:
          - monorepo
          - angular

permissions:
  contents: read

concurrency:
  group: publish-release
  cancel-in-progress: false

env:
  NX_VERBOSE_LOGGING: true

jobs:
  build:
    # Run on a merged release PR (normal flow) or a manual workflow_dispatch (escape hatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release/publish/'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Determine scope
        id: meta
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_SCOPE: ${{ inputs.scope }}
        run: |
          if [ -n "$INPUT_SCOPE" ]; then
            SCOPE="$INPUT_SCOPE"
          else
            # Branch format: release/publish/<scope>/v<version>
            SCOPE=$(echo "$PR_HEAD_REF" | sed 's|release/publish/\([^/]*\)/v.*|\1|')
          fi
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "Detected scope: $SCOPE"

      # No token/credential persistence: the publish job sets up its own
      # `git config insteadOf` with secrets.GITHUB_TOKEN before pushing tags,
      # so this checkout doesn't need write access. Critically, the
      # subsequent `Upload workspace` step packs the entire checkout
      # (including .git/config) into an artifact — persisting credentials
      # here would leak a workflow-scoped token to anyone with actions:read.
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      # Exclude node_modules and build caches from the artifact. Including
      # them produces ~6.4M files for this monorepo, which OOMs
      # upload-artifact's Node process at its 4GB heap limit during
      # enumeration. The publish job runs `pnpm install` after download to
      # restore node_modules from pnpm-lock.yaml.
      - name: Upload workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workspace
          path: |
            .
            !**/node_modules/**
            !**/.next/**
            !**/.turbo/**
            !**/.nx/**
          include-hidden-files: true
          retention-days: 1

    outputs:
      scope: ${{ steps.meta.outputs.scope }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: write
    steps:
      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace

      - name: Configure git credentials
        run: |
          git config --local url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Restore node_modules — the build job excludes them from the
      # uploaded workspace artifact (see "Upload workspace" above). Uses
      # pnpm-lock.yaml from the artifact, so this is a deterministic
      # restore of exactly what the build job ran with.
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm auth
        run: |
          npm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        id: publish
        run: pnpm tsx scripts/release/publish-release.ts --scope ${{ needs.build.outputs.scope }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Configure git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Check for pre-existing tags
        run: |
          SCOPE="${{ needs.build.outputs.scope }}"
          VERSION="${{ steps.publish.outputs.version }}"
          if [ "$SCOPE" == "monorepo" ]; then
            TAG="v${VERSION}"
          else
            TAG="${SCOPE}/v${VERSION}"
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: Tag $TAG already exists" >&2
            exit 1
          fi

      - name: Create and push git tag
        run: |
          SCOPE="${{ needs.build.outputs.scope }}"
          VERSION="${{ steps.publish.outputs.version }}"
          if [ "$SCOPE" == "monorepo" ]; then
            TAG="v${VERSION}"
          else
            TAG="${SCOPE}/v${VERSION}"
          fi
          git tag -a "$TAG" -m "Release ${SCOPE} ${VERSION}"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        id: tag

      - name: Create GitHub Release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_SCOPE: ${{ needs.build.outputs.scope }}
          RELEASE_VERSION: ${{ steps.publish.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const scope = process.env.RELEASE_SCOPE;
            const version = process.env.RELEASE_VERSION;
            const name = scope === "monorepo" ? `v${version}` : `${scope}/v${version}`;

            let body = "";
            try {
              body = fs.readFileSync("./release-notes.md", "utf8");
            } catch {
              body = `Release ${name}`;
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner, repo,
                release_id: existing.data.id,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            }

      - name: Release summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scope:** ${{ needs.build.outputs.scope }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.publish.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
