# release / publish
#
# Single npm OIDC entry point for both stable releases and prerelease canaries.
# npm trusted publisher records for the monorepo packages plus independently
# scoped @copilotkit packages are registered against THIS workflow file.
# Matching happens on the OIDC token's `workflow_ref` claim, which is always
# publish-release.yml when this workflow is the entry point.
# The @copilotkit/intelligence-langgraph trusted-publisher identity is exactly:
# workflow publish-release.yml, environment npm, package
# @copilotkit/intelligence-langgraph. Keep this as the only npm OIDC publisher.
#
# Triggers:
#   - pull_request: closed on a release/publish/<scope>/v<X.Y.Z> branch → stable
#     release of <scope> at version <X.Y.Z> (the normal flow).
#   - workflow_dispatch with mode=stable → manual retrigger of a failed stable
#     release. Republishes from the latest commit on main. Only use this when
#     the normal flow failed BEFORE npm publish succeeded.
#   - workflow_dispatch with mode=prerelease → canary publish. Bumps versions
#     in the build job to <X.Y.Z>-canary.<suffix>, publishes with --tag canary,
#     skips tag push + GH Release + Notion notification.
name: release / publish

# This workflow handles two independent release lanes:
#
# 1. npm (TypeScript) — fires on merged release/publish/* PRs or manual dispatch.
#    Build → publish via nx release + OIDC trusted publishers.
#
# 2. PyPI (Python SDK) — fires on any merged PR that bumps sdk-python/pyproject.toml.
#    Detects version change vs PyPI registry, builds with poetry, publishes with uv.
#    Ported from ag-ui's publish-release.yml Python lane.
#
# 3. NuGet (.NET SDK) — fires on any merged PR that bumps the Intelligence
#    .csproj, or by explicit manual override. It never mutates source versions.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: "What to release"
        required: true
        type: choice
        options:
          - monorepo
          - angular
          - channels
          - intelligence-langgraph
      mode:
        description: "Release mode: stable (full release with tag + GH Release) or prerelease (canary, no tag/release)"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - prerelease
      suffix:
        description: "Canary suffix (only used when mode=prerelease). Falls back to timestamp if empty. Allowed: [a-zA-Z0-9._-]+"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Dry run (skip publish step)"
        required: false
        default: false
        type: boolean
      python_publish:
        description: "Run the Python publish lane regardless of which files changed. Still no-ops if sdk-python's version already matches PyPI."
        required: false
        default: false
        type: boolean
      dotnet_publish:
        description: "Run only the .NET publish lane regardless of changed files (scope is ignored). Still no-ops if the exact version exists on NuGet.org."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  # Scope the lock to the package being released so a `monorepo` publish and an
  # `angular` publish run in independent lanes instead of queuing behind each
  # other. On the manual path `inputs.scope` carries the target; on the merged
  # release-PR path inputs are empty, but the PR branch is
  # `release/publish/<scope>/v<version>`, so `github.head_ref` already encodes
  # the scope. Same-scope runs still serialize (cancel-in-progress: false),
  # which is what protects the tag push / npm publish.
  group: publish-release-${{ inputs.scope || github.head_ref || github.ref }}
  cancel-in-progress: false

env:
  NX_VERBOSE_LOGGING: true

jobs:
  build:
    # Run on a merged release PR (normal flow), a stable manual dispatch from
    # main (retry escape hatch), or a prerelease manual dispatch from any
    # selected branch. Canary publishes are intentionally branch-scoped so
    # maintainers can push a button on feature work without merging first.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.dotnet_publish != true &&
        (inputs.mode == 'prerelease' || github.ref == 'refs/heads/main')) ||
      (github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'release/publish/'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Determine scope and mode
        id: meta
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_SCOPE: ${{ inputs.scope }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SCOPE" ]; then
            SCOPE="$INPUT_SCOPE"
          else
            # Branch format: release/publish/<scope>/v<version>
            SCOPE="${PR_HEAD_REF#release/publish/}"
            SCOPE="${SCOPE%%/v*}"
          fi
          MODE="${INPUT_MODE:-stable}"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE"   >> "$GITHUB_OUTPUT"
          echo "Detected scope: $SCOPE, mode: $MODE"

      # No token/credential persistence: the publish job sets up its own
      # `git config insteadOf` with secrets.GITHUB_TOKEN before pushing tags,
      # so this checkout doesn't need write access. Critically, the
      # subsequent `Upload workspace` step packs the entire checkout
      # (including .git/config) into an artifact — persisting credentials
      # here would leak a workflow-scoped token to anyone with actions:read.
      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Validate user-supplied suffix against npm-safe charset before passing
      # to bump-prerelease.ts. Empty suffix → omit the --suffix flag entirely
      # so the script applies its timestamp fallback (passing an empty string
      # would produce a version like "X.Y.Z-canary." with a trailing dot).
      - name: Bump prerelease versions
        if: ${{ steps.meta.outputs.mode == 'prerelease' }}
        env:
          INPUT_SCOPE: ${{ inputs.scope }}
          INPUT_SUFFIX: ${{ inputs.suffix }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SUFFIX" ]; then
            if ! [[ "$INPUT_SUFFIX" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid suffix '$INPUT_SUFFIX'. Allowed: [a-zA-Z0-9._-]+"
              exit 1
            fi
            pnpm tsx scripts/release/bump-prerelease.ts --scope "$INPUT_SCOPE" --suffix "$INPUT_SUFFIX"
          else
            pnpm tsx scripts/release/bump-prerelease.ts --scope "$INPUT_SCOPE"
          fi

      - name: Resolve npm release identity
        id: release-identity
        env:
          SCOPE: ${{ steps.meta.outputs.scope }}
        run: |
          set -euo pipefail
          PACKAGE_ID="$(node --import tsx --input-type=module -e 'import { getScopeConfig } from "./scripts/release/lib/config.ts"; process.stdout.write(getScopeConfig(process.env.SCOPE).versionSource)')"
          VERSION="$(node --import tsx --input-type=module -e 'import { getCurrentVersion } from "./scripts/release/lib/versions.ts"; process.stdout.write(getCurrentVersion(process.env.SCOPE))')"
          test -n "$PACKAGE_ID"
          test -n "$VERSION"
          echo "package_id=$PACKAGE_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect Intelligence LangGraph npm registry state
        id: adapter-detect
        if: steps.meta.outputs.scope == 'intelligence-langgraph' && steps.meta.outputs.mode == 'stable'
        run: pnpm tsx scripts/release/detect-intelligence-adapter-version-changes.ts --package @copilotkit/intelligence-langgraph

      - name: Build packages
        run: pnpm run build

      - name: Verify Intelligence LangGraph npm artifact
        if: steps.meta.outputs.scope == 'intelligence-langgraph'
        run: |
          set -euo pipefail
          pnpm nx run @copilotkit/intelligence-langgraph:check --skip-nx-cache
          pnpm nx run @copilotkit/intelligence-langgraph:pack-check --skip-nx-cache

      # Strip caches and pack the workspace into a single tarball before
      # upload. upload-artifact's path filters are post-walk: it still
      # descends into every node_modules and stats every file (~6.4M for
      # this monorepo with pnpm's .pnpm/ symlink farm) before applying
      # negations, which is the actual bottleneck. Removing the dirs and
      # uploading one file collapses that to a single fast step.
      - name: Pack workspace
        run: |
          find . -type d \( -name node_modules -o -name .nx -o -name .turbo -o -name .next \) -prune -exec rm -rf {} +
          tar -czf /tmp/workspace.tgz .

      - name: Upload workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workspace
          path: /tmp/workspace.tgz
          retention-days: 1

    outputs:
      scope: ${{ steps.meta.outputs.scope }}
      mode: ${{ steps.meta.outputs.mode }}
      package_id: ${{ steps.release-identity.outputs.package_id }}
      version: ${{ steps.release-identity.outputs.version }}
      adapter_should_publish: ${{ steps.adapter-detect.outputs.should_publish }}
      adapter_name: ${{ steps.adapter-detect.outputs.name }}

  publish:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ${{ needs.build.outputs.package_id }}@${{ needs.build.outputs.version }}
      cancel-in-progress: false
    # npm trusted publishing is bound to this environment. Its deployment
    # branch policy must allow prerelease workflow_dispatch refs; stable
    # releases remain main-only via the build job guard.
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Determine scope and mode
        id: meta
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_SCOPE: ${{ inputs.scope }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SCOPE" ]; then
            SCOPE="$INPUT_SCOPE"
          else
            # Branch format: release/publish/<scope>/v<version>
            SCOPE="${PR_HEAD_REF#release/publish/}"
            SCOPE="${SCOPE%%/v*}"
          fi
          if [ -z "$SCOPE" ]; then
            echo "::error::Failed to resolve scope (input=$INPUT_SCOPE, ref=$PR_HEAD_REF)"
            exit 1
          fi
          MODE="${INPUT_MODE:-stable}"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE"   >> "$GITHUB_OUTPUT"

      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workspace

      - name: Unpack workspace
        run: |
          tar -xzf workspace.tgz
          rm workspace.tgz

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --local url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup pnpm
        # Omit `version:` so pnpm/action-setup inherits from the repo's
        # `packageManager` field in package.json (via corepack).
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      # Restore node_modules — the build job excludes them from the
      # uploaded workspace artifact (see "Upload workspace" above). Uses
      # pnpm-lock.yaml from the artifact, so this is a deterministic
      # restore of exactly what the build job ran with.
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Dry-run notice
        if: ${{ inputs.dry-run == true }}
        run: |
          {
            echo "## Dry Run"
            echo ""
            echo "DRY RUN — skipping publish step. Scope: ${{ steps.meta.outputs.scope }}, mode: ${{ steps.meta.outputs.mode }}."
          } >> "$GITHUB_STEP_SUMMARY"

      # The family must exist on npm before the umbrella is allowed to ship:
      # the registry verifier installs the packed umbrella against those exact
      # published dependencies. Publish the foundation and adapters first, then
      # verify, then let the final publish step release the umbrella.
      - name: Publish Channels dependencies to npm
        if: ${{ inputs.dry-run != true && steps.meta.outputs.scope == 'channels' && steps.meta.outputs.mode == 'stable' }}
        env:
          NODE_AUTH_TOKEN: ""
          SCOPE: ${{ steps.meta.outputs.scope }}
        run: pnpm tsx scripts/release/publish-release.ts --scope "$SCOPE" --phase dependencies

      - name: Verify registry-backed Channels umbrella contract
        if: ${{ inputs.dry-run != true && steps.meta.outputs.scope == 'channels' && steps.meta.outputs.mode == 'stable' }}
        run: pnpm run verify:channels-umbrella:registry

      - name: Publish to npm
        id: publish
        if: ${{ inputs.dry-run != true && (steps.meta.outputs.scope != 'intelligence-langgraph' || steps.meta.outputs.mode != 'stable' || needs.build.outputs.adapter_should_publish == 'true') }}
        env:
          NODE_AUTH_TOKEN: ""
          NOTION_API_KEY: ${{ steps.meta.outputs.mode == 'stable' && secrets.NOTION_API_KEY || '' }}
          PUBLISH_SCRIPT: ${{ steps.meta.outputs.mode == 'prerelease' && 'prerelease.ts' || 'publish-release.ts' }}
          SCOPE: ${{ steps.meta.outputs.scope }}
        run: |
          set -euo pipefail
          if [ "$PUBLISH_SCRIPT" = "prerelease.ts" ]; then
            pnpm tsx "scripts/release/$PUBLISH_SCRIPT" --scope "$SCOPE"
          elif [ "$SCOPE" = "channels" ]; then
            pnpm tsx scripts/release/publish-release.ts --scope "$SCOPE" --phase umbrella
          else
            pnpm tsx scripts/release/publish-release.ts --scope "$SCOPE"
          fi

      - name: Resolve release version
        id: release-result
        if: ${{ success() && inputs.dry-run != true }}
        env:
          MODE: ${{ steps.meta.outputs.mode }}
          PUBLISHED_VERSION: ${{ steps.publish.outputs.version }}
          BUILT_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="${PUBLISHED_VERSION:-$BUILT_VERSION}"
          if [ -z "$VERSION" ]; then
            echo "::error::No release version is available for mode $MODE."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION confirmed (mode=$MODE)"

      - name: Poll npm for Intelligence LangGraph adapter
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.scope == 'intelligence-langgraph' && steps.meta.outputs.mode == 'stable' }}
        env:
          NAME: ${{ needs.build.outputs.adapter_name }}
          VERSION: ${{ steps.release-result.outputs.version }}
        run: |
          set -euo pipefail
          test -n "$NAME"
          test -n "$VERSION"
          for attempt in $(seq 1 30); do
            if [ "$(npm view "${NAME}@${VERSION}" version 2>/dev/null)" = "$VERSION" ]; then
              exit 0
            fi
            test "$attempt" -lt 30
            sleep 10
          done

      - name: Configure git user
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.mode != 'prerelease' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create and push git tag
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.mode != 'prerelease' }}
        env:
          SCOPE: ${{ steps.meta.outputs.scope }}
          VERSION: ${{ steps.release-result.outputs.version }}
        run: |
          if [ "$SCOPE" == "monorepo" ]; then
            TAG="v${VERSION}"
          else
            TAG="${SCOPE}/v${VERSION}"
          fi
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "Tag $TAG already exists — reconciliation complete"
          else
            git tag -a "$TAG" -m "Release ${SCOPE} ${VERSION}"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        id: tag

      - name: Create GitHub Release
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.mode != 'prerelease' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_SCOPE: ${{ steps.meta.outputs.scope }}
          RELEASE_VERSION: ${{ steps.release-result.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const scope = process.env.RELEASE_SCOPE;
            const version = process.env.RELEASE_VERSION;
            const name = scope === "monorepo" ? `v${version}` : `${scope}/v${version}`;

            let body = "";
            try {
              body = fs.readFileSync("./release-notes.md", "utf8");
            } catch {
              body = `Release ${name}`;
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner, repo,
                release_id: existing.data.id,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            }

      - name: Release summary (stable)
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.mode != 'prerelease' }}
        run: |
          {
            echo "## Release Published"
            echo ""
            echo "**Scope:** ${{ steps.meta.outputs.scope }}"
            echo "**Mode:** ${{ steps.meta.outputs.mode }}"
            echo "**Version:** ${{ steps.release-result.outputs.version }}"
            echo "**Tag:** ${{ steps.tag.outputs.tag }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prerelease summary
        if: ${{ success() && inputs.dry-run != true && steps.meta.outputs.mode == 'prerelease' }}
        run: |
          {
            echo "## Prerelease Published"
            echo ""
            echo "**Scope:** ${{ steps.meta.outputs.scope }}"
            echo "**Version:** ${{ steps.release-result.outputs.version }}"
            echo "**Tag:** (prerelease — no tag created)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run summary
        if: ${{ success() && inputs.dry-run == true }}
        run: |
          {
            echo "## Dry Run Completed"
            echo ""
            echo "**Scope:** ${{ steps.meta.outputs.scope }}"
            echo "**Mode:** ${{ steps.meta.outputs.mode }}"
            echo "- Publish step was skipped; no npm publish, no git tag, no GitHub Release."
          } >> "$GITHUB_STEP_SUMMARY"

    # Populated only on a stable, non-dry-run success (the publish/tag steps are
    # gated on mode != prerelease && dry-run != true). On prerelease, dry-run, or
    # failure these are empty — the notify job gates on that emptiness.
    outputs:
      version: ${{ steps.release-result.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}

  # ===========================================================================
  # Python SDK publish lane
  #
  # Fires independently of the npm lane. Detects whether sdk-python/pyproject.toml
  # has a version newer than what's on PyPI, builds with poetry, publishes with uv.
  #
  # SECURITY: Same build/publish separation as the npm lane — PYPI_API_TOKEN is
  # only available in the publish-python job, never where poetry install runs.
  # ===========================================================================

  build-python:
    # Fires when:
    # 1. A PR merging to main touched sdk-python/pyproject.toml (version bump), OR
    # 2. Manual dispatch with python_publish=true
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.python_publish == true) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.detect.outputs.version }}
      name: ${{ steps.detect.outputs.name }}
      # Earliest Python-release intent signal: emitted by the `changed` step
      # BEFORE any failure-prone step (setup-python, detect, build). The notify
      # job gates the PyPI FAILURE alert on this (not should_publish, which is
      # emitted only at the END of detect) so a build-python failure at/before
      # detect on a genuine release still pages instead of being silently
      # swallowed.
      pyproject_changed: ${{ steps.changed.outputs.pyproject_changed }}
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      # For PRs, skip early if this PR didn't touch pyproject.toml. Manual
      # dispatch always continues (the user explicitly asked for it).
      - name: Check if pyproject.toml changed in this PR
        if: github.event_name == 'pull_request'
        id: changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          if [ -z "$PR_BASE_SHA" ]; then
            echo "::error::PR_BASE_SHA is empty — cannot determine PR base for diff. Refusing to silently skip Python publish."
            exit 1
          fi
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "::error::PR_HEAD_SHA (merge_commit_sha) is empty — GitHub may not have computed the merge commit yet. Refusing to silently skip Python publish; rerun the workflow."
            exit 1
          fi
          # Capture diff FIRST so a git failure trips set -e and fails loudly,
          # rather than producing an empty pipe that grep silently routes to
          # "not changed" — that path masked real version bumps before.
          CHANGED="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          # grep -q exits 1 on legitimate no-match; guard with `if` so set -e
          # doesn't kill the step on that expected case.
          if printf '%s\n' "$CHANGED" | grep -q '^sdk-python/pyproject.toml$'; then
            echo "pyproject_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pyproject_changed=false" >> "$GITHUB_OUTPUT"
            echo "sdk-python/pyproject.toml not changed in this PR — skipping Python publish"
          fi

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.pyproject_changed == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Detect version change
        if: github.event_name == 'workflow_dispatch' || steps.changed.outputs.pyproject_changed == 'true'
        id: detect
        run: ./scripts/release/detect-py-version-changes.sh

      - name: Install Poetry
        if: steps.detect.outputs.should_publish == 'true'
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build Python package
        if: steps.detect.outputs.should_publish == 'true'
        working-directory: sdk-python
        run: poetry build

      - name: Upload Python build artifacts
        if: steps.detect.outputs.should_publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: py-build-artifacts
          path: sdk-python/dist/
          retention-days: 1

      - name: Nothing to publish
        if: steps.detect.outputs.should_publish != 'true'
        run: |
          {
            echo "## Python SDK"
            echo ""
            echo "No version change detected — nothing to publish."
          } >> "$GITHUB_STEP_SUMMARY"

  # WARNING: PyPI trusted-publisher binding pins to:
  #   repository:    CopilotKit/CopilotKit
  #   workflow_file: publish-release.yml
  #   environment:   pypi
  # Renaming this file, changing this job's `environment:` value, or moving the
  # publish step into another workflow breaks PyPI publishing with HTTP 422
  # until the Trusted Publisher record on pypi.org is updated to match.
  publish-python:
    needs: build-python
    if: ${{ !cancelled() && needs.build-python.result == 'success' && needs.build-python.outputs.should_publish == 'true' && inputs.dry-run != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ">=0.8.0"

      - name: Download Python build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: py-build-artifacts
          path: sdk-python/dist

      - name: Publish to PyPI (OIDC trusted publishing)
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(sdk-python/dist/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no build artifacts in sdk-python/dist — nothing to publish"
            exit 1
          fi
          uv publish --trusted-publishing always "${files[@]}"

      - name: Verify version is live on PyPI
        env:
          NAME: ${{ needs.build-python.outputs.name }}
          VERSION: ${{ needs.build-python.outputs.version }}
        run: |
          set -euo pipefail
          for i in $(seq 1 18); do
            if curl -fsS "https://pypi.org/pypi/${NAME}/${VERSION}/json" >/dev/null 2>&1; then
              echo "Confirmed ${NAME}==${VERSION} on PyPI"; exit 0
            fi
            echo "Attempt ${i}: ${NAME}==${VERSION} not visible yet; retrying in 10s..."
            sleep 10
          done
          echo "::error::${NAME}==${VERSION} did not appear on PyPI within 180s"
          echo "Last curl response:"
          curl -sS "https://pypi.org/pypi/${NAME}/${VERSION}/json" 2>&1 | tail -n 5 || true
          exit 1

      - name: Configure git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --local url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Create and push git tag
        id: tag
        env:
          PY_VERSION: ${{ needs.build-python.outputs.version }}
          PY_NAME: ${{ needs.build-python.outputs.name }}
        run: |
          set -euo pipefail
          TAG="python-sdk/v${PY_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag -a "$TAG" -m "Release ${PY_NAME} ${PY_VERSION}"
            git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_VERSION: ${{ needs.build-python.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const name = `python-sdk/v${version}`;
            const body = `Python SDK release: copilotkit ${version}\n\nhttps://pypi.org/project/copilotkit/${version}/`;

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner, repo,
                release_id: existing.data.id,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag, name, body,
                draft: false, prerelease: false,
              });
            }

      - name: Release summary
        env:
          PY_VERSION: ${{ needs.build-python.outputs.version }}
        run: |
          {
            echo "## Python SDK Published"
            echo ""
            echo "- \`copilotkit@${PY_VERSION}\`"
            echo "- https://pypi.org/project/copilotkit/${PY_VERSION}/"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # .NET SDK NuGet publish lane
  #
  # No workspace/package artifact is uploaded. Build, test, pack, and publish
  # stay in one job; NUGET_API_KEY is scoped only to the final push step.
  # ===========================================================================

  publish-dotnet:
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.dotnet_publish == true) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: publish-nuget-CopilotKit.Intelligence
      cancel-in-progress: false
    steps:
      - name: Checkout merged main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Check if the .NET package version changed in this PR
        if: github.event_name == 'pull_request'
        id: dotnet-changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          if [ -z "$PR_BASE_SHA" ]; then
            echo "::error::PR_BASE_SHA is empty — cannot determine the .NET release diff."
            exit 1
          fi
          if [ -z "$PR_HEAD_SHA" ]; then
            echo "::error::PR_HEAD_SHA (merge_commit_sha) is empty — rerun after GitHub computes the merge commit."
            exit 1
          fi
          CHANGED="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          if printf '%s\n' "$CHANGED" | grep -qx 'sdk-dotnet/CopilotKit.Intelligence/CopilotKit.Intelligence.csproj'; then
            echo "csproj_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "csproj_changed=false" >> "$GITHUB_OUTPUT"
            echo "Intelligence .csproj not changed in this PR — skipping NuGet publish"
          fi

      - name: Detect unpublished .NET version
        if: github.event_name == 'workflow_dispatch' || steps.dotnet-changed.outputs.csproj_changed == 'true'
        id: dotnet-detect
        run: ./scripts/release/detect-dotnet-version-changes.sh

      - name: Setup .NET
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET SDK
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        run: dotnet restore sdk-dotnet/CopilotKit.Intelligence.Tests/CopilotKit.Intelligence.Tests.csproj

      - name: Build .NET SDK
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        run: dotnet build sdk-dotnet/CopilotKit.Intelligence/CopilotKit.Intelligence.csproj --configuration Release --no-restore

      - name: Test .NET SDK
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        run: dotnet test sdk-dotnet/CopilotKit.Intelligence.Tests/CopilotKit.Intelligence.Tests.csproj --configuration Release --no-restore

      - name: Pack .NET SDK
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        run: dotnet pack sdk-dotnet/CopilotKit.Intelligence/CopilotKit.Intelligence.csproj --configuration Release --no-build --output sdk-dotnet/dist

      - name: Inspect NuGet package outputs
        if: steps.dotnet-detect.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(sdk-dotnet/dist/*.nupkg)
          symbols=(sdk-dotnet/dist/*.snupkg)
          all=(sdk-dotnet/dist/*)
          if [ ${#packages[@]} -ne 1 ] || [ ${#symbols[@]} -ne 1 ]; then
            echo "::error::expected exactly one .nupkg and one .snupkg; found ${#packages[@]} package(s) and ${#symbols[@]} symbol package(s)"
            exit 1
          fi
          if [ ${#all[@]} -ne 2 ]; then
            echo "::error::sdk-dotnet/dist contains unexpected files; only .nupkg and .snupkg are allowed"
            printf '%s\n' "${all[@]}"
            exit 1
          fi
          unzip -l "${packages[0]}"
          unzip -p "${packages[0]}" '*.nuspec'

      - name: Dry-run notice
        if: steps.dotnet-detect.outputs.should_publish == 'true' && inputs.dry-run == true
        env:
          PACKAGE_NAME: ${{ steps.dotnet-detect.outputs.name }}
          PACKAGE_VERSION: ${{ steps.dotnet-detect.outputs.version }}
        run: |
          {
            echo "## .NET SDK Dry Run"
            echo ""
            echo "Built and inspected ${PACKAGE_NAME}@${PACKAGE_VERSION}; NuGet push was skipped."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish .NET SDK to NuGet
        if: steps.dotnet-detect.outputs.should_publish == 'true' && inputs.dry-run != true
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(sdk-dotnet/dist/*.nupkg)
          symbols=(sdk-dotnet/dist/*.snupkg)
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY is not configured"
            exit 1
          fi
          if [ ${#packages[@]} -ne 1 ] || [ ${#symbols[@]} -ne 1 ]; then
            echo "::error::refusing to publish: expected exactly one .nupkg and one .snupkg"
            exit 1
          fi
          # NuGet V3 discovers and uploads the adjacent .snupkg when the primary
          # .nupkg is pushed, so this publishes exactly the two inspected files.
          dotnet nuget push "${packages[0]}" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json

      - name: Nothing to publish
        if: steps.dotnet-detect.outputs.should_publish == 'false'
        env:
          PACKAGE_NAME: ${{ steps.dotnet-detect.outputs.name }}
          PACKAGE_VERSION: ${{ steps.dotnet-detect.outputs.version }}
        run: |
          {
            echo "## .NET SDK"
            echo ""
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on NuGet.org — nothing to publish."
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Intelligence adapter release lanes
  #
  # The Python and .NET adapters are independent of the generic SDK lanes and
  # of one another. Build jobs hold no registry credential. Publish jobs are
  # serialized by the exact package identity and manifest version.
  # ===========================================================================

  python-adapter-sdk-gate:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false

      - name: Detect a Python adapter manifest change
        id: changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          test -n "$PR_BASE_SHA"
          test -n "$PR_HEAD_SHA"
          CHANGED="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          if printf '%s\n' "$CHANGED" | grep -Eq '^(sdk-python-adk|sdk-python-langgraph|sdk-python-agent-framework)/pyproject\.toml$'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.10
        if: steps.changed.outputs.required == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"

      # Credential-free prerequisite gate. Adapter trusted-publisher jobs must
      # not start until the exact generic SDK projection is public and imports.
      - name: Probe copilotkit 0.1.95 from PyPI (30 x 10 seconds)
        if: steps.changed.outputs.required == 'true'
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            curl -fsS https://pypi.org/pypi/copilotkit/0.1.95/json >/dev/null && break
            test "$attempt" -lt 30
            sleep 10
          done
          python3.10 -m venv /tmp/copilotkit-intelligence-adapter-release-gate
          /tmp/copilotkit-intelligence-adapter-release-gate/bin/pip install --no-cache-dir copilotkit==0.1.95
          /tmp/copilotkit-intelligence-adapter-release-gate/bin/python -c 'from copilotkit import IntelligenceSkillDescriptor, IntelligenceSkillManifestDescriptor, IntelligenceSkillFileDescriptor'

  build-intelligence-adk-python:
    needs: [python-adapter-sdk-gate]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      name: ${{ steps.detect.outputs.name }}
      version: ${{ steps.detect.outputs.version }}
      tag_prefix: ${{ steps.detect.outputs.tag_prefix }}
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false
      - name: Check ADK adapter manifest change
        id: changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          test -n "$PR_BASE_SHA"
          test -n "$PR_HEAD_SHA"
          CHANGED="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          if printf '%s\n' "$CHANGED" | grep -qx 'sdk-python-adk/pyproject.toml'; then
            echo "manifest_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifest_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pnpm
        if: steps.changed.outputs.manifest_changed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        if: steps.changed.outputs.manifest_changed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
      - name: Install release detector dependencies
        if: steps.changed.outputs.manifest_changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Detect ADK adapter version
        if: steps.changed.outputs.manifest_changed == 'true'
        id: detect
        run: pnpm tsx scripts/release/detect-intelligence-adapter-version-changes.ts --package copilotkit-intelligence-adk
      - name: Setup Python 3.10
        if: steps.detect.outputs.should_publish == 'true' || steps.detect.outputs.should_publish == 'false'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Install, test, build, and inspect ADK adapter
        if: steps.detect.outputs.should_publish == 'true' || steps.detect.outputs.should_publish == 'false'
        run: |
          set -euo pipefail
          python3.10 -m venv sdk-python-adk/.venv-release
          sdk-python-adk/.venv-release/bin/pip install --no-cache-dir 'copilotkit==0.1.95' 'google-adk>=2.0.0,<3.0.0' pytest pytest-asyncio build twine
          sdk-python-adk/.venv-release/bin/pip install --no-deps -e sdk-python-adk
          sdk-python-adk/.venv-release/bin/pytest sdk-python-adk/tests -v
          sdk-python-adk/.venv-release/bin/python -m compileall -q sdk-python-adk/src
          sdk-python-adk/.venv-release/bin/python -m build sdk-python-adk --outdir sdk-python-adk/dist
          sdk-python-adk/.venv-release/bin/twine check sdk-python-adk/dist/*
          sdk-python-adk/.venv-release/bin/python -m zipfile -l sdk-python-adk/dist/copilotkit_intelligence_adk-*.whl
      - name: Verify ADK wheel and sdist metadata
        if: steps.detect.outputs.should_publish == 'true' || steps.detect.outputs.should_publish == 'false'
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(sdk-python-adk/dist/*.whl)
          sdists=(sdk-python-adk/dist/*.tar.gz)
          test ${#wheels[@]} -eq 1
          test ${#sdists[@]} -eq 1
          WHEEL_METADATA="$(unzip -p "${wheels[0]}" '*.dist-info/METADATA')"
          SDIST_METADATA="$(tar -xOf "${sdists[0]}" --wildcards '*/PKG-INFO')"
          for metadata in "$WHEEL_METADATA" "$SDIST_METADATA"; do
            grep -Fq 'Name: copilotkit-intelligence-adk' <<< "$metadata"
            grep -Fq 'Project-URL: Repository, https://github.com/CopilotKit/CopilotKit/tree/main/sdk-python-adk' <<< "$metadata"
            grep '^Requires-Dist: copilotkit' <<< "$metadata" | grep -Fq '>=0.1.95' && grep '^Requires-Dist: copilotkit' <<< "$metadata" | grep -Fq '<1.0.0'
            grep '^Requires-Dist: google-adk' <<< "$metadata" | grep -Fq '>=2.0.0' && grep '^Requires-Dist: google-adk' <<< "$metadata" | grep -Fq '<3.0.0'
          done
          unzip -Z1 "${wheels[0]}" | grep -Eq '\.dist-info/licenses/LICENSE$'
          tar -tzf "${sdists[0]}" | grep -Eq '/README\.md$'
          tar -tzf "${sdists[0]}" | grep -Eq '/LICENSE$'
          if unzip -Z1 "${wheels[0]}" | grep -Eq '^copilotkit_intelligence_(langgraph|agent_framework)/'; then
            echo "::error::ADK wheel contains another adapter package"
            exit 1
          fi
          if tar -tzf "${sdists[0]}" | grep -Eq '/copilotkit_intelligence_(langgraph|agent_framework)/'; then
            echo "::error::ADK sdist contains another adapter package"
            exit 1
          fi
      - name: Upload ADK adapter artifacts
        if: steps.detect.outputs.should_publish == 'true' || steps.detect.outputs.should_publish == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: intelligence-adk-python-${{ steps.detect.outputs.version }}
          path: sdk-python-adk/dist/
          retention-days: 1

  # PyPI trusted publisher: package copilotkit-intelligence-adk, workflow
  # publish-release.yml, environment pypi-copilotkit-intelligence-adk.
  publish-intelligence-adk-python:
    needs: [build-intelligence-adk-python]
    if: ${{ !cancelled() && needs.build-intelligence-adk-python.result == 'success' && (needs.build-intelligence-adk-python.outputs.should_publish == 'true' || needs.build-intelligence-adk-python.outputs.should_publish == 'false') && inputs.dry-run != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: pypi-copilotkit-intelligence-adk
    concurrency:
      group: ${{ needs.build-intelligence-adk-python.outputs.name }}@${{ needs.build-intelligence-adk-python.outputs.version }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ">=0.8.0"
      - name: Download ADK adapter artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intelligence-adk-python-${{ needs.build-intelligence-adk-python.outputs.version }}
          path: sdk-python-adk/dist
      - name: Publish ADK adapter to PyPI with OIDC
        if: needs.build-intelligence-adk-python.outputs.should_publish == 'true'
        run: uv publish --trusted-publishing always sdk-python-adk/dist/*
      - name: Poll PyPI for ADK adapter
        env:
          NAME: ${{ needs.build-intelligence-adk-python.outputs.name }}
          VERSION: ${{ needs.build-intelligence-adk-python.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            curl -fsS "https://pypi.org/pypi/${NAME}/${VERSION}/json" >/dev/null && exit 0
            test "$attempt" -lt 30
            sleep 10
          done
      - name: Tag ADK adapter release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: ${{ needs.build-intelligence-adk-python.outputs.tag_prefix }}
          VERSION: ${{ needs.build-intelligence-adk-python.outputs.version }}
          NAME: ${{ needs.build-intelligence-adk-python.outputs.name }}
        run: |
          set -euo pipefail
          TAG="${TAG_PREFIX}${VERSION}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --local url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git rev-parse "$TAG" >/dev/null 2>&1 || { git tag -a "$TAG" -m "Release ${NAME} ${VERSION}"; git push origin "$TAG"; }

  build-intelligence-langgraph-python:
    needs: [python-adapter-sdk-gate]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      name: ${{ steps.detect.outputs.name }}
      version: ${{ steps.detect.outputs.version }}
      tag_prefix: ${{ steps.detect.outputs.tag_prefix }}
    steps:
      - name: Checkout merged main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.merge_commit_sha || github.sha }}
          persist-credentials: false
      - name: Check LangGraph Python adapter manifest change
        id: changed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          test -n "$PR_BASE_SHA"
          test -n "$PR_HEAD_SHA"
          CHANGED="$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")"
          if printf '%s\n' "$CHANGED" | grep -qx 'sdk-python-langgraph/pyproject.toml'; then
            echo "manifest_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifest_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pnpm
        if: steps.changed.outputs.manifest_changed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        if: steps.changed.outputs.manifest_changed == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
      - name: Install release detector dependencies
        if: steps.changed.outputs.manifest_changed == 'true'
        run: pnpm install --frozen-lockfile
      - name: Detect LangGraph Python adapter version
        if: steps.changed.outputs.manifest_changed == 'true'
        id: detect
        run: pnpm tsx scripts/release/detect-intelligence-adapter-version-changes.ts --package copilotkit-intelligence-langgraph
      - name: Setup Python 3.10
        if: steps.detect.outputs.should_publish == 'true' || steps.detect.outputs.should_publish == 'false'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Install, test, build, and inspect LangGraph Python adapter
