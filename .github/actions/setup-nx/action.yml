name: "Setup Nx"
description: "Standard pnpm/node/uv setup with Nx Cloud env isolation for CI"

inputs:
  node-version:
    description: "Node.js version"
    default: "22"
  install-uv:
    description: "Install uv (Python package manager)"
    default: "false"
  workflow-name:
    description: "Unique workflow identifier for Nx Cloud CIPE isolation"
    required: true
  frozen-lockfile:
    description: "Use --frozen-lockfile for pnpm install"
    default: "true"
  working-directory:
    description: "Working directory for pnpm install"
    default: "."

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: "10.13.1"

    - name: Install uv
      if: inputs.install-uv == 'true'
      uses: astral-sh/setup-uv@v6

    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install
        fi

    - name: Configure Nx Cloud environment
      shell: bash
      run: |
        echo "NX_CI_EXECUTION_ID=${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.workflow-name }}" >> $GITHUB_ENV
        echo "NX_CLOUD_NO_TIMEOUTS=true" >> $GITHUB_ENV
        echo "NODE_OPTIONS=--max-old-space-size=4096" >> $GITHUB_ENV
