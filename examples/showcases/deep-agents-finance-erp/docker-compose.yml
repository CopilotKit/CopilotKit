services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./agent/seed.sql:/docker-entrypoint-initdb.d/seed.sql

volumes:
  pgdata:
