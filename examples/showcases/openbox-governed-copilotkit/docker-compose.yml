services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8123:8123"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - AGENT_URL=http://agent:8123
    depends_on:
      - agent
