# Demo recording flow — tracker UX tour (no live chat send; that's pending the
# agent-invocation fix). Shows all 5 tabs incl. the Assistant chat UI.
appId: org.reactjs.native.example.ReactDemo
---
- launchApp
- extendedWaitUntil:
    visible: "Overview"
    timeout: 90000
- assertVisible: "NET WORTH"
- swipe:
    direction: UP
    duration: 800
- swipe:
    direction: DOWN
    duration: 800
- tapOn: "Accounts"
- assertVisible: "Travel Fund"
- tapOn: "Transactions"
- swipe:
    direction: UP
    duration: 900
- swipe:
    direction: DOWN
    duration: 900
- tapOn: "Budgets"
- assertVisible: "Groceries"
- tapOn: "Assistant"
- assertVisible: "Ask your money anything"
- tapOn: "Dashboard"
