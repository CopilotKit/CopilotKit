[project]
name = "proverbs-agent"
version = "0.1.0"
description = "ADK Proverbs Agent with shared state"
requires-python = ">=3.12"
dependencies = [
  "fastapi",
  "uvicorn[standard]",
  "python-dotenv",
  "pydantic",
  "google-adk",
  "google-genai",
  "ag-ui-adk==0.6.3",
  "ag-ui-protocol==0.1.18",
  # uv skips transitive prereleases, and the only stable release was yanked.
  "opentelemetry-resourcedetector-gcp==1.12.0a0",
]
