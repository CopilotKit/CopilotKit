  "ag_ui_strands==0.1.8",
  "copilotkit==0.1.87",
  "langchain==1.2.15",
  "langchain-openai>=1.1.0",
  "openai>=1.68.2,<2.0.0",
  "python-dotenv>=1.0.0,<2.0.0",
  "pydantic>=2.0.0,<3.0.0",
]

