# Railway config for the "bot" service (chat-platform bridge).
#
# In the Railway service settings:
#   • Root Directory       = examples/slack
#   • Config-as-code path   = railway.bot.toml
#
# This service exposes no port — it connects out to Slack/Discord and to the
# runtime over the private network. Do not generate a public domain for it.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.bot"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
