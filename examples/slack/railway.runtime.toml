# Railway config for the "runtime" service (agent backend).
#
# In the Railway service settings:
#   • Root Directory       = examples/slack
#   • Config-as-code path   = railway.runtime.toml
#
# `dockerfilePath` is resolved relative to the Root Directory.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.runtime"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
