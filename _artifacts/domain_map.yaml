  # ===================== Tool Calling =====================

  - name: "Define client-side tools"
    slug: "client-side-tools"
    domain: "tool-calling"
    description: >
      Register browser-side functions agents can invoke via useFrontendTool. Includes the
      StandardSchemaV1 parameters contract, the handler context (signal!), and the rule to
      reuse the consumer's UI kit rather than writing JSX from scratch for any `render`.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useFrontendTool<T>(tool, deps?)"
      - "Parameters via Standard Schema V1 (zod, valibot, arktype)"
      - "FrontendToolHandlerContext { toolCall, agent, signal }"
      - "followUp: boolean on FrontendTool (type says boolean, runtime accepts boolean | 'generate' | string on copilotkit.runTool)"
      - "followUp default: TRUE for agent-invoked tools (follow-up fires unless explicitly false); FALSE for programmatic copilotkit.runTool({...})"
      - "followUp: 'generate' on runTool — trigger agent run with no new user message"
      - "followUp: <string> on runTool — inject string as user message, then run agent"
      - "Handler errors suppress follow-up regardless of followUp value"
      - "agentId scope + available toggle"
      - "Tool name must be globally unique per agentId"
    tasks:
      - "Register a search tool that hits the current app's API"
      - "Forward the abort signal into the tool's fetch call"
      - "Toggle tool availability based on route or permission"
    failure_modes:
      - mistake: "Stale closure inside handler"
        mechanism: "Hook only re-registers when name/available/deps change; closures over React state go stale without deps."
        wrong_pattern: |
          useFrontendTool({ name: "addItem", parameters: z.object({ id: z.string() }),
            handler: async ({ id }) => { addTo(cart, id); } });
        correct_pattern: |
          useFrontendTool({ name: "addItem", parameters: z.object({ id: z.string() }),
            handler: async ({ id }) => { addTo(cart, id); } }, [cart]);
        source: "packages/react-core/src/v2/hooks/use-frontend-tool.tsx:45"
        priority: "HIGH"
      - mistake: "Ignoring signal in async handlers"
        mechanism: "stopAgent aborts via AbortSignal; fetch without {signal} keeps running after cancel."
        wrong_pattern: |
          useFrontendTool({ name: "search", parameters: z.object({ q: z.string() }),
            handler: async ({ q }) => (await fetch(`/search?q=${q}`)).text() });
        correct_pattern: |
          useFrontendTool({ name: "search", parameters: z.object({ q: z.string() }),
            handler: async ({ q }, { signal }) => (await fetch(`/search?q=${q}`, { signal })).text() });
        source: "packages/core/src/types.ts:24-30"
        priority: "HIGH"
      - mistake: "Writing JSX from scratch for `render` or tool-call UI"
        mechanism: "Consumer almost always has a UI kit. Writing raw JSX gives unbranded output and skips accessibility patterns they've already established."
        wrong_pattern: |
          useFrontendTool({ name: "show", render: ({ status }) => <div style={{ padding: 12 }}>…</div> });
        correct_pattern: |
          // First check package.json for shadcn / @mui/* / @chakra-ui/* / antd / @mantine/*, then:
          import { Card, CardContent, Skeleton } from "@/components/ui/card";
          useFrontendTool({ name: "show", render: ({ status }) => (
            <Card>{status === "inProgress" ? <Skeleton /> : <CardContent>…</CardContent>}</Card>
          )});
        source: "maintainer interview (Phase 2c)"
        priority: "CRITICAL"
      - mistake: "Duplicate tool name across hooks"
        mechanism: "Second mount console.warns 'Tool X already exists…Overriding' and replaces the first."
        wrong_pattern: |
          // ComponentA
          useFrontendTool({ name: "save", handler: saveA });
          // ComponentB (both mounted)
          useFrontendTool({ name: "save", handler: saveB });
        correct_pattern: |
          useFrontendTool({ name: "save", agentId: "research", handler: saveA });
          useFrontendTool({ name: "save", agentId: "coding", handler: saveB });
        source: "packages/react-core/src/v2/hooks/use-frontend-tool.tsx:17-22"
        priority: "MEDIUM"
      - mistake: "Missing zod peer dependency"
        mechanism: "zod is a hard peer and is imported at provider module scope."
        wrong_pattern: |
          # pnpm install @copilotkit/react-core  (without zod)
        correct_pattern: |
          # pnpm install @copilotkit/react-core zod
        source: "packages/react-core/package.json peerDependencies; CopilotKitProvider.tsx:17"
        priority: "HIGH"
      - mistake: "Assuming followUp defaults to false on registered tools"
        mechanism: "The type signature is followUp?: boolean — looks innocuous. But for tools invoked by the agent (the common path via tool_call events), run-handler.ts:607 checks `tool?.followUp !== false` — so undefined AND true both fire a follow-up runAgent(). Only explicit `false` prevents it. Agents writing 'pure side effect' tools will accidentally loop."
        wrong_pattern: |
          useFrontendTool({
            name: "logAnalyticsEvent",
            parameters: z.object({ name: z.string() }),
            handler: async ({ name }) => { analytics.track(name); },
            // followUp omitted — defaults to TRUE, agent re-runs after every analytics call
          });
        correct_pattern: |
          useFrontendTool({
            name: "logAnalyticsEvent",
            parameters: z.object({ name: z.string() }),
            handler: async ({ name }) => { analytics.track(name); },
            followUp: false, // side-effect tool — don't re-invoke the agent
          });
        source: "packages/core/src/core/run-handler.ts:607,747"
        priority: "HIGH"
      - mistake: "Trying to pass 'generate' or a custom string to useFrontendTool's followUp"
        mechanism: "The 'generate' and custom-string modes only work on the programmatic copilotkit.runTool({ followUp }) API. The FrontendTool type is declared as boolean; strings are silently truthy (treated the same as true)."
        wrong_pattern: |
          useFrontendTool({
            name: "searchDocs",
            parameters: z.object({ q: z.string() }),
            handler: async ({ q }) => (await fetch(...)).text(),
            followUp: "Summarize these results" as any, // string has no effect here
          });
        correct_pattern: |
          // Either use a boolean on registered tools:
          useFrontendTool({ name: "searchDocs", parameters, handler, followUp: true });
          // Or call runTool programmatically for string follow-ups:
          const { copilotkit } = useCopilotKit();
          await copilotkit.runTool({
            name: "searchDocs",
            parameters: { q: "zod" },
            followUp: "Summarize these results", // injects as user message, runs agent
          });
        source: "packages/core/src/types.ts:39 (boolean); packages/core/src/core/run-handler.ts:47,763,848-863 (runTool accepts string | false)"
        priority: "MEDIUM"

  - name: "Render tool calls in chat"
    slug: "rendering-tool-calls"
    domain: "tool-calling"
    description: >
      Register renderers that show progress and results for tool calls. useRenderTool is the
      primary registration hook (named tools, typed via StandardSchemaV1). useDefaultRenderTool
      is the sanctioned wildcard fallback for any tool without a dedicated renderer.
      useComponent is the render-only convenience. useRenderToolCall is a lower-level resolver
      primitive for building custom chat surfaces — NOT the user-facing registration API.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useRenderTool({ name, parameters, render }, deps?) — primary registration hook"
      - "useDefaultRenderTool({ render? }, deps?) — wildcard fallback, parameters: unknown"
      - "useComponent({ name, parameters, render, agentId? }, deps?) — render-only convenience"
      - "useRenderToolCall() — low-level resolver, returns ({toolCall, toolMessage}) => ReactElement | null"
      - "Status values: 'inProgress' | 'executing' | 'complete' (camelCase, NOT hyphenated)"
      - "RenderToolProps discriminated union (InProgress: Partial<T>, Executing/Complete: full T)"
      - "Resolver order: (name, agentId) > (name, unscoped) > '*' wildcard > null"
    tasks:
      - "Register a typed renderer for a specific tool via useRenderTool"
      - "Add a catch-all fallback via useDefaultRenderTool (built-in card or custom render)"
      - "Define a lightweight tool whose only job is to render a component (useComponent)"
      - "Narrow unknown params inside a default/wildcard renderer by tool name"
    failure_modes:
      - mistake: "Using useRenderToolCall instead of useRenderTool for registration"
        mechanism: "useRenderToolCall returns a resolver function for custom chat surfaces — it does NOT register a renderer. useRenderTool is the registration hook. Agents confusing the two will call the resolver and never see their render fire."
        wrong_pattern: |
          useRenderToolCall({
            name: "search",
            args: z.object({ q: z.string() }),
            render: ({ status, args }) => <Card>...</Card>,
          });
        correct_pattern: |
          useRenderTool({
            name: "search",
            parameters: z.object({ q: z.string() }),
            render: ({ status, parameters }) => <Card>...</Card>,
          });
        source: "packages/react-core/src/v2/hooks/index.ts:2,7; hooks/use-render-tool.tsx:37-40"
        priority: "CRITICAL"
      - mistake: "Using hyphenated 'in-progress' status string"
        mechanism: "Real status values are camelCase ('inProgress' | 'executing' | 'complete'). Hyphenated branches never match and users see no in-progress UI."
        wrong_pattern: |
          render: ({ status, parameters }) => {
            if (status === "in-progress") return <Spinner />;
            if (status === "executing")   return <RunningCard args={parameters} />;
            return <ResultCard result={result} />;
          }
        correct_pattern: |
          render: ({ status, parameters, result }) => {
            if (status === "inProgress") return <Spinner />;
            if (status === "executing")  return <RunningCard args={parameters} />;
            return <ResultCard result={result} />;
          }
        source: "packages/react-core/src/v2/hooks/use-render-tool.tsx:8-35 (RenderTool*Props discriminated union)"
        priority: "CRITICAL"
      - mistake: "Dereferencing required fields from Partial<T> during inProgress"
        mechanism: "During streaming, RenderToolInProgressProps has parameters: Partial<InferSchemaOutput<S>>; fields are undefined until the stream completes."
        wrong_pattern: |
          render: ({ status, parameters }) => <span>{parameters.user.id.toUpperCase()}</span>
        correct_pattern: |
          render: ({ status, parameters }) => status === "inProgress"
            ? <Skeleton />
            : <span>{parameters.user.id.toUpperCase()}</span>
        source: "packages/react-core/src/v2/hooks/use-render-tool.tsx:8-14 (RenderToolInProgressProps)"
        priority: "HIGH"
      - mistake: "Using useComponent where useRenderTool was wanted"
        mechanism: "useComponent is a convenience wrapper that CREATES a NEW TOOL whose only purpose is to render a component — the description is auto-prefixed with 'Use this tool to display the <name> component in the chat…'. The agent must call this new tool to render anything. useComponent does NOT register a renderer for an existing tool. Agents read the name 'useComponent' as 'register a component for this tool' and end up silently creating tool-call-less renderers that never fire."
        wrong_pattern: |
          // Intended: show a card whenever the agent calls my existing "search" tool
          useFrontendTool({ name: "search", parameters, handler });
          useComponent({
            name: "search",
            parameters: z.object({ q: z.string() }),
            render: ({ parameters }) => <SearchCard q={parameters.q} />,
          });
          // Result: useComponent creates a SECOND tool also named "search" — collision + silent override
        correct_pattern: |
          // For progress UI on an existing tool, use useRenderTool:
          useFrontendTool({ name: "search", parameters, handler });
          useRenderTool({
            name: "search",
            parameters: z.object({ q: z.string() }),
            render: ({ status, parameters, result }) => { /* ... */ },
          });
          // useComponent is only for render-only tools the agent invokes:
          useComponent({
            name: "productCard",
            parameters: z.object({ productId: z.string() }),
            render: ({ parameters }) => <ProductCard id={parameters.productId} />,
          });
          // — this registers a new tool productCard whose sole effect is rendering.
        source: "packages/react-core/src/v2/hooks/use-component.tsx:59-88 (wraps useFrontendTool with synthesized handler); maintainer Phase 4c (misleading-name trap)"
        priority: "HIGH"
      - mistake: "Using useRenderTool({ name: '*' }) directly for a fallback"
        mechanism: "The sanctioned wildcard API is useDefaultRenderTool — it wraps useRenderTool({ name: '*' }) with a proper DefaultRenderProps typing (parameters: unknown) and provides a built-in default card when no render is passed. Hand-rolling the wildcard loses the default card and invites the untyped-args footgun."
        wrong_pattern: |
          useRenderTool({ name: "*", render: ({ parameters }) => <pre>{JSON.stringify(parameters)}</pre> });
        correct_pattern: |
          // Use the built-in default card:
          useDefaultRenderTool();
          // Or customize:
          useDefaultRenderTool({
            render: ({ name, status, parameters, result }) => {
              // parameters is unknown — narrow by name
              if (name === "search") {
                const args = parameters as { q: string };
                return <SearchCard q={args.q} status={status} />;
              }
              return <GenericCard name={name} status={status} />;
            },
          });
        source: "packages/react-core/src/v2/hooks/use-default-render-tool.tsx:15-64"
        priority: "HIGH"
      - mistake: "Writing JSX from scratch — see client-side-tools failure #3"
        mechanism: "Same anti-pattern — renderer must reuse the app's UI kit."
        wrong_pattern: |
          render: () => <div className="my-badge">…</div>
        correct_pattern: |
          render: () => <Badge variant="secondary">…</Badge>
        source: "maintainer interview (Phase 2c)"
        priority: "CRITICAL"
        skills:
          ["rendering-tool-calls", "client-side-tools", "human-in-the-loop"]

  - name: "Gate tools behind human approval"
    slug: "human-in-the-loop"
    domain: "tool-calling"
    description: >
      Use useHumanInTheLoop to pause agent execution until the user responds via respond().
      Understand the respond-only-during-executing rule and the unmount-while-pending risk.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useHumanInTheLoop<T>(tool, deps?)"
      - "ReactHumanInTheLoop: Omit<FrontendTool<T>, 'handler'> & { render }"
      - "respond signature: undefined | Promise<void> depending on status"
      - "Synthesized Promise-based handler"
      - "Unmount removes the renderer (unlike useFrontendTool)"
    tasks:
      - "Require user approval before deleting data"
      - "Prompt the user for an input mid-run"
    failure_modes:
      - mistake: "Never calling respond()"
        mechanism: "Handler Promise never resolves; agent run hangs indefinitely; thread stays locked."
        wrong_pattern: |
          render: ({ args, status, respond }) => (
            <div><p>Delete {args.id}?</p><button>OK</button></div>
          );
        correct_pattern: |
          render: ({ args, status, respond }) => (
            <div>
              <p>Delete {args.id}?</p>
              <button onClick={() => respond?.("approved")}>OK</button>
              <button onClick={() => respond?.("denied")}>Cancel</button>
            </div>
          );
        source: "packages/react-core/src/v2/hooks/use-human-in-the-loop.tsx:13-26"
        priority: "CRITICAL"
      - mistake: "Calling respond from in-progress or complete"
        mechanism: "respond is undefined outside Executing; widening to any silently no-ops."
        wrong_pattern: |
          render: ({ status, respond }) => <button onClick={() => (respond as any)("yes")}>Yes</button>
        correct_pattern: |
          render: ({ status, respond }) => status === "executing" && respond
            ? <button onClick={() => respond("yes")}>Yes</button>
            : <p>Waiting…</p>
        source: "packages/react-core/src/v2/types/human-in-the-loop.ts:8-32"
        priority: "HIGH"
      - mistake: "Unmounting the render while Executing (user navigates away)"
        mechanism: "Renderer is removed; pending Promise abandoned; agent run hangs."
        wrong_pattern: |
          // Navigating to a different page mid-approval without surfacing the prompt globally
        correct_pattern: |
          // Keep HITL UI mounted at a layout level, or call agent.abortRun on unmount.
          useEffect(() => () => { if (running) agent.abortRun(); }, [running]);
        source: "packages/react-core/src/v2/hooks/use-human-in-the-loop.tsx:76-80"
        priority: "HIGH"
      - mistake: "Writing JSX from scratch for approval modal — see client-side-tools failure #3"
        mechanism: "Same anti-pattern — use the consumer's Dialog/AlertDialog."
        wrong_pattern: |
          render: ({ respond }) => <div style={{ position: "fixed", inset: 0 }}>…</div>
        correct_pattern: |
          import { AlertDialog, AlertDialogContent, AlertDialogAction } from "@/components/ui/alert-dialog";
          render: ({ respond }) => <AlertDialog open><AlertDialogContent>…</AlertDialogContent></AlertDialog>
        source: "maintainer interview (Phase 2c)"
        priority: "CRITICAL"

  - name: "Define server-side tools"
    slug: "server-side-tools"
    domain: "tool-calling"
    description: >
      Use defineTool to give BuiltInAgent tools that execute on the server. Understand the
      server-vs-client-tool tradeoff — server tools for I/O and secrets, client tools for UI
      and browser APIs. Avoid the reserved AG-UI tool names.
    type: "core"
    packages: ["@copilotkit/runtime"]
    covers:
      - "defineTool({ name, description, parameters, execute })"
      - "Standard Schema V1 parameters (zod/valibot/arktype)"
      - "ToolDefinition flowing into BuiltInAgent.config.tools"
      - "Merge order: input.tools (frontend) first, config.tools (server) overwrites on collision"
      - "Reserved names: AGUISendStateSnapshot, AGUISendStateDelta"
    tasks:
      - "Add a DB query tool that reads from the server's connection pool"
      - "Expose a signed-URL generator tool for uploads"
      - "Combine server tools with browser-side render-only tools"
    failure_modes:
      - mistake: "Using defineTool for tools that should render UI"
        mechanism: "Server tools execute server-side and stream results only; the browser never sees a TOOL_CALL_START to mount a renderer against."
        wrong_pattern: |
          defineTool({ name: "showModal", parameters, execute: async () => "rendered" });
        correct_pattern: |
          // Keep UI on the client
          useFrontendTool({ name: "showModal", parameters, handler, ... });
          // Or use useComponent for render-only
        source: "dev-docs/architecture/plugin-points.md:36-77; docs/integrations/built-in-agent/server-tools.mdx:9-14"
        priority: "HIGH"
      - mistake: "Redefining AG-UI reserved names"
        mechanism: "AGUISendStateSnapshot/AGUISendStateDelta are auto-injected by BuiltInAgent classic mode and would be silently overwritten."
        wrong_pattern: |
          defineTool({ name: "AGUISendStateSnapshot", parameters, execute });
        correct_pattern: |
          defineTool({ name: "mySnapshotExport", parameters, execute });
        source: "packages/runtime/src/agent/index.ts:1139-1177"
        priority: "MEDIUM"
      - mistake: "Throwing from execute without a result"
        mechanism: "Thrown errors kill the run; unserializable results become '[Unserializable tool result from X]'."
        wrong_pattern: |
          defineTool({ name: "query", execute: async () => { throw new Error("db down") } });
        correct_pattern: |
          defineTool({ name: "query", execute: async () => {
            try { return await db.query(...); }
            catch (e) { return { error: String(e), retryable: true }; }
          }});
        source: "packages/runtime/src/agent/index.ts:1469-1474"
        priority: "MEDIUM"
      - mistake: "Passing a JSON-schema object as parameters"
        mechanism: "parameters must be Standard Schema V1; plain JSON throws in schemaToJsonSchema."
        wrong_pattern: |
          defineTool({ name: "x", parameters: { type: "object", properties: { q: { type: "string" } } }, execute });
        correct_pattern: |
          defineTool({ name: "x", parameters: z.object({ q: z.string() }), execute });
        source: "packages/runtime/src/agent/index.ts:633-659"
        priority: "MEDIUM"
    cross_references:
      - to: "built-in-agent"
        reason: "Server tools flow into BuiltInAgent.config.tools — unavailable in factory mode."
      - to: "client-side-tools"
        reason: "Paired decision — many apps need both."

  # ===================== Runtime Setup =====================

  - name: "Set up a CopilotKit runtime endpoint"
    slug: "setup-endpoint"
    domain: "runtime-setup"
    description: >
      Mount a CopilotRuntime in any JS runtime. createCopilotRuntimeHandler is the canonical
      fetch-based primitive and the strongly-preferred path — use it even in Express/Hono/Node
      apps by delegating to it. Works on Cloudflare Workers, Bun, Deno, Vercel Edge, React
      Router v7 framework mode, TanStack Start. The Express and Hono adapters exist for
      backwards compat but are actively discouraged — the maintainer flags them as
      "avoid at all costs."
    type: "framework"
    packages: ["@copilotkit/runtime"]
    covers:
      - "createCopilotRuntimeHandler({ runtime, basePath, mode, cors, hooks }) — STRONGLY PREFERRED canonical factory"
      - "createCopilotNodeListener — for raw Node http servers (thin adapter over fetch primitive)"
      - "createCopilotExpressHandler / createCopilotHonoHandler — DEPRECATED-IN-INTENT, avoid at all costs (maintainer guidance)"
      - "Multi-route vs single-route mode"
      - "Routes: /info, /agent/:id/run|connect|stop/:threadId, /transcribe, /threads/*"
      - "hooks.onRequest / onBeforeHandler / onResponse / onError"
      - "Cloudflare Workers / Bun / Deno / edge / RR v7 / TanStack Start support"
    tasks:
      - "Deploy a runtime to Cloudflare Workers with env-sourced API keys"
      - "Mount inside a React Router v7 loader/action"
      - "Use single-route mode behind a strict reverse proxy"
      - "Mount in Express by delegating to createCopilotRuntimeHandler (NOT createCopilotExpressHandler)"
    failure_modes:
      - mistake: "Instantiating Express handler without basePath"
        mechanism: "normalizeBasePath throws 'basePath must be provided for Express endpoint' at mount time — server crashes."
        wrong_pattern: |
          app.use(createCopilotExpressHandler({ runtime }));
        correct_pattern: |
          app.use(createCopilotExpressHandler({ runtime, basePath: "/api/copilotkit" }));
        source: "packages/runtime/src/v2/runtime/endpoints/express.ts:161"
        priority: "CRITICAL"
      - mistake: "Using createCopilotExpressHandler / createCopilotHonoHandler in new code"
        mechanism: "The Express and Hono adapters are a deprecated-in-intent surface — maintainer flags them as 'avoid at all costs.' They pull in heavier dependencies, add a framework binding, and make it harder to port. The fetch-based createCopilotRuntimeHandler works in Express (call handler(request) from a route handler), Hono (same), RR v7 (loader/action), TanStack Start (server route), Next.js App Router (GET/POST), CF Workers, Bun, Deno. Training-data agents default to the adapter names because they appear in older examples."
        wrong_pattern: |
          // Express
          import { createCopilotExpressHandler } from "@copilotkit/runtime/v2/express";
          app.use("/api/copilotkit", createCopilotExpressHandler({ runtime, basePath: "/api/copilotkit" }));
          // Hono
          import { createCopilotHonoHandler } from "@copilotkit/runtime/v2/hono";
          app.route("/api/copilotkit", createCopilotHonoHandler({ runtime, basePath: "/api/copilotkit" }));
        correct_pattern: |
          // Express — delegate to the fetch handler:
          import { createCopilotRuntimeHandler } from "@copilotkit/runtime/v2";
          const handler = createCopilotRuntimeHandler({ runtime, basePath: "/api/copilotkit" });
          app.all("/api/copilotkit/*", async (req, res) => {
            const webReq = new Request(new URL(req.url, `http://${req.headers.host}`), {
              method: req.method, headers: req.headers as any, body: req.body,
            });
            const webRes = await handler(webReq);
            res.status(webRes.status); webRes.headers.forEach((v, k) => res.setHeader(k, v));
            res.send(await webRes.text());
          });
          // Hono — same pattern, Hono already speaks Request/Response:
          app.all("/api/copilotkit/*", (c) => handler(c.req.raw));
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:1-27; maintainer Phase 4d (design regret — avoid Express/Hono adapters at all costs)"
        priority: "CRITICAL"
      - mistake: "Using framework adapter on Workers/Bun/Deno"
        mechanism: "Adapters bundle Node polyfills unnecessarily in fetch-native runtimes; and they are the avoid-at-all-costs path per above."
        wrong_pattern: |
          // Cloudflare Worker
          import { createCopilotHonoHandler } from "@copilotkit/runtime/v2/hono";
          export default app;
        correct_pattern: |
          import { createCopilotRuntimeHandler } from "@copilotkit/runtime/v2";
          const handler = createCopilotRuntimeHandler({ runtime, basePath: "/api/copilotkit" });
          export default { fetch: (req, env) => handler(req) };
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:1-27"
        priority: "HIGH"
      - mistake: "Returning a Response from beforeRequestMiddleware"
        mechanism: "Only Request | void are honored; any other return is ignored. Responses must be thrown."
        wrong_pattern: |
          beforeRequestMiddleware: async () => new Response("Unauthorized", { status: 401 })
        correct_pattern: |
          // In middleware: throw new Response(...); or use hooks:
          hooks: { onRequest: ({ request }) => {
            if (!request.headers.get("authorization")) throw new Response("Unauthorized", { status: 401 });
          }}
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:148-156"
        priority: "HIGH"
      - mistake: "Calling multi-route paths against a single-route handler"
        mechanism: "Single-route expects POST basePath with { method, params, body } envelope; URL-pattern calls 404."
        wrong_pattern: |
          // handler = createCopilotRuntimeHandler({ mode: "single-route" })
          fetch("/api/copilotkit/agent/x/run", { method: "POST", body: ... });
        correct_pattern: |
          fetch("/api/copilotkit", { method: "POST", body: JSON.stringify({
            method: "agent/run", params: { agentId: "x" }, body: {...}
          })});
          // Also: set <CopilotKitProvider useSingleEndpoint />
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:86-90,350-401"
        priority: "MEDIUM"
      - mistake: "Double-layering CORS"
        mechanism: "Express adapter sets cors: false on the inner handler and handles CORS at router layer — user-added cors() duplicates headers."
        wrong_pattern: |
          app.use(cors());
          app.use(createCopilotExpressHandler({ runtime, basePath, cors: { origin: "..." } }));
        correct_pattern: |
          // Pick one — adapter's cors option OR your own cors(), not both.
          app.use(createCopilotExpressHandler({ runtime, basePath, cors: { origin: "https://my.app" } }));
        source: "packages/runtime/src/v2/runtime/endpoints/express.ts:100-143"
        priority: "MEDIUM"
    cross_references:
      - to: "middleware"
        reason: "Endpoint handler invokes middleware and hooks on every request."
      - to: "intelligence-mode"
        reason: "Routes flip when intelligence is configured (/threads/* enabled)."

  - name: "Hook into the request lifecycle"
    slug: "middleware"
    domain: "runtime-setup"
    description: >
      Wire auth, logging, rate-limiting into the runtime via legacy beforeRequestMiddleware /
      afterRequestMiddleware, or the newer hooks (onRequest / onBeforeHandler / onResponse /
      onError) on createCopilotRuntimeHandler. Do NOT implement the cross-cutting concerns
      themselves here — delegate to server-framework / platform tools.
    type: "core"
    packages: ["@copilotkit/runtime"]
    covers:
      - "beforeRequestMiddleware / afterRequestMiddleware (legacy)"
      - "hooks.onRequest / onBeforeHandler / onResponse / onError (newer)"
      - "Throw Response to short-circuit"
      - "afterRequestMiddleware runs non-blocking on a response clone"
      - "Route-aware hooks via onBeforeHandler({ route })"
    tasks:
      - "Reject unauthenticated requests at the runtime boundary"
      - "Log response status + agent ID without blocking SSE"
      - "Capture telemetry for failed agent runs via onError"
    failure_modes:
      - mistake: "Returning a Response instead of throwing"
        mechanism: "See setup-endpoint failure #3 — applies here too."
        wrong_pattern: |
          beforeRequestMiddleware: async () => new Response("Unauthorized", { status: 401 })
        correct_pattern: |
          beforeRequestMiddleware: async ({ request }) => {
            if (!request.headers.get("authorization")) throw new Response("Unauthorized", { status: 401 });
          }
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:148-156"
        priority: "HIGH"
      - mistake: "Defaulting to beforeRequestMiddleware when hooks.onRequest / onBeforeHandler is preferred"
        mechanism: "Both middleware systems coexist. Agents trained on earlier v2 examples default to the legacy beforeRequestMiddleware name because it's more familiar. For new code the hook-based API on createCopilotRuntimeHandler is preferred: hooks.onRequest (broad), hooks.onBeforeHandler (route-aware, has { route, request }). Legacy middleware stays around for backwards-compat but is the less-recommended path."
        wrong_pattern: |
          new CopilotRuntime({
            agents,
            beforeRequestMiddleware: async ({ request, path }) => {
              if (path.includes("/agent/admin/")) { /* check admin auth */ }
            },
          });
        correct_pattern: |
          const runtime = new CopilotRuntime({ agents });
          const handler = createCopilotRuntimeHandler({
            runtime,
            basePath: "/api/copilotkit",
            hooks: {
              onBeforeHandler: ({ route, request }) => {
                if (route.method === "agent/run" && route.agentId === "admin") { /* ... */ }
              },
            },
          });
        source: "packages/runtime/src/v2/runtime/core/hooks.ts:84-117; maintainer Phase 4c (misleading-name trap)"
        priority: "MEDIUM"
      - mistake: "Route-specific auth in global beforeRequestMiddleware"
        mechanism: "At that stage, no route info yet. onBeforeHandler is route-aware."
        wrong_pattern: |
          beforeRequestMiddleware: async ({ path, request }) => {
            if (path.includes("/agent/admin/")) { ... }
          }
        correct_pattern: |
          hooks: { onBeforeHandler: ({ route, request }) => {
            if (route.method === "agent/run" && route.agentId === "admin") { ... }
          }}
        source: "packages/runtime/src/v2/runtime/core/hooks.ts:94-103"
        priority: "MEDIUM"
      - mistake: "Blocking on afterRequestMiddleware"
        mechanism: "It runs non-blocking via .catch — errors only log. Heavy work delays nothing but can be lost."
        wrong_pattern: |
          afterRequestMiddleware: async ({ response }) => { await heavyAnalytics(response); }
        correct_pattern: |
          afterRequestMiddleware: async ({ messages, threadId }) => {
            void queue.enqueue({ type: "chat", threadId, messages });
          }
        source: "packages/runtime/src/v2/runtime/core/fetch-handler.ts:225-234"
        priority: "MEDIUM"
      - mistake: "Passing a webhook URL string as middleware"
        mechanism: "Runtime logs 'Unsupported beforeRequestMiddleware value – skipped' and does nothing."
        wrong_pattern: |
          beforeRequestMiddleware: "https://hooks.example/auth"
        correct_pattern: |
          beforeRequestMiddleware: async ({ request }) => {
            await fetch("https://hooks.example/auth", { method: "POST", body: request.headers.get("authorization") });
          }
        source: "packages/runtime/src/v2/runtime/core/middleware.ts:72-87"
        priority: "MEDIUM"
      - mistake: "Teaching auth/rate-limit inside CopilotKit middleware"
        mechanism: "These are server-framework concerns. Middleware is the hook to invoke them, not a replacement."
        wrong_pattern: |
          beforeRequestMiddleware: async ({ request }) => {
            // implementing token bucket rate limiting with redis inline...
          }
        correct_pattern: |
          // Use a real rate-limit lib / gateway (upstash, @upstash/ratelimit, fastly), call it from middleware.
          beforeRequestMiddleware: async ({ request }) => {
            const { success } = await ratelimit.limit(request.headers.get("x-user-id"));
            if (!success) throw new Response("Too Many Requests", { status: 429 });
          }
        source: "maintainer interview (Phase 2c)"
        priority: "HIGH"
    cross_references:
      - to: "setup-endpoint"
        reason: "hooks are passed to createCopilotRuntimeHandler."
      - to: "go-to-production"
        reason: "Production checklist points here for auth/rate-limit wiring."

  - name: "Persist agent state with a runner"
    slug: "agent-runners"
    domain: "runtime-setup"
    description: >
      Choose an AgentRunner — InMemoryAgentRunner (default, ephemeral), SqliteAgentRunner
      (file-backed), IntelligenceAgentRunner (auto-selected), or a custom one extending
      AgentRunner. Understand thread-locking semantics.
    type: "core"
    packages: ["@copilotkit/runtime", "@copilotkit/sqlite-runner"]
    covers:
      - "AgentRunner abstract: run / connect / isRunning / stop"
      - "InMemoryAgentRunner (globalThis Symbol store)"
      - "SqliteAgentRunner with better-sqlite3 peer"
      - "Thread already running → 409 pattern"
      - "Cannot pass runner in Intelligence mode"
    tasks:
      - "Persist threads across server restarts via SQLite"
      - "Write a Redis-backed custom runner for multi-instance deploys"
      - "Handle double-submit (409) gracefully on the client"
    subsystems:
      - name: "InMemoryAgentRunner"
        package: "@copilotkit/runtime"
        config_surface: "No config; globalThis-keyed singleton across hot reloads"
      - name: "SqliteAgentRunner"
        package: "@copilotkit/sqlite-runner"
        config_surface: "{ dbPath?: ':memory:' }; requires better-sqlite3 peer"
      - name: "IntelligenceAgentRunner"
        package: "@copilotkit/runtime"
        config_surface: "Auto-constructed by CopilotIntelligenceRuntime from wsUrl/authToken"
    failure_modes:
      - mistake: "Shipping InMemoryAgentRunner to production"
        mechanism: "Threads lost on restart; load-balanced instances see divergent state."
        wrong_pattern: |
          // production:
          new CopilotRuntime({ agents: { default: agent } });
        correct_pattern: |
          new CopilotRuntime({ agents: { default: agent }, runner: new SqliteAgentRunner({ dbPath: "./data/threads.db" }) });
          // Or upgrade to Intelligence mode for managed durability.
        source: "packages/runtime/src/v2/runtime/runner/in-memory.ts:63-96"
        priority: "HIGH"
      - mistake: "Setting runner alongside intelligence option"
        mechanism: "CopilotIntelligenceRuntimeOptions excludes runner — Intelligence forces IntelligenceAgentRunner."
        wrong_pattern: |
          new CopilotRuntime({ agents, intelligence, runner: new SqliteAgentRunner() });
        correct_pattern: |
          new CopilotRuntime({ agents, intelligence, identifyUser });
        source: "packages/runtime/src/v2/runtime/core/runtime.ts:149-173,285-294"
        priority: "HIGH"
      - mistake: "Forgetting better-sqlite3 peer"
        mechanism: "Constructor throws a multi-line install hint."
        wrong_pattern: |
          pnpm add @copilotkit/sqlite-runner
        correct_pattern: |
          pnpm add @copilotkit/sqlite-runner better-sqlite3
        source: "packages/sqlite-runner/src/sqlite-runner.ts:57-66"
        priority: "HIGH"
      - mistake: "Default SqliteAgentRunner with :memory: dbPath"
        mechanism: "Default is in-memory — data lost at restart."
        wrong_pattern: |
          new SqliteAgentRunner();
        correct_pattern: |
          new SqliteAgentRunner({ dbPath: "./data/threads.db" });
        source: "packages/sqlite-runner/src/sqlite-runner.ts"
        priority: "HIGH"
      - mistake: "Concurrent runs on the same threadId"
        mechanism: "Both runners throw 'Thread already running'; UI may show a runtime error banner."
        wrong_pattern: |
          // Double-click send button → two POST /run to same thread
        correct_pattern: |
          // Debounce client-side; catch code='agent_thread_locked' in onError and show 'Agent busy' UI.
        source: "packages/runtime/src/v2/runtime/runner/in-memory.ts:110"
        priority: "MEDIUM"

  - name: "Upgrade to Intelligence mode"
    slug: "intelligence-mode"
    domain: "runtime-setup"
    description: >
      Add durable threads and a realtime websocket by pointing CopilotKitIntelligence at
      CopilotKit Cloud (api.cloud.copilotkit.ai). Intelligence is a hosted service — NOT
      self-hostable. Frontend does not change; CopilotKitCore switches transport
      automatically after /info reports mode=intelligence.
    type: "core"
    packages: ["@copilotkit/runtime"]
    covers:
      - "CopilotKitIntelligence client: { apiUrl, wsUrl, apiKey, organizationId }"
      - "Cloud endpoints: apiUrl='https://api.cloud.copilotkit.ai/api', wsUrl='wss://api.cloud.copilotkit.ai/socket' (confirm exact paths with CopilotKit team / cloud.copilotkit.ai)"
      - "Not self-hostable — Intelligence is a hosted service only"
      - "apiKey + organizationId obtained from cloud.copilotkit.ai"
      - "identifyUser callback (required)"
      - "lockTtlSeconds (≤3600), lockHeartbeatIntervalSeconds (≤3000), lockKeyPrefix"
      - "generateThreadNames default true"
      - "Thread routes: /threads, /threads/subscribe, PATCH/DELETE/:id, /archive, /:id/messages"
      - "/info response mode: 'intelligence' + intelligence.wsUrl"
      - "Frontend auto-detection of mode"
    tasks:
      - "Turn on Intelligence mode with env-sourced Cloud credentials"
      - "Deploy multi-instance with shared thread state via the hosted platform"
    failure_modes:
      - mistake: "Missing identifyUser"
        mechanism: "Required in CopilotIntelligenceRuntimeOptions — type error at compile time; missing at runtime crashes handlers."
        wrong_pattern: |
          new CopilotRuntime({ agents, intelligence });
        correct_pattern: |
          new CopilotRuntime({
            agents, intelligence,
            identifyUser: (req) => ({ id: req.headers.get("x-user-id")! }),
          });
        source: "packages/runtime/src/v2/runtime/core/runtime.ts:156-160"
        priority: "CRITICAL"
      - mistake: "Calling /threads against an SSE-mode runtime"
        mechanism: "/threads routes gated on isIntelligenceRuntime; SSE lacks the platform."
        wrong_pattern: |
          fetch("/api/copilotkit/threads"); // SSE-only runtime
        correct_pattern: |
          // Either enable Intelligence, or don't call thread routes.
        source: "dev-docs/architecture/setup-intelligence.md:173-188"
        priority: "HIGH"
      - mistake: "Pointing apiUrl / wsUrl at a self-hosted server"
        mechanism: "Intelligence is NOT self-hostable — CopilotKitIntelligence is a client for CopilotKit Cloud's hosted platform. The ɵ-prefixed runtime internals and REST/WS contract are private. Self-hosting attempts will fail at handshake or WebSocket upgrade."
        wrong_pattern: |
          new CopilotKitIntelligence({
            apiUrl: "https://internal.myco.com/intelligence/api",
            wsUrl:  "wss://internal.myco.com/intelligence/socket",
            apiKey, organizationId,
          });
        correct_pattern: |
          new CopilotKitIntelligence({
            apiUrl: "https://api.cloud.copilotkit.ai/api",
            wsUrl:  "wss://api.cloud.copilotkit.ai/socket",
            apiKey: process.env.COPILOTKIT_CLOUD_API_KEY!,
            organizationId: process.env.COPILOTKIT_CLOUD_ORG_ID!,
          });
          // For on-prem durability without Intelligence: use SqliteAgentRunner + SSE mode.
        source: "packages/runtime/src/v2/runtime/intelligence-platform/client.ts:246-708; maintainer Phase 4 (Cloud-only)"
        priority: "CRITICAL"
      - mistake: "Over-clamping lock TTL"
        mechanism: "lockTtlSeconds silently clamped to 3600; lockHeartbeatIntervalSeconds to 3000."
        wrong_pattern: |
          new CopilotRuntime({ agents, intelligence, lockTtlSeconds: 86400 });
        correct_pattern: |
          new CopilotRuntime({ agents, intelligence, lockTtlSeconds: 3600 });
          // Rethink long-running workflows if 1h is insufficient.
        source: "packages/runtime/src/v2/runtime/core/runtime.ts:281-307"
        priority: "LOW"
      - mistake: "generateThreadNames unset expecting no LLM cost"
        mechanism: "Defaults to true; each new thread triggers a naming LLM call."
        wrong_pattern: |
          new CopilotRuntime({ agents, intelligence, identifyUser });
        correct_pattern: |
          new CopilotRuntime({ agents, intelligence, identifyUser, generateThreadNames: false });
        source: "packages/runtime/src/v2/runtime/core/runtime.ts (generateThreadNames default)"
        priority: "MEDIUM"
    cross_references:
      - to: "threads"
        reason: "useThreads depends on Intelligence routes; skills co-document."
      - to: "agent-runners"
        reason: "Intelligence forces IntelligenceAgentRunner; runner skill must flag the exclusion."

