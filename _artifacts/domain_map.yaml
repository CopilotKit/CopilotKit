  - name: "Configure chat suggestions"
    slug: "suggestions"
    domain: "generative-ui"
    description: >
      Configure dynamic (LLM-generated) or static suggestion pills via useConfigureSuggestions
      and read/refresh them via useSuggestions. Scope to agents and availability windows.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useConfigureSuggestions(config | null, deps?)"
      - "DynamicSuggestionsConfig { instructions, minSuggestions, maxSuggestions, available, providerAgentId, consumerAgentId }"
      - "StaticSuggestionsConfig { suggestions, available, consumerAgentId }"
      - "SuggestionAvailability: 'before-first-message' | 'after-first-message' | 'always' | 'disabled'"
      - "useSuggestions({ agentId }) → { suggestions, reloadSuggestions, clearSuggestions, isLoading }"
    tasks:
      - "Generate agent-aware suggestions after each response"
      - "Pin a set of static starters for first-time users"
      - "Reload suggestions on app state change"
    failure_modes:
      - mistake: "Setting available:'disabled' and expecting reload to trigger"
        mechanism: "Normalizes to null config — no-op."
        wrong_pattern: |
          useConfigureSuggestions({ instructions: "...", available: "disabled" });
        correct_pattern: |
          const enabled = useFeatureFlag("suggestions");
          useConfigureSuggestions(enabled ? { instructions: "..." } : null);
        source: "packages/react-core/src/v2/hooks/use-configure-suggestions.tsx:59-62"
        priority: "MEDIUM"
      - mistake: "Inline config object without deps"
        mechanism: "Config re-serialized every render — reload may or may not fire depending on cache equality."
        wrong_pattern: |
          useConfigureSuggestions({ instructions: `about ${currentPage}` });
        correct_pattern: |
          useConfigureSuggestions({ instructions: `about ${currentPage}` }, [currentPage]);
        source: "packages/react-core/src/v2/hooks/use-configure-suggestions.tsx:166-171"
        priority: "MEDIUM"
      - mistake: "Calling reloadSuggestions mid-run"
        mechanism: "use-configure-suggestions skips reload if isRunning; user-triggered reloadSuggestions does not check — may compete with the running agent."
        wrong_pattern: |
          onClick={() => reloadSuggestions()} // during streaming
        correct_pattern: |
          onClick={() => { if (!isRunning) reloadSuggestions(); }}
        source: "packages/react-core/src/v2/hooks/use-configure-suggestions.tsx:121-124"
        priority: "LOW"

  - name: "Render structured activity messages"
    slug: "rendering-activity-messages"
    domain: "generative-ui"
    description: >
      Register renderers for non-chat activity messages like MCP Apps outputs, generative UI
      surfaces, or custom activity types. User renderers take precedence over built-ins.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useRenderActivityMessage() → { renderActivityMessage, findRenderer }"
      - "ReactActivityMessageRenderer { activityType, agentId?, content (schema), render }"
      - "Resolver order: (activityType, agentId) > (activityType, unscoped) > '*' > null"
      - "Built-in: MCPAppsActivityType, OpenGenerativeUIActivityType"
      - "User renderers placed first to override built-ins"
    tasks:
      - "Render a custom activity type from an agent workflow"
      - "Override the built-in MCP Apps renderer"
    failure_modes:
      - mistake: "Incompatible content schema"
        mechanism: "safeParse fails → console.warn + render null silently."
        wrong_pattern: |
          useRenderActivityMessage({ activityType: "progress", content: z.object({ pct: z.number() }), render });
          // server emits { percent: 0.5 }  ← field name mismatch
        correct_pattern: |
          useRenderActivityMessage({ activityType: "progress", content: z.object({ percent: z.number() }), render });
        source: "packages/react-core/src/v2/hooks/use-render-activity-message.tsx:44-50"
        priority: "HIGH"
      - mistake: "Side effects in render"
        mechanism: "Re-rendered on every message tick; effects fire repeatedly."
        wrong_pattern: |
          render: ({ content }) => { trackEvent(content); return <Badge>{content.label}</Badge>; }
        correct_pattern: |
          render: ({ content }) => { useEffect(() => trackEvent(content), [content]); return <Badge>{content.label}</Badge>; }
        source: "packages/react-core/src/v2/hooks/use-render-activity-message.tsx"
        priority: "MEDIUM"

