# ===================== Cross-skill tensions =====================

tensions:
  - name: "Quickstart simplicity vs production durability"
    skills: ["0-to-working-chat", "agent-runners", "go-to-production"]
    description: >
      InMemoryAgentRunner is the default and lets the scaffold 'just work', but silently loses
      state on restart and breaks across horizontally-scaled replicas.
    implication: >
      Agents generating quickstart code will reproduce the default and ship it to prod.
      Skills must push persistent-runner guidance early, not as an optional upgrade.

  - name: "SPA convenience vs secret exposure"
    skills: ["spa-without-runtime", "go-to-production", "provider-setup"]
    description: >
      CopilotKit Cloud (publicLicenseKey) is the only production-safe SPA path. Both
      agents__unsafe_dev_only and selfManagedAgents are dev-only aliases for the same local
      agent registration and leak credentials if used with a credentialed agent in the
      browser. The well-intentioned name "selfManagedAgents" invites the exact
      misinterpretation that it's a production-safe way to avoid the Cloud.
    implication: >
      Agents will reach for selfManagedAgents because its name sounds safer than the
      "unsafe_dev_only" variant. Skills must treat them as identical (both dev-only) and
      steer every SPA-without-runtime use case to publicLicenseKey.

  - name: "Legacy middleware vs newer hooks"
    skills: ["middleware", "setup-endpoint"]
    description: >
      Both beforeRequestMiddleware/afterRequestMiddleware and hooks.onRequest/onBeforeHandler
      coexist. Route-aware auth belongs in hooks; legacy middleware runs before hooks in the
      same request and has different Response-return semantics.
    implication: >
      Agents will pick the first one they find in docs and mix them inconsistently. Skills
      must call out hooks as the preferred newer surface without deprecating middleware.

  - name: "Tool-typing precision vs wildcard flexibility"
    skills: ["rendering-tool-calls", "client-side-tools"]
    description: >
      Wildcard "*" renderers take z.any() args; specific tool renderers take a typed schema.
      Mixing them loses static safety.
    implication: >
      Agents may default to "*" for all tools to avoid schema work. Skills must steer toward
      typed renderers per tool and reserve "*" for truly-generic UX.

  - name: "v1/v2 subpath confusion"
    skills:
      [
        "v1-to-v2-migration",
        "provider-setup",
        "setup-endpoint",
        "chat-components",
      ]
    description: >
      Same package ships both v1 (root) and v2 (/v2 subpath). Mixed imports compile but route
      through different implementations.
    implication: >
      Agents will copy a v1 snippet into a v2 codebase and not realize the imports differ.
      Every skill that teaches an import must cite the /v2 subpath explicitly.

  - name: "Deprecated surface still accepted — training-data traps"
    skills:
      [
        "setup-endpoint",
        "built-in-agent",
        "middleware",
        "provider-setup",
        "client-side-tools",
        "v1-to-v2-migration",
      ]
    description: >
      v2 ships many preferred and deprecated paths side-by-side without removing the
      deprecated one. Maintainer stance per Phase 4d: "basically most of the deprecated
      stuff — avoid at all costs." Key pairs: createCopilotExpressHandler/HonoHandler vs
      createCopilotRuntimeHandler; BuiltInAgent Simple Mode vs Factory Mode (TanStack AI);
      beforeRequestMiddleware vs hooks.onRequest; agents__unsafe_dev_only vs self-hosted
      runtime; publicApiKey vs publicLicenseKey; createCopilotEndpoint* aliases of the new
      handler names. All compile, all work, all produce code that looks right.
    implication: >
      Agents will generate deprecated-surface code because it's in training data, in code
      samples, and often simpler to explain. Skills must name the preferred path explicitly,
      tag the deprecated name with priority CRITICAL or HIGH depending on production risk,
      and give the wrong_pattern an agent would actually write.

