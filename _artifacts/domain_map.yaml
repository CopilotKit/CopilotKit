# domain_map.yaml
# Generated by skill-domain-discovery
# Library: CopilotKit (v2 surface)
# Version: 1.56.2
# Date: 2026-04-21
# Status: reviewed
# Pilot scope: @copilotkit/runtime, @copilotkit/react-core, @copilotkit/a2ui-renderer
#              (react-ui dropped from pilot — v2 surface is CSS-only)

library:
  name: "CopilotKit"
  version: "1.56.2"
  repository: "https://github.com/CopilotKit/CopilotKit"
  description: >
    Full-stack SDK for building agent-native applications. Connects React (or Angular/Vanilla)
    frontends to any AI agent framework (LangGraph, CrewAI, Mastra, PydanticAI, ADK, LlamaIndex,
    Agno, Strands, Microsoft Agent Framework, A2A, or a built-in Vercel-AI-SDK/TanStack-AI agent)
    via the AG-UI event protocol over SSE or a CopilotKit Intelligence websocket.
  primary_framework: "React"

domains:
  - name: "Client Integration"
    slug: "client-integration"
    description: >
      Setting up the provider, mounting chat UI, and turning on debug tooling. The entrypoint
      developers hit first on the frontend.

  - name: "Agent Interaction"
    slug: "agent-interaction"
    description: >
      Accessing agent instances from React, sharing context with agents, switching between
      multiple agents, and managing durable thread lists.

  - name: "Tool Calling"
    slug: "tool-calling"
    description: >
      Defining tools on either the client or the server that agents can invoke, rendering
      tool-call progress/results in chat, and gating execution behind human approval.

  - name: "Runtime Setup"
    slug: "runtime-setup"
    description: >
      Configuring the server-side CopilotRuntime — endpoint factories across any JS runtime,
      middleware/hooks, persistence runners, transcription, and upgrading to Intelligence mode
      for durable threads and realtime websockets.

  - name: "Agent Implementation"
    slug: "agent-implementation"
    description: >
      Choosing and wiring agents into the runtime — the BuiltInAgent with its Vercel AI SDK /
      TanStack AI / custom factory modes, or an external framework adapter.

  - name: "Generative UI"
    slug: "generative-ui"
    description: >
      Everything an agent can render in chat beyond plain text — suggestions, activity messages,
      per-message injected UI, and A2UI declarative surfaces.

  - name: "Journeys"
    slug: "journeys"
    description: >
      Cross-cutting lifecycle skills that compose multiple domains — scaffold-to-chat,
      SPA-only paths, production readiness, multi-agent scaling, v1→v2 migration, and
      end-to-end troubleshooting.

skills:
  # ===================== Client Integration =====================

  - name: "Set up the CopilotKit provider"
    slug: "provider-setup"
    domain: "client-integration"
    description: >
      Mount CopilotKitProvider, configure runtimeUrl / headers / credentials / properties /
      license / onError / debug / showDevConsole. Understand the "use client" boundary and
      the provisional-agent behavior during Connecting/Error states.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "CopilotKitProvider"
      - "useCopilotKit"
      - "runtimeUrl / publicLicenseKey (canonical) / licenseToken"
      - "publicApiKey — deprecated alias for publicLicenseKey; accept but don't teach"
      - "headers / credentials / properties"
      - "onError with CopilotKitCoreErrorCode"
      - "showDevConsole auto vs explicit"
      - "'use client' boundary (Next.js App Router / RSC)"
      - "EXCLUDED (dev-only, do NOT teach): agents__unsafe_dev_only, selfManagedAgents (aliases for dev-only local agent registration)"
    tasks:
      - "Wrap a Next.js App Router app with the provider in a client boundary"
      - "Pass rotating auth headers via memoized callback"
      - "Globally handle errors via onError"
    failure_modes:
      - mistake: "Mounting provider in an RSC tree"
        mechanism: "react-core/v2/index.ts starts with 'use client'; mounted from a server component the provider silently erases interactivity."
        wrong_pattern: |
          // app/page.tsx (server component)
          import { CopilotKitProvider } from "@copilotkit/react-core/v2";
          export default function Page() {
            return <CopilotKitProvider runtimeUrl="/api/copilotkit">...</CopilotKitProvider>;
          }
        correct_pattern: |
          // app/providers.tsx
          "use client";
          import { CopilotKitProvider } from "@copilotkit/react-core/v2";
          export function Providers({ children }) {
            return <CopilotKitProvider runtimeUrl="/api/copilotkit">{children}</CopilotKitProvider>;
          }
          // app/layout.tsx imports <Providers>.
        source: "packages/react-core/src/v2/index.ts:1"
        priority: "CRITICAL"
      - mistake: "Inline prop arrays rebuilding every render"
        mechanism: "useStableArrayProp diffs shape and console.errors + thrashes tool/renderer registration on every render."
        wrong_pattern: |
          <CopilotKitProvider frontendTools={[{ name: "foo", handler: fn }]} />
        correct_pattern: |
          const tools = useMemo(() => [{ name: "foo", handler: fn }], []);
          <CopilotKitProvider frontendTools={tools} />
          // Or prefer useFrontendTool inside a child component.
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:324-340,426-433"
        priority: "HIGH"
      - mistake: "Using agents__unsafe_dev_only or selfManagedAgents for production agents"
        mechanism: "Both props are aliases for the same dev-only local agent registration mechanism — they merge into the same mergedAgents object at CopilotKitProvider.tsx:393. Neither provides auth or server-side secret handling. Embedding any agent with credentials on either prop ships them to the browser."
        wrong_pattern: |
          <CopilotKitProvider agents__unsafe_dev_only={{ default: new BuiltInAgent({ apiKey: "..." }) }} />
          // or the equivalent:
          <CopilotKitProvider selfManagedAgents={{ default: new BuiltInAgent({ apiKey: "..." }) }} />
        correct_pattern: |
          // Always go through a runtime:
          <CopilotKitProvider runtimeUrl="/api/copilotkit" />
          // For SPA with no backend, use CopilotKit Cloud:
          <CopilotKitProvider publicLicenseKey="ck_..." />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:136-138,393; packages/core/src/core/core.ts:37-38"
        priority: "CRITICAL"
      - mistake: "Dynamic headers callback without memoization"
        mechanism: "headers is evaluated once per render; without useMemo the provider diff-churns and may not capture latest token."
        wrong_pattern: |
          <CopilotKitProvider headers={() => ({ Authorization: `Bearer ${latestToken}` })} />
        correct_pattern: |
          const headers = useMemo(() => ({ Authorization: `Bearer ${token}` }), [token]);
          <CopilotKitProvider headers={headers} />
          // For rotation: copilotkit.setHeaders(newHeaders) imperatively from a ref.
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:399-410"
        priority: "HIGH"
      - mistake: "Missing onError — silent runtime failures"
        mechanism: "Core still emits errors but UI stays in Connecting/Error state with provisional agents; users see 'connecting…' forever."
        wrong_pattern: |
          <CopilotKitProvider runtimeUrl="/api/copilotkit" />
        correct_pattern: |
          <CopilotKitProvider
            runtimeUrl="/api/copilotkit"
            onError={({ code, error, context }) => telemetry.capture({ code, error, context })}
          />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:638-660; packages/core/src/core/core.ts:71-96"
        priority: "HIGH"

  - name: "Mount a chat UI"
    slug: "chat-components"
    domain: "client-integration"
    description: >
      Use CopilotChat / CopilotPopup / CopilotSidebar or the headless CopilotChatView + slot
      primitives. Understand that react-ui v2 is CSS-only — chat components ship from
      react-core/v2.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "CopilotChat, CopilotPopup, CopilotSidebar"
      - "CopilotChatView (headless)"
      - "CopilotChatInput / CopilotChatMessageView / CopilotChatSuggestionView / CopilotChatSuggestionPill"
      - "CopilotChatAssistantMessage / UserMessage / ReasoningMessage / ToolCallsView"
      - "CopilotChatAudioRecorder / CopilotChatToggleButton / CopilotModalHeader"
      - "CopilotChatAttachmentQueue / CopilotChatAttachmentRenderer"
      - "labels / threadId / agentId / throttleMs / isModalDefaultOpen / chatView slot"
    tasks:
      - "Drop a floating chat popup into an existing app"
      - "Build a custom layout with CopilotChatView slots"
      - "Switch between pre-built chat layouts"
    failure_modes:
      - mistake: "Importing CopilotPanel"
        mechanism: "CopilotPanel does not exist in v2. Likely a baseline-skill hallucination."
        wrong_pattern: |
          import { CopilotPanel } from "@copilotkit/react-core/v2";
        correct_pattern: |
          import { CopilotChat, CopilotPopup, CopilotSidebar, CopilotChatView } from "@copilotkit/react-core/v2";
        source: "packages/react-core/src/v2/components/chat/index.ts (no CopilotPanel export)"
        priority: "CRITICAL"
      - mistake: "Importing chat components from @copilotkit/react-ui in v2"
        mechanism: "react-ui is v1-only. Its /v2 subpath is literally a CSS-only import. All v2 chat components live in react-core/v2."
        wrong_pattern: |
          import { CopilotPopup } from "@copilotkit/react-ui";
          import "@copilotkit/react-ui/styles.css";
        correct_pattern: |
          import { CopilotPopup } from "@copilotkit/react-core/v2";
          import "@copilotkit/react-core/v2/styles.css";
        source: "packages/react-ui/src/v2/index.ts (CSS-only); docs/snippets/shared/troubleshooting/migrate-to-v2.mdx:42-56"
        priority: "CRITICAL"
      - mistake: "Passing messages / isRunning to <CopilotChat>"
        mechanism: "Those props are Omit'd from CopilotChatProps — the component manages them internally via useAgent."
        wrong_pattern: |
          <CopilotChat agentId="default" messages={myMessages} isRunning={busy} />
        correct_pattern: |
          // For manual control, drop down to headless CopilotChatView:
          <CopilotChatView messages={myMessages} isRunning={busy} onSubmit={...}>
            <CopilotChatMessageView /> <CopilotChatInput />
          </CopilotChatView>
        source: "packages/react-core/src/v2/components/chat/CopilotChat.tsx:37-80"
        priority: "HIGH"
      - mistake: "Two <CopilotChat> with same agentId and threadId"
        mechanism: "Both mount the same WeakMap-cached per-thread clone and submit duplicate messages."
        wrong_pattern: |
          <CopilotChat agentId="research" threadId="t1" />
          <CopilotChat agentId="research" threadId="t1" />
        correct_pattern: |
          // Give each surface its own threadId, or mount only one instance.
          <CopilotChat agentId="research" threadId="panel-a" />
          <CopilotChat agentId="research" threadId="panel-b" />
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:78-119"
        priority: "MEDIUM"
    cross_references:
      - to: "provider-setup"
        reason: "Chat requires CopilotKitProvider — every surface does."
      - to: "agent-access"
        reason: "CopilotChat internally calls useAgent; understanding throttle/updates helps debug render behavior."
      - to: "suggestions"
        reason: "CopilotChatSuggestionView is how suggestions render — paired design."

  - name: "Handle chat attachments"
    slug: "attachments"
    domain: "client-integration"
    description: >
      Use useAttachments to manage file/image attachments in chat — drag-and-drop, click-to-upload,
      clipboard paste, custom upload backends, and queue draining on submit. The hook powers the
      built-in attachments={{ enabled: true }} prop on <CopilotChat> and is also usable directly
      for custom chat surfaces.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useAttachments({ config: AttachmentsConfig }): UseAttachmentsReturn"
      - "AttachmentsConfig: { enabled, accept, maxSize, onUpload, onUploadFailed }"
      - "Default accept: '*/*'; default maxSize: 20MB (20*1024*1024 bytes)"
      - "Three upload paths: <input type=file onChange=handleFileUpload>, drag-drop via handleDragOver/Leave/Drop, clipboard paste scoped to containerRef"
      - "Upload modes: built-in base64 inline OR custom via onUpload(file) callback"
      - "Lifecycle: uploading → ready; consumeAttachments() drains ready queue on submit"
      - "Attachment.status = 'uploading' | 'ready' (failed items are dropped from the queue)"
      - "Stable callbacks — all handlers are referentially stable via useCallback+refs"
    tasks:
      - "Enable image uploads on <CopilotChat>"
      - "Wire a custom S3/presigned-URL upload via onUpload"
      - "Build a custom chat surface that supports paste-to-attach"
      - "Restrict uploads to specific MIME types"
    failure_modes:
      - mistake: "Forgetting to call consumeAttachments on submit"
        mechanism: "Attachments stay in the queue across messages — the next message includes stale attachments. consumeAttachments() returns ready items AND clears the queue; if you submit without calling it, no cleanup happens."
        wrong_pattern: |
          const { attachments } = useAttachments({ config: { enabled: true } });
          const onSubmit = () => { sendMessage({ text, attachments }); /* queue not cleared */ };
        correct_pattern: |
          const { consumeAttachments } = useAttachments({ config: { enabled: true } });
          const onSubmit = () => {
            const ready = consumeAttachments();
            sendMessage({ text, attachments: ready });
          };
        source: "packages/react-core/src/v2/hooks/use-attachments.tsx:245-253"
        priority: "HIGH"
      - mistake: "Expecting maxSize in KB or MB"
        mechanism: "maxSize is bytes. Default is 20*1024*1024 (20 MB). Passing maxSize: 10 effectively disables uploads."
        wrong_pattern: |
          useAttachments({ config: { enabled: true, maxSize: 10 } }); // 10 bytes!
        correct_pattern: |
          useAttachments({ config: { enabled: true, maxSize: 10 * 1024 * 1024 } }); // 10 MB
        source: "packages/react-core/src/v2/hooks/use-attachments.tsx:73-74"
        priority: "HIGH"
      - mistake: "Using imageUploadsEnabled on <CopilotChat>"
        mechanism: "Deprecated v1 prop. v2 uses attachments={{ enabled: true }} which is powered by useAttachments under the hood."
        wrong_pattern: |
          <CopilotChat imageUploadsEnabled />
        correct_pattern: |
          <CopilotChat attachments={{ enabled: true, accept: "image/*", maxSize: 5 * 1024 * 1024 }} />
        source: "docs/content/docs/(root)/migration-guides/migrate-attachments.mdx; packages/react-core/src/v2/hooks/use-attachments.tsx:53"
        priority: "MEDIUM"
      - mistake: "Ignoring onUploadFailed"
        mechanism: "Upload failures (size, MIME, onUpload throw) silently remove the placeholder from the queue — user sees no feedback unless onUploadFailed is wired."
        wrong_pattern: |
          useAttachments({ config: { enabled: true } });
        correct_pattern: |
          useAttachments({ config: {
            enabled: true,
            onUploadFailed: ({ reason, file, message }) => toast.error(message),
          }});
        source: "packages/react-core/src/v2/hooks/use-attachments.tsx:79-157"
        priority: "MEDIUM"
      - mistake: "Missing containerRef on the paste-scope element"
        mechanism: "Paste handler is scoped to containerRef — pastes outside the container are ignored. Forgetting to attach the ref means paste silently doesn't work."
        wrong_pattern: |
          const { enabled } = useAttachments({ config: { enabled: true } });
          return <div><input type="text" /></div>; // no containerRef attached
        correct_pattern: |
          const { containerRef, fileInputRef, handleDragOver, handleDrop } = useAttachments({ config: { enabled: true } });
          return <div ref={containerRef} onDragOver={handleDragOver} onDrop={handleDrop}><input type="text" /></div>;
        source: "packages/react-core/src/v2/hooks/use-attachments.tsx:207-239"
        priority: "MEDIUM"
    cross_references:
      - to: "chat-components"
        reason: "<CopilotChat attachments={...}> uses useAttachments internally; skills are paired."
      - to: "v1-to-v2-migration"
        reason: "imageUploadsEnabled → attachments migration lives here."

  - name: "Enable client-side debugging"
    slug: "debug-mode"
    domain: "client-integration"
    description: >
      Turn on the web inspector via showDevConsole, wire up the debug prop for event-pipeline
      logging, and anchor the inspector correctly. Keep it out of production.
    type: "core"
    packages: ["@copilotkit/react-core", "@copilotkit/web-inspector"]
    covers:
      - "showDevConsole: boolean | 'auto'"
      - "inspectorDefaultAnchor prop"
      - "debug: boolean | DebugConfig"
      - "CopilotKitInspector component (lazy Lit wrapper)"
      - "MAX_AGENT_EVENTS = 200 / MAX_TOTAL_EVENTS = 500 ring buffers"
    tasks:
      - "Enable the inspector on localhost only"
      - "Log full message payloads during a bug repro"
      - "Anchor inspector to bottom-left on narrow viewports"
    failure_modes:
      - mistake: "Shipping showDevConsole={true} to production"
        mechanism: "Adds Lit + markdown bundle weight and exposes a dev panel to end users."
        wrong_pattern: |
          <CopilotKitProvider runtimeUrl="..." showDevConsole={true} />
        correct_pattern: |
          <CopilotKitProvider runtimeUrl="..." showDevConsole="auto" />
          // "auto" enables only on localhost / 127.0.0.1
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:301-321"
        priority: "HIGH"
      - mistake: "Expecting debug:true to log full message payloads"
        mechanism: "debug:true enables events+lifecycle but verbose defaults to false to avoid PII in logs."
        wrong_pattern: |
          <CopilotKitProvider debug={true} />
        correct_pattern: |
          <CopilotKitProvider debug={{ events: true, lifecycle: true, verbose: true }} />
        source: "docs/snippets/shared/troubleshooting/debug-mode.mdx:85-93"
        priority: "MEDIUM"
      - mistake: "Inspector missing in sandboxed iframes"
        mechanism: "Anchor state uses localStorage; sandboxed iframes without storage throw on load."
        wrong_pattern: |
          // App mounted in sandboxed iframe with showDevConsole on
        correct_pattern: |
          // Disable the inspector in iframe context, or whitelist storage in the sandbox attrs.
          <CopilotKitProvider showDevConsole={window.self === window.top} />
        source: "packages/react-core/src/v2/components/CopilotKitInspector.tsx:16-53"
        priority: "MEDIUM"
    cross_references:
      - to: "debug-and-troubleshoot"
        reason: "Inspector is the UI over the events enumerated in the troubleshooting skill."

  # ===================== Agent Interaction =====================

  - name: "Access agents and share context"
    slug: "agent-access"
    domain: "agent-interaction"
    description: >
      Use useAgent to resolve an agent instance for a given agentId/threadId, subscribe to
      messages/state/run-status, run the agent via copilotkit.runAgent, and use
      useAgentContext to push JSON-serializable app state to the agent. Covers both the
      imperative agent API and the declarative context channel — two halves of the same
      interaction surface.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useAgent({ agentId, threadId, updates, throttleMs })"
      - "UseAgentUpdate (OnMessagesChanged / OnStateChanged / OnRunStatusChanged)"
      - "DEFAULT_AGENT_ID fallback"
      - "ProxiedCopilotRuntimeAgent during Connecting/Error"
      - "agent.addMessage / agent.setState / agent.abortRun"
      - "copilotkit.runAgent({ agent })"
      - "Per-thread clone WeakMap"
      - "useAgentContext({ description, value })"
      - "JSON.stringify serialization at registration time"
      - "useLayoutEffect registration (runs before paint)"
      - "Global context scope — no agentId parameter in v2 hook"
    tasks:
      - "Send a message to an agent and stream the response"
      - "Subscribe only to run-status changes to reduce re-renders"
      - "Read/update shared agent state from a component"
      - "Share the current route and user role with every agent"
      - "Stream updated context as component state changes"
    failure_modes:
      - mistake: "Custom AbstractAgent whose clone() returns this"
        mechanism: "useAgent throws 'clone() must return a new, independent object' at line 64-68 to guarantee per-thread isolation."
        wrong_pattern: |
          class MyAgent extends AbstractAgent {
            clone() { return this; } // wrong
          }
        correct_pattern: |
          class MyAgent extends AbstractAgent {
            clone() { const next = new MyAgent(this.config); next.state = { ...this.state }; return next; }
          }
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:58-69"
        priority: "CRITICAL"
      - mistake: "Mutating agent.messages directly"
        mechanism: "AG-UI fires onMessagesChanged via addMessage/setMessages; direct mutation bypasses subscribers."
        wrong_pattern: |
          agent.messages.push({ id, role: "user", content: "hi" });
        correct_pattern: |
          agent.addMessage({ id: crypto.randomUUID(), role: "user", content: "hi" });
        source: "packages/react-core/src/v2/hooks/use-agent.tsx (throughout)"
        priority: "HIGH"
      - mistake: "Expecting run lifecycle callbacks to be throttled"
        mechanism: "throttleMs only throttles OnMessagesChanged/OnStateChanged/OnRunStatusChanged; onRunInitialized/onRunFinalized/onRunFailed fire immediately."
        wrong_pattern: |
          // passing throttleMs={300} and expecting it to rate-limit run lifecycle hooks
        correct_pattern: |
          // throttle only covers subscribed updates; handle lifecycle callbacks synchronously
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:36-48"
        priority: "MEDIUM"
      - mistake: "Two components for the same (agentId, threadId) expecting isolation"
        mechanism: "Per-thread clone cached in a module-level WeakMap; both components observe the same state."
        wrong_pattern: |
          function A() { const { agent } = useAgent({ agentId: "default", threadId: "t1" }); }
          function B() { const { agent } = useAgent({ agentId: "default", threadId: "t1" }); }
        correct_pattern: |
          // Use distinct threadIds when isolation is intentional:
          function A() { useAgent({ agentId: "default", threadId: "a" }); }
          function B() { useAgent({ agentId: "default", threadId: "b" }); }
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:78-119"
        priority: "MEDIUM"
      - mistake: "Registering non-serializable values via useAgentContext"
        mechanism: "JSON.stringify drops functions silently, coerces Date to ISO, throws on cycles."
        wrong_pattern: |
          useAgentContext({ description: "user", value: { name: "Alice", lastLogin: new Date(), onLogout } });
        correct_pattern: |
          useAgentContext({
            description: "user",
            value: { name: "Alice", lastLogin: new Date().toISOString() },
          });
        source: "packages/react-core/src/v2/hooks/use-agent-context.tsx:30-35"
        priority: "HIGH"
      - mistake: "Unstable context value identity causing churn"
        mechanism: "Fresh object literals every render cause constant remove/add to the context store."
        wrong_pattern: |
          useAgentContext({ description: "cart", value: { items: cart.items } });
        correct_pattern: |
          const value = useMemo(() => ({ items: cart.items }), [cart.items]);
          useAgentContext({ description: "cart", value });
        source: "packages/react-core/src/v2/hooks/use-agent-context.tsx:30-35"
        priority: "MEDIUM"
      - mistake: "Expecting useAgentContext to accept agentId for per-agent scoping"
        mechanism: "Intentionally asymmetric with the rest of the v2 API — context is ambient/global by design. Tools naturally scope (each agent decides whether to call a tool), but context is the 'state of the world' and flows to every agent. For the rare per-agent scoping case, drop to copilotkit.addContext with an agentId in a useEffect."
        wrong_pattern: |
          useAgentContext({ agentId: "research", description: "paper list", value });
        correct_pattern: |
          const { copilotkit } = useCopilotKit();
          useEffect(() => {
            const id = copilotkit.addContext({ description: "paper list", value, agentId: "research" });
            return () => copilotkit.removeContext(id);
          }, [value]);
          // Most of the time: just use useAgentContext (global). Agent-scoped context is rare.
        source: "packages/react-core/src/v2/hooks/use-agent-context.tsx (no agentId parameter); maintainer Phase 4 (intentional design)"
        priority: "MEDIUM"

  - name: "Read agent capabilities"
    slug: "capabilities"
    domain: "agent-interaction"
    description: >
      Use useCapabilities to read the AgentCapabilities declared by an agent — populated from
      the runtime /info response at connection time. Useful for feature-gating UI: only show
      a voice button if the agent declares transcription capability, etc.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useCapabilities(agentId?: string): AgentCapabilities | undefined"
      - "AgentCapabilities type from @ag-ui/core"
      - "Populated from runtime /info handshake; undefined until handshake completes"
      - "Synchronous read — no loading state"
      - "Defaults to DEFAULT_AGENT_ID if agentId omitted"
      - "Agents without a 'capabilities' field return undefined"
    tasks:
      - "Feature-gate a voice-input button based on agent.capabilities"
      - "Hide tools UI for agents that declare tools: { supported: false }"
      - "Show a loading skeleton while capabilities are undefined"
    failure_modes:
      - mistake: "Reading capabilities synchronously before /info resolves"
        mechanism: "Returns undefined until the runtime handshake completes. Treating undefined as 'no capabilities' hides features that should be visible post-handshake."
        wrong_pattern: |
          function VoiceButton() {
            const caps = useCapabilities();
            if (!caps?.transcription) return null; // hides button forever while handshake pending
            return <button>Record</button>;
          }
        correct_pattern: |
          function VoiceButton() {
            const caps = useCapabilities();
            if (caps === undefined) return <Skeleton className="w-8 h-8" />; // handshake pending
            if (!caps.transcription) return null;
            return <button>Record</button>;
          }
        source: "packages/react-core/src/v2/hooks/use-capabilities.tsx:7-9"
        priority: "HIGH"
      - mistake: "Assuming all capability fields are present"
        mechanism: "AgentCapabilities is a partial declaration — fields may be missing when the agent opts not to declare them. Narrow before deref."
        wrong_pattern: |
          const caps = useCapabilities();
          return <div>Max tokens: {caps!.maxOutputTokens}</div>; // crashes if undeclared
        correct_pattern: |
          const caps = useCapabilities();
          return <div>Max tokens: {caps?.maxOutputTokens ?? "unknown"}</div>;
        source: "packages/react-core/src/v2/hooks/use-capabilities.tsx:20-22"
        priority: "MEDIUM"
      - mistake: "Passing capabilities directly to BuiltInAgent expecting deep merge"
        mechanism: "Related skill: built-in-agent's capabilities override is shallow-merge at category level — providing tools: {...} replaces the whole category. See built-in-agent failure mode."
        wrong_pattern: |
          // Server side:
          new BuiltInAgent({ ..., capabilities: { tools: { supported: true } } });
          // Client reads it back via useCapabilities and is missing clientProvided
        correct_pattern: |
          new BuiltInAgent({ ..., capabilities: { tools: { supported: true, clientProvided: true } } });
        source: "packages/runtime/src/agent/index.ts:821-829,883-887"
        priority: "MEDIUM"
    cross_references:
      - to: "agent-access"
        reason: "useCapabilities internally calls useAgent — same lifecycle semantics."
      - to: "built-in-agent"
        reason: "BuiltInAgent.capabilities is the server-side source of what useCapabilities returns."

  - name: "Switch between multiple agents"
    slug: "switching-agents"
    domain: "agent-interaction"
    description: >
      Build UI that moves between agent instances via useAgent({ agentId }), scope tools and
      renderers to specific agents, and isolate conversation state via distinct threadIds.
    type: "core"
    packages: ["@copilotkit/react-core"]
    covers:
      - "useAgent({ agentId }) per panel"
      - "agentId filter on useFrontendTool / useHumanInTheLoop / useRenderToolCall / useRenderActivityMessage / useRenderCustomMessages"
      - "CopilotChatConfigurationProvider carrying active agentId/threadId"
      - "<CopilotChat key={agentType} agentId={agentType} /> remount pattern"
    tasks:
      - "Render two side-by-side chat panels for 'research' and 'coding' agents"
      - "Register a tool available only to one agent via agentId"
      - "Force a clean thread when switching agents in the same UI slot"
    failure_modes:
      - mistake: "Switching agentId on a persisted <CopilotChat> without key"
        mechanism: "Without remount via key, prior thread state leaks into the new agent's view."
        wrong_pattern: |
          <CopilotChat agentId={activeAgent} />
        correct_pattern: |
          <CopilotChat key={activeAgent} agentId={activeAgent} />
        source: "examples/v2/react-router/app/routes/_index.tsx:38-39"
        priority: "HIGH"
      - mistake: "Omitting agentId on a renderer when multiple agents share a tool name"
        mechanism: "First unscoped renderer wins globally; the other agent never sees its intended renderer."
        wrong_pattern: |
          useRenderToolCall({ name: "search", args: z.object({ q: z.string() }), render });
        correct_pattern: |
          useRenderToolCall({ name: "search", agentId: "research", args: z.object({ q: z.string() }), render });
        source: "packages/react-core/src/v2/hooks/use-render-tool-call.tsx:145-154"
        priority: "MEDIUM"
      - mistake: "Tools registered without agentId leaking across panels"
        mechanism: "Omitting agentId attaches the tool to every agent; both panels share the handler."
        wrong_pattern: |
          useFrontendTool({ name: "saveFindings", handler, parameters });
        correct_pattern: |
          useFrontendTool({ name: "saveFindings", agentId: "research", handler, parameters });
        source: "packages/react-core/src/v2/hooks/use-frontend-tool.tsx"
        priority: "MEDIUM"

  - name: "List and switch durable threads"
    slug: "threads"
