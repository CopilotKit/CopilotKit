    packages: ["@copilotkit/runtime"]
    covers:
      - "BuiltInAgent class — Simple Mode vs Factory Mode"
      - "Simple Mode: model, apiKey, prompt, tools, mcpServers, maxSteps, temperature, ..."
      - "Factory Mode types: tanstack (preferred) / aisdk / custom"
      - "AgentFactoryContext: { input: RunAgentInput, abortController, abortSignal }"
      - "Helpers: convertInputToTanStackAI, convertMessagesToVercelAISDKMessages, convertToolsToVercelAITools, convertToolDefinitionsToVercelAITools, resolveModel"
      - "Auto-injected state tools (AGUISendStateSnapshot/Delta) ONLY in Simple Mode"
      - "forwardSystemMessages / forwardDeveloperMessages default false"
      - "abortController vs abortSignal: use abortController for TanStack AI, abortSignal for AI SDK / fetch / custom"
      - "agent.abortRun vs direct abortController.abort() — never call .abort() inside factory"
      - "TanStack AI does NOT surface reasoning events (docs warn callout)"
      - "Doc: docs/content/docs/integrations/built-in-agent/custom-agent.mdx"
    tasks:
