      - "Plug a TanStack AI factory as the preferred backend"
      - "Forward frontend props (model, temperature) into a factory"
      - "Wire shared-state tools manually in factory mode"
      - "Add MCP servers to a Simple Mode agent"
      - "Use BuiltInAgent factory per-request for multi-tenant"
    failure_modes:
      - mistake: "Concurrent run() on the same instance"
        mechanism: "Throws 'Agent is already running. Call abortRun() first or create a new instance.'"
        wrong_pattern: |
          // One shared BuiltInAgent instance across tenants
          const agent = new BuiltInAgent({ model: "openai/gpt-4o" });
          new CopilotRuntime({ agents: { default: agent } });
        correct_pattern: |
          // agents-as-factory for per-request instances
