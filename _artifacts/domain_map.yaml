  - name: "Render A2UI surfaces"
    slug: "a2ui-rendering"
    domain: "generative-ui"
    description: >
      Enable A2UI (Agent-to-UI declarative surfaces) on the runtime via the a2ui config, then
      let CopilotKitProvider auto-detect and mount the renderer. Do NOT manually wire
      renderActivityMessages — it's automatic.
    type: "core"
    packages:
      [
        "@copilotkit/a2ui-renderer",
        "@copilotkit/react-core",
        "@copilotkit/runtime",
      ]
    covers:
      - "Runtime: new CopilotRuntime({ ..., a2ui: { ... } })"
      - "Provider: <CopilotKitProvider a2ui={{ theme, catalog?, loadingComponent? }} />"
      - "createA2UIMessageRenderer({ theme, catalog, loadingComponent })"
      - "A2UIProvider, A2UIRenderer, ThemeProvider, createCatalog, extractSchema"
      - "@ag-ui/a2ui-middleware in runtime, @a2ui/web_core in renderer"
      - "A2UI operations: createSurface (once), updateComponents, updateDataModel"
    tasks:
      - "Turn on A2UI for a Python/TS agent"
      - "Customize the A2UI theme to match brand"
      - "Override the loading skeleton"
    failure_modes:
      - mistake: "Manually wiring renderActivityMessages for A2UI"
        mechanism: "CopilotKitProvider auto-detects runtime A2UI enablement via /info and injects the built-in renderer."
        wrong_pattern: |
          <CopilotKitProvider renderActivityMessages={[createA2UIMessageRenderer({ theme })]} />
        correct_pattern: |
          <CopilotKitProvider runtimeUrl="/api/copilotkit" a2ui={{ theme }} />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:188-222,294-296"
        priority: "HIGH"
      - mistake: "Forgetting runtime.a2ui"
        mechanism: "Without runtime.a2ui, /info never flags A2UI and the client never mounts the renderer."
        wrong_pattern: |
          new CopilotRuntime({ agents: { default: agent } });
          <CopilotKitProvider a2ui={{ theme }} /> // no-op
        correct_pattern: |
          new CopilotRuntime({ agents: { default: agent }, a2ui: { /* middleware config */ } });
        source: "packages/runtime/src/v2/runtime/core/runtime.ts:55-58,217,242"
        priority: "CRITICAL"
      - mistake: "Re-emitting createSurface on every snapshot"
        mechanism: "MessageProcessor filters duplicates; agent-side bug if emitted repeatedly."
        wrong_pattern: |
          # agent re-emits createSurface operation on every state delta
        correct_pattern: |
          # emit createSurface once per surfaceId; use updateComponents / updateDataModel for changes
        source: "packages/react-core/src/v2/a2ui/A2UIMessageRenderer.tsx:218-226"
        priority: "MEDIUM"
      - mistake: "Custom action bridge that forgets a2uiAction cleanup"
        mechanism: "Built-in bridge sets + strips copilotkit.properties.a2uiAction in try/finally; custom code that skips finally leaks action to the next run."
        wrong_pattern: |
          copilotkit.setProperties({ ...props, a2uiAction: msg });
          await copilotkit.runAgent({ agent });
          // missing finally
        correct_pattern: |
          try { copilotkit.setProperties({ ...props, a2uiAction: msg }); await copilotkit.runAgent({ agent }); }
          finally { const { a2uiAction, ...rest } = copilotkit.properties; copilotkit.setProperties(rest); }
        source: "packages/react-core/src/v2/a2ui/A2UIMessageRenderer.tsx:146-167"
        priority: "MEDIUM"
    cross_references:
      - to: "rendering-activity-messages"
        reason: "A2UI is implemented as an activity message renderer, auto-registered."
      - to: "provider-setup"
        reason: "The a2ui prop on the provider is the client-side entry point."

  # ===================== Journeys =====================

  - name: "Zero-to-working-chat quickstart"
    slug: "0-to-working-chat"
    domain: "journeys"
    description: >
      End-to-end setup from empty project to a working chat with one tool. Framework
      branches in priority order React Router v7 framework mode → TanStack Start →
      Next.js App Router, plus an SPA-no-runtime branch. Fetch-based runtime works on any
      deployment target.
    type: "lifecycle"
    packages: ["@copilotkit/react-core", "@copilotkit/runtime"]
    covers:
      - "npx copilotkit create -f <framework> scaffolder"
      - "Framework-specific API mount (loader/action / APIRoute / route.ts)"
      - "Provider + <CopilotChat> + useFrontendTool end-to-end"
      - "Deployment targets: Vercel / CF Workers / Bun / Deno / edge"
    tasks:
      - "Scaffold a React Router v7 app and wire the runtime"
      - "Add the first useFrontendTool"
      - "Deploy to Cloudflare Workers with env-sourced API key"
    failure_modes:
      - mistake: "Missing leading slash in runtimeUrl"
        mechanism: "Resolves relative to the current page — breaks on any nested route."
        wrong_pattern: |
          <CopilotKitProvider runtimeUrl="api/copilotkit" />
        correct_pattern: |
          <CopilotKitProvider runtimeUrl="/api/copilotkit" />
        source: "docs/snippets/shared/troubleshooting/common-issues.mdx:38-42"
        priority: "HIGH"
      - mistake: "Forgetting the styles.css import"
        mechanism: "Chat renders unstyled/broken."
        wrong_pattern: |
          import { CopilotChat } from "@copilotkit/react-core/v2";
        correct_pattern: |
          import { CopilotChat } from "@copilotkit/react-core/v2";
          import "@copilotkit/react-core/v2/styles.css";
        source: "examples/v2/react-router/app/routes/_index.tsx:3"
        priority: "HIGH"
      - mistake: "Using createCopilotRuntimeHandler with raw Node http"
        mechanism: "Handler expects a Web Request; Node's IncomingMessage shape is different."
        wrong_pattern: |
          const h = createCopilotRuntimeHandler({ runtime });
          server.on("request", h);
        correct_pattern: |
          const node = createCopilotNodeHandler(createCopilotRuntimeHandler({ runtime, cors: true }));
          server.on("request", node);
        source: "examples/v2/runtime/node/src/index.ts:1-21"
        priority: "HIGH"
      - mistake: "agentId mismatch between client and server"
        mechanism: "Client's <CopilotChat agentId='main'> doesn't match server's agents.default → agent_not_found."
        wrong_pattern: |
          // server
          new CopilotRuntime({ agents: { default: agent } });
          // client
          <CopilotChat agentId="main" />
        correct_pattern: |
          <CopilotChat agentId="default" />  // or match both sides on the same string
        source: "packages/core/src/core/core.ts:80"
        priority: "HIGH"
      - mistake: "Reading process.env.OPENAI_API_KEY in Cloudflare Workers"
        mechanism: "Workers don't have process.env; need env binding arg."
        wrong_pattern: |
          const agent = new BuiltInAgent({ model: "openai/gpt-4o", apiKey: process.env.OPENAI_API_KEY });
        correct_pattern: |
          export default {
            fetch(request: Request, env: { OPENAI_API_KEY: string }) {
              const agent = new BuiltInAgent({ model: "openai/gpt-4o", apiKey: env.OPENAI_API_KEY });
              ...
            }
          };
        source: "examples/v2/runtime/cf-workers/src/index.ts:7-17"
        priority: "HIGH"
      - mistake: "Mounting the runtime in Express/Hono when the app uses React Router v7 framework mode"
        mechanism: "React Router v7 framework mode manages its own server. Putting the runtime into a separate Express app (or Hono server) alongside it duplicates servers and breaks unified routing/SSR. The canonical pattern is a resource route at app/routes/api.copilotkit.$.tsx exporting loader + action that call the fetch handler. This is a telltale AI-wrote-this mistake — training data has many Express + Next.js examples but few RR v7 framework-mode ones."
        wrong_pattern: |
          // server.js
          import express from "express";
          import { createCopilotExpressHandler } from "@copilotkit/runtime/v2/express";
          const app = express();
          app.use("/api/copilotkit", createCopilotExpressHandler({ runtime, basePath: "/api/copilotkit" }));
          app.listen(3000);
          // Meanwhile: React Router v7 already runs on its own server — duplicate runtime
        correct_pattern: |
          // app/routes/api.copilotkit.$.tsx  (resource route, catch-all)
          import type { Route } from "./+types/api.copilotkit.$";
          import { CopilotRuntime, createCopilotRuntimeHandler, BuiltInAgent } from "@copilotkit/runtime/v2";
          const runtime = new CopilotRuntime({ agents: { default: new BuiltInAgent({ type: "tanstack", factory: ... }) } });
          const handler = createCopilotRuntimeHandler({ runtime, basePath: "/api/copilotkit" });
          export async function loader({ request }: Route.LoaderArgs) { return handler(request); }
          export async function action({ request }: Route.ActionArgs) { return handler(request); }
        source: "examples/v2/react-router/app/routes/api.copilotkit.$.tsx; maintainer Phase 4c (top AI-tell)"
        priority: "CRITICAL"
    cross_references:
      - to: "provider-setup"
      - to: "setup-endpoint"
      - to: "built-in-agent"
      - to: "client-side-tools"
      - to: "chat-components"

  - name: "SPA without a runtime"
    slug: "spa-without-runtime"
    domain: "journeys"
    description: >
      Build a pure-client CopilotKit app with no server runtime by pointing the provider at
      CopilotKit Cloud via publicLicenseKey. This is the ONLY production-safe SPA path — both
      agents__unsafe_dev_only and selfManagedAgents are dev-only aliases for the same local
      agent registration mechanism and leak credentials if used with a credentialed agent.
    type: "lifecycle"
    packages: ["@copilotkit/react-core"]
    covers:
      - "publicLicenseKey (CopilotKit Cloud hosted runtime) — canonical prop name"
      - "publicApiKey — deprecated alias for publicLicenseKey"
      - "Provider omits runtimeUrl; Cloud URL is baked in"
      - "X-CopilotCloud-Public-Api-Key auth header auto-injected"
      - "EXCLUDED: agents__unsafe_dev_only and selfManagedAgents (both dev-only; see provider-setup failure modes)"
    tasks:
      - "Ship a Vite or React Router SPA with CopilotKit Cloud"
      - "Obtain a publicLicenseKey from cloud.copilotkit.ai"
    failure_modes:
      - mistake: "Passing both runtimeUrl and publicLicenseKey"
        mechanism: "runtimeUrl wins; Cloud call is never issued."
        wrong_pattern: |
          <CopilotKitProvider runtimeUrl="/api/x" publicLicenseKey="ck_..." />
        correct_pattern: |
          // Cloud-only SPA:
          <CopilotKitProvider publicLicenseKey="ck_..." />
          // Or own runtime, not both.
        source: "docs/snippets/shared/troubleshooting/common-issues.mdx:30-42"
        priority: "HIGH"
      - mistake: "Reaching for selfManagedAgents as a 'production-safe' alternative to the Cloud path"
        mechanism: "selfManagedAgents and agents__unsafe_dev_only are aliases — merged at CopilotKitProvider.tsx:393 with no auth gating. Neither is production-safe. Any agent constructed in the browser is visible in the bundle."
        wrong_pattern: |
          // SPA with no backend, trying to avoid CopilotKit Cloud:
          <CopilotKitProvider selfManagedAgents={{ default: new BuiltInAgent({ apiKey }) }} />
        correct_pattern: |
          // For SPA without a runtime, the ONLY production path is CopilotKit Cloud:
          <CopilotKitProvider publicLicenseKey="ck_..." />
          // If you control a backend, use a runtime instead:
          <CopilotKitProvider runtimeUrl="/api/copilotkit" />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:136-138,393"
        priority: "CRITICAL"
      - mistake: "Teaching publicApiKey in new code"
        mechanism: "publicApiKey is a deprecated alias kept for backwards-compat. New code should use publicLicenseKey. Agents trained on older docs/examples default to publicApiKey."
        wrong_pattern: |
          <CopilotKitProvider publicApiKey="ck_..." />
        correct_pattern: |
          <CopilotKitProvider publicLicenseKey="ck_..." />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:391 (resolvedPublicKey = publicApiKey ?? publicLicenseKey); maintainer Phase 4"
        priority: "MEDIUM"
      - mistake: "Assuming SPA mode disables SSR concerns"
        mechanism: "react-core/v2 is 'use client' — no SSR by design. SPA mode is the natural fit; nothing extra needed."
        wrong_pattern: |
          // Over-complicating with dynamic imports in a pure SPA
        correct_pattern: |
          // Just render <CopilotKitProvider> at the top level of the SPA.
        source: "packages/react-core/src/v2/index.ts:1"
        priority: "LOW"
    cross_references:
      - to: "provider-setup"
      - to: "0-to-working-chat"

  - name: "Go-to-production checklist"
    slug: "go-to-production"
    domain: "journeys"
    description: >
      A pointer skill, not a teaching skill. Checklist for shipping CopilotKit safely —
      persistent runner, CORS, debug off, license, SSR correctness, cookie auth — and
      delegates to middleware/go-to-platform-docs for auth/rate-limit/observability.
    type: "lifecycle"
    packages: ["@copilotkit/react-core", "@copilotkit/runtime"]
    covers:
      - "Checklist: persistent runner, CORS, showDevConsole off, debug off, license, headers/credentials, env-sourced secrets on edge runtimes"
      - "Explicit non-goals: auth logic, rate limiting, observability — use server-framework and external tools"
    tasks:
      - "Audit a v2 app before first prod deploy"
      - "Diagnose multi-instance thread-lock contention"
    failure_modes:
      - mistake: "Leaving showDevConsole=true in prod"
        mechanism: "Exposes internal error details to end users."
        wrong_pattern: |
          <CopilotKitProvider showDevConsole={true} />
        correct_pattern: |
          <CopilotKitProvider showDevConsole="auto" />
        source: "docs/snippets/shared/troubleshooting/error-debugging.mdx:22-24"
        priority: "CRITICAL"
      - mistake: "InMemoryAgentRunner behind horizontal scaling"
        mechanism: "Thread state per-instance; load balancer may send the next request to a different instance → agent_thread_locked on different instances or lost state."
        wrong_pattern: |
          // Kubernetes 3 replicas, default runner
          new CopilotRuntime({ agents });
        correct_pattern: |
          // SQLite or Intelligence:
          new CopilotRuntime({ agents, runner: new SqliteAgentRunner({ dbPath: "/var/data/threads.db" }) });
        source: "packages/runtime/src/v2/runtime/runner/in-memory.ts; packages/core/src/core/core.ts:96"
        priority: "CRITICAL"
      - mistake: "Shipping debug:true in prod logs"
        mechanism: "Large log volume; verbose can include payloads with PII."
        wrong_pattern: |
          <CopilotKitProvider debug={{ events: true, lifecycle: true, verbose: true }} />
        correct_pattern: |
          <CopilotKitProvider debug={process.env.NODE_ENV !== "production"} />
        source: "docs/snippets/shared/troubleshooting/debug-mode.mdx:145-149"
        priority: "HIGH"
      - mistake: "Forgetting credentials:'include' with cookie auth"
        mechanism: "Browser strips cookies on cross-origin fetches; /info and SSE stream go unauthenticated."
        wrong_pattern: |
          <CopilotKitProvider runtimeUrl="https://api.myapp.com/copilotkit" />
        correct_pattern: |
          <CopilotKitProvider runtimeUrl="https://api.myapp.com/copilotkit" credentials="include" />
        source: "packages/react-core/src/v2/providers/CopilotKitProvider.tsx:118-120"
        priority: "HIGH"
      - mistake: "process.env secrets on Cloudflare Workers"
        mechanism: "Workers don't have process.env; use Env arg."
        wrong_pattern: |
          const agent = new BuiltInAgent({ model: "openai/gpt-4o", apiKey: process.env.OPENAI_API_KEY });
        correct_pattern: |
          // See 0-to-working-chat failure #5
        source: "examples/v2/runtime/cf-workers/src/index.ts:7-17"
        priority: "HIGH"
    cross_references:
      - to: "middleware"
      - to: "agent-runners"
      - to: "debug-and-troubleshoot"
      - to: "intelligence-mode"

  - name: "Scale from one agent to many"
    slug: "scale-to-multi-agent"
    domain: "journeys"
    description: >
      Grow a single-agent app into a multi-agent app with thread switching. Covers runtime
      registration, per-panel useAgent, agent-scoped tools/context, and the key-remount
      pattern when swapping agents in the same UI slot.
    type: "lifecycle"
    packages: ["@copilotkit/react-core", "@copilotkit/runtime"]
    covers:
      - "Runtime: agents: { default, research, coding, ... }"
      - "Multiple <CopilotChat agentId=...> panels"
      - "agentId filter on tools/renderers/context"
      - "threadId isolation per panel"
      - "Thread switcher UI via useThreads"
    tasks:
      - "Split a chat into research and coding panels"
      - "Add a thread switcher sidebar"
    failure_modes:
      - mistake: "Swapping agentId on one <CopilotChat> without key"
        mechanism: "WeakMap clones remain cached by threadId; prior state leaks."
        wrong_pattern: |
          <CopilotChat agentId={activeAgent} />
        correct_pattern: |
          <CopilotChat key={activeAgent} agentId={activeAgent} />
        source: "examples/v2/react-router/app/routes/_index.tsx:38-39"
        priority: "HIGH"
      - mistake: "Custom AbstractAgent clone() returning this"
        mechanism: "useAgent throws — per-thread isolation broken."
        wrong_pattern: |
          class MyAgent { clone() { return this; } }
        correct_pattern: |
          class MyAgent { clone() { return new MyAgent({...this.config, state: {...this.state}}); } }
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:58-69"
        priority: "CRITICAL"
      - mistake: "Tools without agentId leaking across panels"
        mechanism: "Omitting agentId attaches tool globally."
        wrong_pattern: |
          useFrontendTool({ name: "runCode", handler });
        correct_pattern: |
          useFrontendTool({ name: "runCode", agentId: "coding", handler });
        source: "packages/react-core/src/v2/hooks/use-frontend-tool.tsx"
        priority: "MEDIUM"
      - mistake: "Expecting useCoAgent semantics in v2"
        mechanism: "v2 useAgent returns { agent, messages, state, isRunning } — no state-returning callback."
        wrong_pattern: |
          const { state, setState, running } = useCoAgent({ name: "research" });
        correct_pattern: |
          const { agent } = useAgent({ agentId: "research" });
          // agent.state, agent.setState(...), agent.addMessage(...), copilotkit.runAgent({ agent })
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:11-51"
        priority: "MEDIUM"
      - mistake: "Reaching for a useAgents() / useAvailableAgents() hook"
        mechanism: "No such hook in v2. The client discovers the agent list only via the core subscriber onAgentsChanged. Server declares agents in CopilotRuntime({ agents }); /info publishes them; agent-registry fires onAgentsChanged when the list resolves."
        wrong_pattern: |
          function AgentSwitcher() {
            const agents = useAgents(); // does not exist
            return <select>{agents.map(a => <option key={a.id}>{a.name}</option>)}</select>;
          }
        correct_pattern: |
          function AgentSwitcher() {
            const { copilotkit } = useCopilotKit();
            const [agents, setAgents] = useState<Record<string, AbstractAgent>>({});
            useEffect(() => copilotkit.subscribe({
              onAgentsChanged: ({ agents }) => setAgents(agents),
            }).unsubscribe, [copilotkit]);
            return <select>{Object.keys(agents).map(id => <option key={id}>{id}</option>)}</select>;
          }
        source: "packages/core/src/core/agent-registry.ts:502; packages/core/src/core/core.ts:127,360"
        priority: "HIGH"
    cross_references:
      - to: "agent-access"
      - to: "switching-agents"
      - to: "threads"

  - name: "Migrate v1 → v2"
    slug: "v1-to-v2-migration"
    domain: "journeys"
    description: >
      Convert a v1 CopilotKit app to v2. NO codemod ships — this skill is the authoritative
      migration tool. It must be precise enough that an AI coding agent can execute the full
      migration end-to-end: audit imports, apply the rename table, migrate error-code
      equality checks, port the runtime endpoint, and verify with a checklist. Packages don't
      rename — import from /v2 subpaths. Hooks split (useCopilotAction → useFrontendTool +
      useHumanInTheLoop), rename (useCopilotReadable → useAgentContext), or consolidate
      (useCoAgent → useAgent). @copilotkit/react-ui chat components relocate to
      @copilotkit/react-core/v2.
    type: "lifecycle"
    packages:
      - "@copilotkit/react-core"
      - "@copilotkit/runtime"
    covers:
      - "Rename table (see below)"
      - "Import-path migration from root to /v2"
      - "Provider rename: CopilotKit → CopilotKitProvider"
      - "Runtime endpoint factory rename + fetch-based primary"
      - "CopilotKitErrorCode (SCREAMING_SNAKE) → CopilotKitCoreErrorCode (snake_case)"
      - "imageUploadsEnabled → attachments={{ enabled: true }}"
      - "publicApiKey → publicLicenseKey"
      - "Post-migration verification checklist"
      - "No official codemod — this skill is the authoritative migration tool"
    tasks:
      - "Audit a v1 codebase — grep for every v1 import path and hook name"
      - "Apply the rename table mechanically (find-and-replace safe cases)"
      - "Hand-port useCopilotAction → useFrontendTool + useHumanInTheLoop where render was used"
      - "Rewrite error-code equality checks from SCREAMING_SNAKE to snake_case strings"
      - "Port runtime endpoint from v1 adapter to v2 fetch-based handler"
      - "Run post-migration verification: /info reachable, one agent runs end-to-end, tool renders, HITL resolves, error-code branches still fire"
    failure_modes:
      - mistake: "Installing @copilotkit/react-ui for v2 chat"
        mechanism: "v2 chat ships from @copilotkit/react-core/v2. react-ui v2 is CSS-only."
        wrong_pattern: |
          import { CopilotPopup } from "@copilotkit/react-ui";
          import "@copilotkit/react-ui/styles.css";
        correct_pattern: |
          import { CopilotPopup } from "@copilotkit/react-core/v2";
          import "@copilotkit/react-core/v2/styles.css";
        source: "docs/snippets/shared/troubleshooting/migrate-to-v2.mdx:42-56"
        priority: "CRITICAL"
      - mistake: "Importing from @copilotkit/react-core root for v2"
        mechanism: "Root is v1 surface; /v2 is v2 surface."
        wrong_pattern: |
          import { CopilotKit, useCopilotReadable } from "@copilotkit/react-core";
        correct_pattern: |
          import { CopilotKitProvider, useAgentContext } from "@copilotkit/react-core/v2";
        source: "packages/react-core/src/index.tsx:1-8"
        priority: "CRITICAL"
      - mistake: "Using useCopilotAction in v2"
        mechanism: "Split into useFrontendTool (data) and useHumanInTheLoop (UI + approval)."
        wrong_pattern: |
          useCopilotAction({ name, parameters, handler, render });
        correct_pattern: |
          useFrontendTool({ name, parameters, handler });
          useHumanInTheLoop({ name, parameters, render });
        source: "packages/react-core/src/v2/hooks/index.ts:5,9"
        priority: "CRITICAL"
      - mistake: "Calling useCoAgent in v2"
        mechanism: "Replaced by useAgent({ agentId }) — different return shape."
        wrong_pattern: |
          const { state, setState, running } = useCoAgent({ name: "research" });
        correct_pattern: |
          const { agent } = useAgent({ agentId: "research" });
          const state = agent.state; // etc.
        source: "packages/react-core/src/v2/hooks/use-agent.tsx:11-51"
        priority: "CRITICAL"
      - mistake: "Checking against v1 error codes"
        mechanism: "v2 uses snake_case values on CopilotKitCoreErrorCode; v1 SCREAMING_SNAKE never matches."
        wrong_pattern: |
          if (error.code === "API_NOT_FOUND") { ... }
        correct_pattern: |
          onError: ({ code }) => { if (code === "runtime_info_fetch_failed") { ... } }
        source: "packages/core/src/core/core.ts:71-105; packages/shared/src/utils/errors.ts:44-57"
        priority: "HIGH"
      - mistake: "Renaming @copilotkit/runtime imports"
        mechanism: "Package didn't rename. v2 lives at /v2 subpath."
        wrong_pattern: |
          import { CopilotRuntime } from "@copilotkit/runtime-v2";
        correct_pattern: |
          import { CopilotRuntime, createCopilotRuntimeHandler } from "@copilotkit/runtime/v2";
          import { createCopilotHonoHandler } from "@copilotkit/runtime/v2/hono";
        source: "packages/runtime/src/v2/index.ts:1-6"
        priority: "HIGH"
      - mistake: "Using imageUploadsEnabled in v2"
        mechanism: "Deprecated for attachments API."
        wrong_pattern: |
          <CopilotChat imageUploadsEnabled />
        correct_pattern: |
          <CopilotChat attachments={{ enabled: true }} />
        source: "docs/content/docs/(root)/migration-guides/migrate-attachments.mdx"
        priority: "MEDIUM"
      - mistake: "Adding @ag-ui/client to install just for types"
        mechanism: "Types re-exported from @copilotkit/react-core/v2."
        wrong_pattern: |
          import type { AbstractAgent, HttpAgent } from "@ag-ui/client";
        correct_pattern: |
          import type { AbstractAgent, HttpAgent } from "@copilotkit/react-core/v2";
        source: "packages/react-core/src/v2/index.ts:9"
        priority: "MEDIUM"
      - mistake: "Using @copilotkitnext/ scope for non-Angular packages"
        mechanism: "ONLY @copilotkitnext/angular lives under the @copilotkitnext scope — every other CopilotKit package is under @copilotkit. Agents over-generalize from the Angular example and invent @copilotkitnext/react-core, @copilotkitnext/runtime, etc. — which resolve as unresolved modules or install as unrelated packages. This is the most-seen hallucination pattern per the maintainer."
        wrong_pattern: |
          import { CopilotKitProvider } from "@copilotkitnext/react-core";
          import { CopilotRuntime } from "@copilotkitnext/runtime";
        correct_pattern: |
          import { CopilotKitProvider } from "@copilotkit/react-core/v2";
          import { CopilotRuntime } from "@copilotkit/runtime/v2";
          // Only Angular uses the @copilotkitnext/ scope:
          // import { ... } from "@copilotkitnext/angular"; (Angular-only path)
        source: "packages/angular/package.json (the ONE @copilotkitnext/ package); all other packages/*/package.json use @copilotkit/; maintainer Phase 4c"
        priority: "CRITICAL"
    cross_references:
