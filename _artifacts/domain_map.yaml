        mechanism: "includeArchived defaults to false; users never see archived threads unless opted in."
        wrong_pattern: |
          useThreads({ agentId: "default" });
        correct_pattern: |
          const { threads: all } = useThreads({ agentId: "default", includeArchived: true });
        source: "packages/react-core/src/v2/hooks/use-threads.tsx:60-62,165-276"
