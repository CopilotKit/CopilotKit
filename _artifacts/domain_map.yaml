# ===================== Gaps (Phase 4 interview questions) =====================

gaps:
  - skill: "chat-components"
    question: "CopilotPanel is mentioned in baseline skills but doesn't exist in source. Deprecated, renamed, upcoming, or baseline hallucination?"
    context: "Baseline skill referenced it as a distinct layout. Maintainer Phase 4 answer: ignore it — does not exist. Likely baseline hallucination."
    status: "resolved"
    resolution: "Baseline hallucination — CopilotPanel does not exist and is not planned. chat-components skill should not mention it."

  - skill: "client-side-tools"
    question: "Contract for the followUp boolean on FrontendTool — when true, what exactly re-triggers? First-turn completion, tool result, or something else?"
    context: "Source shows it as a pass-through; no explicit semantics documented. Resolved Phase 4 via source: followUp accepts boolean on FrontendTool, but runtime runTool accepts boolean | 'generate' | string. Agent-invoked tools default to true (follow-up unless explicit false); programmatic runTool defaults to false. Handler errors suppress follow-up."
    status: "resolved"
    resolution: "Skill teaches the split contract: register-time followUp is boolean with default-true for agent-invoked tools; runtime runTool({ followUp }) accepts boolean | 'generate' | custom string for programmatic re-invocation. Two new failure modes cover the loop trap (default-true) and the 'strings don't work on useFrontendTool' gotcha. Follow-up note for upstream: the public FrontendTool type at types.ts:39 under-documents the runtime behavior — maintainers may widen the type in a future release."

  - skill: "rendering-tool-calls"
    question: "Wildcard '*' renderers get z.any() args — is untyped args the intended public contract, or is this a gap?"
    context: "Source uses z.any(); consumers may expect a way to discriminate on toolCall.function.name. Resolved Phase 4: useDefaultRenderTool is the sanctioned wildcard surface with parameters: unknown (not any) — forces narrowing. useRenderTool({ name: '*' }) is the lower-level primitive that useDefaultRenderTool wraps."
    status: "resolved"
    resolution: "useDefaultRenderTool is the sanctioned wildcard fallback. parameters is typed 'unknown' forcing consumers to narrow by name. Skill teaches useDefaultRenderTool as the wildcard API and mentions useRenderTool({ name: '*' }) only as the underlying primitive (anti-pattern to use directly for fallbacks)."

  - skill: "provider-setup"
    question: "publicLicenseKey and publicApiKey are both accepted as aliases. Which name is canonical and should skills teach going forward?"
    context: "Both present in source; docs use them inconsistently. Resolved Phase 4: publicLicenseKey is canonical; publicApiKey is deprecated alias."
    status: "resolved"
    resolution: "publicLicenseKey is the canonical prop name. publicApiKey is a deprecated alias accepted for backwards-compat. Skills teach publicLicenseKey exclusively; publicApiKey appears only in the v1-to-v2-migration and debug-and-troubleshoot skills as a recognized alias that should be renamed."

  - skill: "debug-mode"
    question: "DebugConfig shape — exact fields and when each fires?"
    context: "Type is from @copilotkit/shared; didn't enumerate fully. Resolved Phase 4: { events, lifecycle, verbose } is the complete set."
    status: "resolved"
    resolution: "DebugConfig = { events?: boolean, lifecycle?: boolean, verbose?: boolean }. No other fields. Skill teaches those three."

  - skill: "agent-access"
    question: "Is there an intended API surface for agent-scoped context via a hook, or is copilotkit.addContext({ agentId }) the expected workaround?"
    context: "v2 useAgentContext (folded into agent-access) has no agentId parameter. Resolved Phase 4: intentional asymmetry — context is ambient/global by design. Tools scope per-agent; context flows to every agent as 'state of the world'. copilotkit.addContext({ agentId }) is the sanctioned escape hatch for the rare per-agent case."
    status: "resolved"
    resolution: "Intentionally global. Skill teaches useAgentContext as the primary API with no agentId expectation. The copilotkit.addContext({ agentId }) workaround is taught as a rare escape hatch, not a 'workaround for missing feature'."

  - skill: "wiring-external-agents"
    question: "Is AG2 integration still current? It appears in some docs, but there's no dedicated @ag-ui/ag2 package — confirm HttpAgent is the intended path."
    context: "13 frameworks vs 13 packages mismatch. Resolved Phase 4: yes — AG2 is a standard HTTP-AG-UI framework, same pattern as PydanticAI/ADK/Strands. Use bare HttpAgent."
    status: "resolved"
    resolution: "AG2 wires via generic HttpAgent({ url }). No dedicated package. Subsystem entry: new HttpAgent({ url }) same as other AG-UI-native framework integrations."

  - skill: "built-in-agent"
    question: "TanStack AI factory for BuiltInAgent — is it documented and public?"
    context: "Maintainer mentioned TanStack AI + Vercel AI + custom factories in Phase 2. Initial Phase 3 subagent missed the doc because it filename-searched for 'tanstack'. Resolved Phase 4: doc lives at docs/content/docs/integrations/built-in-agent/custom-agent.mdx (titled 'Factory Mode'). TanStack AI is the preferred backend (AG-UI-compliant); custom factory is a general-purpose AG-UI BaseEvent escape hatch."
    status: "resolved"
    resolution: "TanStack AI factory is shipped and preferred over AI SDK. Helpers: convertInputToTanStackAI, convertMessagesToVercelAISDKMessages, convertToolsToVercelAITools, convertToolDefinitionsToVercelAITools, resolveModel. TanStack AI doesn't surface reasoning events — use AI SDK when reasoning is required. State tools (AGUISendStateSnapshot/Delta) are auto-injected in Simple Mode only — must be wired manually in Factory Mode."

  - skill: "intelligence-mode"
    question: "Is there a public Intelligence REST/WS spec doc, or is self-hosting the Intelligence backend intentionally undocumented?"
    context: "Source references ɵ-prefixed internal methods; no public spec surface. Resolved Phase 4: Cloud-only. Intelligence is NOT self-hostable — it is a hosted platform. apiUrl/wsUrl must point at api.cloud.copilotkit.ai. For on-prem durability, the alternative is SSE mode + SqliteAgentRunner (or custom runner)."
    status: "resolved"
    resolution: "Intelligence is Cloud-only. Skill teaches concrete Cloud URLs and adds a CRITICAL failure mode against self-host attempts. Users needing on-prem durable threads should use SSE mode with a persistent runner instead (see agent-runners skill)."

  - skill: "middleware"
    question: "Are webhook-URL middleware values planned for implementation, or are those enum values dead code? Current runtime silently skips them."
    context: "Type defines a BEFORE_REQUEST / AFTER_REQUEST enum that isn't wired. Resolved Phase 4: dead code."
    status: "resolved"
    resolution: "Webhook-URL middleware enum values are dead code — not planned for implementation. Skill teaches function-only middleware and the 'Unsupported beforeRequestMiddleware value – skipped' log as a trap for agents copying old examples."

  - skill: "v1-to-v2-migration"
    question: "Is there any official codemod or migration CLI, or is this skill the authoritative migration tool?"
    context: "packages/cli init is deprecated; no migrate subcommand found. Resolved Phase 4: no codemod planned — this skill IS the authoritative migration tool."
    status: "resolved"
    resolution: "No codemod shipping or planned. This skill must be precise enough that an AI agent can perform the full migration autonomously: import-path rewrite, hook rename/split (including the useCopilotAction → useFrontendTool+useHumanInTheLoop split that requires judgment), error-code equality migration, runtime endpoint port, and post-migration verification checklist. Produce references/rename-table.md (full 17+ rows) and references/migration-playbook.md (step-by-step agent-executable recipe) as companion reference files."

  - skill: "0-to-working-chat"
    question: "Is there a canonical TanStack Start example? I inferred the pattern from the generic Request handler shape but couldn't find an in-tree example."
    context: "examples/v2/* has react-router, next, cf-workers, node, hono, but no tanstack-start. Resolved Phase 4: the generic Request-handler mount IS the canonical TanStack Start path."
    status: "resolved"
    resolution: "createCopilotRuntimeHandler mounted in a TanStack Start server route is the canonical path. No dedicated helper. Skill's 0-to-working-chat example uses the generic Request-handler shape inside a Start APIFileRoute."

  - skill: "scale-to-multi-agent"
    question: "Is there an intended 'agent switcher' component, or is it purely a composition pattern? Many apps will want a pre-built one."
    context: "No CopilotAgentSwitcher or equivalent in exports. Resolved Phase 4: intentionally a composition pattern. Server declares agents via CopilotRuntime({ agents }); client discovers via core subscriber (onAgentsChanged); switches by passing agentId to useAgent / <CopilotChat>."
    status: "resolved"
    resolution: "No pre-built switcher component. Server-declares / client-switches model confirmed by maintainer. Add reference file references/agent-switcher-recipes.md with dropdown, tabs, and keyboard-shortcut composition patterns (each subscribing to core.onAgentsChanged). Explicit failure mode in the skill prevents agents from inventing a useAgents() hook."

  - skill: "suggestions"
    question: "Are per-suggestion loading indices (suggestionLoadingIndexes in CopilotChatProps) intended to be exposed via useSuggestions?"
    context: "Currently consumers must thread them through chat component props. Resolved Phase 4: internal only — not exposed via useSuggestions."
    status: "resolved"
    resolution: "suggestionLoadingIndexes is internal to chat components. Skill does not teach it. Consumers needing per-suggestion loading state use Suggestion.isLoading (the public field on individual Suggestion items)."

  - skill: "transcription"
    question: "Is there an in-tree OpenAITranscription class or is it always DIY? Baseline skill implied DIY."
    context: "Docs show a DIY pattern; no class export found. Resolved Phase 4: DIY only, no built-in class."
