    domain: "agent-implementation"
    description: >
      Instantiate a BuiltInAgent via Simple Mode (classic config) or Factory Mode with one of
      three backend types — TanStack AI (preferred, AG-UI-compliant), Vercel AI SDK, or a
      custom AG-UI event generator. Use the exported converter helpers to go between
      CopilotKit's RunAgentInput and the backend's native shape.
