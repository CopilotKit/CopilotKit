          });
        source: "packages/runtime/src/agent/index.ts:895-898"
        priority: "HIGH"
      - mistake: "Expecting tool-call loop without raising maxSteps"
        mechanism: "maxSteps defaults to 1 → streamText stops after first turn → tool results never fed back."
        wrong_pattern: |
          new BuiltInAgent({ model: "openai/gpt-4o", tools: [searchTool] });
        correct_pattern: |
          new BuiltInAgent({ model: "openai/gpt-4o", tools: [searchTool], maxSteps: 5 });
        source: "packages/runtime/src/agent/index.ts:988-990"
        priority: "HIGH"
      - mistake: "Wrong model specifier format"
        mechanism: "resolveModel throws 'Invalid model string X' for missing separator or empty segment."
        wrong_pattern: |
          new BuiltInAgent({ model: "gpt-4o" });
        correct_pattern: |
          new BuiltInAgent({ model: "openai/gpt-4o" });
          // Also valid: "openai:gpt-4o"
        source: "packages/runtime/src/agent/index.ts:186-204"
        priority: "HIGH"
      - mistake: "Mixing Simple Mode tools with Factory Mode"
        mechanism: "Factory Mode ignores config.tools/mcpServers/prompt entirely — tools must be wired inside the factory using convertToolsToVercelAITools (AI SDK) or passed directly (TanStack AI)."
        wrong_pattern: |
          new BuiltInAgent({ type: "tanstack", factory: myFactory, tools: [t1, t2] });
        correct_pattern: |
          // TanStack AI:
          new BuiltInAgent({ type: "tanstack", factory: ({ input, abortController }) => {
            const { messages, systemPrompts } = convertInputToTanStackAI(input);
            return chat({ adapter: openaiText("gpt-4o"), messages, systemPrompts, tools: [t1, t2], abortController });
          }});
          // AI SDK:
          new BuiltInAgent({ type: "aisdk", factory: ({ input, abortSignal }) => {
            const tools = convertToolsToVercelAITools(input.tools);
            return streamText({ model: openai("gpt-4o"), messages: convertMessagesToVercelAISDKMessages(input.messages), tools, abortSignal });
          }});
        source: "docs/snippets/shared/backend/custom-agent.mdx:180-234; packages/runtime/src/agent/index.ts:1581-1671"
        priority: "MEDIUM"
      - mistake: "Expecting state tools to auto-inject in Factory Mode"
        mechanism: "AGUISendStateSnapshot and AGUISendStateDelta are auto-wired in Simple Mode only. Factory Mode requires manual registration; otherwise shared-state updates from the frontend never reach the LLM."
        wrong_pattern: |
          // Factory mode with useCoAgent state on the frontend
          new BuiltInAgent({ type: "tanstack", factory: ({ input, abortController }) => {
            const { messages, systemPrompts } = convertInputToTanStackAI(input);
            return chat({ adapter: openaiText("gpt-4o"), messages, systemPrompts, abortController });
          }});
        correct_pattern: |
          const sendStateSnapshot = toolDefinition({ name: "AGUISendStateSnapshot", /* ... */ }).server(async ({ snapshot }) => ({ success: true, snapshot }));
          const sendStateDelta   = toolDefinition({ name: "AGUISendStateDelta",   /* ... */ }).server(async ({ delta }) => ({ success: true, delta }));
          new BuiltInAgent({ type: "tanstack", factory: ({ input, abortController }) => {
            const { messages, systemPrompts } = convertInputToTanStackAI(input);
            return chat({ adapter: openaiText("gpt-4o"), messages, systemPrompts, tools: [sendStateSnapshot, sendStateDelta], abortController });
          }});
        source: "docs/snippets/shared/backend/custom-agent.mdx:495-588"
        priority: "HIGH"
      - mistake: "Defaulting to Simple Mode with a model string when Factory Mode (TanStack AI) is preferred"
        mechanism: "AI coding agents trained on early v2 examples default to Simple Mode (new BuiltInAgent({ model: 'openai/gpt-4o' })). The canonical in-tree example for React Router v7 uses Factory Mode with TanStack AI. Factory + TanStack AI is AG-UI-native and the preferred default for new code. Simple Mode is fine for quick setups but reaches its ceiling on anything non-standard."
        wrong_pattern: |
          // AI-generated for a new app:
          const agent = new BuiltInAgent({
            model: "openai/gpt-4o",
            prompt: "You are a helpful assistant.",
          });
        correct_pattern: |
          // Preferred default — Factory Mode with TanStack AI:
          import { convertInputToTanStackAI } from "@copilotkit/runtime/v2";
          import { chat } from "@tanstack/ai";
          import { openaiText } from "@tanstack/ai-openai";
          const agent = new BuiltInAgent({
            type: "tanstack",
            factory: ({ input, abortController }) => {
              const { messages, systemPrompts } = convertInputToTanStackAI(input);
              systemPrompts.unshift("You are a helpful assistant.");
              return chat({ adapter: openaiText("gpt-4o"), messages, systemPrompts, abortController });
            },
          });
        source: "examples/v2/react-router/app/routes/api.copilotkit.$.tsx; maintainer Phase 4c (top AI-tell)"
        priority: "HIGH"
      - mistake: "Expecting reasoning events from TanStack AI factory"
        mechanism: "The TanStack AI converter does NOT surface REASONING_START / REASONING_MESSAGE_CONTENT / REASONING_END. Even with a thinking-capable model, those events are silently dropped."
        wrong_pattern: |
          new BuiltInAgent({ type: "tanstack", factory: ({ input, abortController }) => {
            const { messages, systemPrompts } = convertInputToTanStackAI(input);
            return chat({
              adapter: anthropicText("claude-sonnet-4"),
              messages, systemPrompts,
              modelOptions: { thinking: { type: "enabled", budgetTokens: 10000 } },
              abortController,
            });
          }});
          // Expecting reasoning UI to render — nothing will
        correct_pattern: |
          // Use AI SDK factory when reasoning events are required:
          new BuiltInAgent({ type: "aisdk", factory: ({ input, abortSignal }) => streamText({
            model: anthropic("claude-sonnet-4", { thinking: { type: "enabled", budgetTokens: 10000 } }),
            messages: convertMessagesToVercelAISDKMessages(input.messages),
            abortSignal,
          })});
        source: "docs/snippets/shared/backend/custom-agent.mdx:315-317 (warn callout)"
        priority: "HIGH"
      - mistake: "Expecting forwarded system messages"
        mechanism: "forwardSystemMessages / forwardDeveloperMessages default false — AG-UI system/developer messages are dropped."
        wrong_pattern: |
          // Sending {role:'system', content:'You are...'} from the frontend and expecting it to prefix generation
        correct_pattern: |
          // Server-side prompt:
          new BuiltInAgent({ model: "openai/gpt-4o", prompt: "You are..." });
          // Or explicit opt-in:
          new BuiltInAgent({ model: "openai/gpt-4o", forwardSystemMessages: true });
        source: "packages/runtime/src/agent/index.ts:440-456,809-815"
        priority: "MEDIUM"
      - mistake: "Aborting factory's abortController directly"
        mechanism: "JSDoc warns: use agent.abortRun(), not ctx.abortController.abort() inside a factory."
        wrong_pattern: |
          factory: (ctx) => { ctx.abortController.abort(); return streamText({...}) }
        correct_pattern: |
          factory: (ctx) => streamText({ ..., abortSignal: ctx.abortSignal })
          // Externally: agent.abortRun()
        source: "packages/runtime/src/agent/index.ts:670-672"
        priority: "MEDIUM"
    cross_references:
      - to: "server-side-tools"
        reason: "config.tools populates server-side tools; unavailable in factory mode."
      - to: "wiring-external-agents"
        reason: "Alternative when you don't want a local built-in agent."
    reference_candidates:
      - topic: "BuiltInAgentModel string literal table"
        reason: ">40 model identifiers with provider prefixes"
      - topic: "Factory Mode cookbook (AI SDK / TanStack AI / Custom)"
        reason: "7+ patterns: tools, reasoning, system prompt+context+state, forwardedProps, state tools, structured output — one example per backend type"
      - topic: "Factory Mode helper utility reference"
        reason: "5 converter/helper functions (convertInputToTanStackAI, convertMessagesToVercelAISDKMessages, convertToolsToVercelAITools, convertToolDefinitionsToVercelAITools, resolveModel) with signatures"

  - name: "Wire an external agent framework"
    slug: "wiring-external-agents"
    domain: "agent-implementation"
    description: >
      Connect Mastra, LangGraph, CrewAI, PydanticAI, Google ADK, LlamaIndex, Agno, AWS Strands,
      Microsoft Agent Framework, A2A, or any AG-UI-speaking HTTP endpoint into CopilotRuntime.
      MCP Apps is a runtime-level middleware, not an agent — covered separately.
    type: "framework"
    packages: ["@copilotkit/runtime"]
    covers:
      - "AbstractAgent subclass contract"
      - "HttpAgent from @ag-ui/client as generic fallback"
      - "Per-framework agent class + endpoint convention"
      - "Agents-as-factory for per-request/multi-tenant construction"
    tasks:
      - "Connect a local Mastra server to the runtime"
      - "Register a LangGraph Platform deployment"
      - "Wire a CrewAI Python service"
    subsystems:
      - name: "Mastra"
        package: "@ag-ui/mastra"
        config_surface: "MastraAgent.getLocalAgents({ mastra }) → Record<string, AbstractAgent>"
      - name: "LangGraph"
        package: "@ag-ui/langgraph"
        config_surface: "new LangGraphAgent({ deploymentUrl, graphId, langsmithApiKey? })"
      - name: "CrewAI Crews"
        package: "@ag-ui/crewai"
        config_surface: "new CrewAIAgent({ url: 'http://localhost:8000/' })"
      - name: "CrewAI Flows"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url })"
      - name: "PydanticAI"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url: 'http://localhost:8000/' })"
      - name: "Google ADK"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url: 'http://localhost:8000/' })"
      - name: "LlamaIndex"
        package: "@ag-ui/llamaindex"
        config_surface: "new LlamaIndexAgent({ url: 'http://localhost:8000/run' })  // NOTE: /run suffix"
      - name: "Agno"
        package: "@ag-ui/agno"
        config_surface: "new AgnoAgent({ url: 'http://localhost:8000/agui' })  // NOTE: /agui suffix"
      - name: "AWS Strands"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url: 'http://localhost:8000' })"
      - name: "Microsoft Agent Framework"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url })  // Python + .NET variants"
      - name: "AG2"
        package: "@ag-ui/client (HttpAgent)"
        config_surface: "new HttpAgent({ url })"
      - name: "A2A"
        package: "@ag-ui/a2a"
        config_surface: "new A2AAgent({ a2aClient })  // expects pre-constructed A2AClient instance, not a URL"
    failure_modes:
      - mistake: "Using runtimeUrl as the agent URL"
        mechanism: "External agents take their own upstream URL, not CopilotKit's runtime URL."
        wrong_pattern: |
          new LangGraphAgent({ url: "/api/copilotkit" });
        correct_pattern: |
          new LangGraphAgent({ deploymentUrl: process.env.LANGGRAPH_URL!, graphId: "agent" });
        source: "docs/integrations/langgraph/quickstart.mdx:355"
        priority: "HIGH"
      - mistake: "Wrapping MastraAgent.getLocalAgents in a key"
        mechanism: "getLocalAgents returns a Record<string, AbstractAgent> already — wrapping creates { wrapper: { agentName: agent } }."
        wrong_pattern: |
          new CopilotRuntime({ agents: { mastra: MastraAgent.getLocalAgents({ mastra }) } });
        correct_pattern: |
          new CopilotRuntime({ agents: MastraAgent.getLocalAgents({ mastra }) });
        source: "docs/integrations/mastra/quickstart.mdx:213-220"
        priority: "HIGH"
      - mistake: "Missing /run or /agui suffix on LlamaIndex/Agno"
        mechanism: "Those frameworks require specific sub-paths — HttpAgent against root 404s."
        wrong_pattern: |
          new LlamaIndexAgent({ url: "http://localhost:8000" });
          new AgnoAgent({ url: "http://localhost:8000" });
        correct_pattern: |
          new LlamaIndexAgent({ url: "http://localhost:8000/run" });
          new AgnoAgent({ url: "http://localhost:8000/agui" });
        source: "docs/integrations/llamaindex/quickstart.mdx:258; docs/integrations/agno/quickstart.mdx:215"
        priority: "MEDIUM"
      - mistake: "Passing URL to A2AAgent instead of A2AClient instance"
        mechanism: "A2AAgent constructor expects a pre-built A2AClient object."
        wrong_pattern: |
          new A2AAgent({ url: "https://a2a.example" });
        correct_pattern: |
          const a2aClient = new A2AClient({ ... });
          new A2AAgent({ a2aClient });
        source: "examples/integrations/a2a-a2ui/app/api/copilotkit/[[...slug]]/route.tsx:12"
        priority: "MEDIUM"
      - mistake: "Treating MCP Apps as one of the agents"
        mechanism: "MCP Apps is runtime-level middleware auto-applied to all agents — configure via runtime.mcpApps, not agents."
        wrong_pattern: |
          new CopilotRuntime({ agents: { mcpApps: new MCPAppsAgent({...}) }});
        correct_pattern: |
          new CopilotRuntime({ agents: {...}, mcpApps: { servers: [{ ... }] }});
        source: "packages/runtime/src/v2/runtime/core/runtime.ts:39-63"
        priority: "HIGH"

