# Probe: e2e-smoke (L4, daily)
#
# Full L4 smoke suite (multi-agent flows, long-running mutations). Runs
# once a day because it's expensive (15 min typical) and the signal
# matters most for catching regressions that slip past the L1-L3 6-hourly
# tick — not for tight MTTR on happy-path breakage.
#
# Cadence: 00:00 UTC. Chosen to land outside working hours in all three
# of our core response timezones (EU, US, APAC) so a red-tick triage
# picks up during local business hours rather than the middle of the
# night.
#
# Timeout: 900s (15 min). Matches the schema cap; L4 historically runs
# 8-12 minutes, with the ceiling carrying a 25% buffer for cold-start
# and provider-latency spikes.
kind: e2e_smoke
id: e2e-smoke-daily
schedule: "0 0 * * *"
timeout_ms: 900000
target:
  key: "e2e_smoke:l4"
  suite: "l4"
