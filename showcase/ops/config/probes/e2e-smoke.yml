# Probe: e2e-smoke (L1-L3)
#
# Runs the Playwright smoke suite covering L1 (homepage loads), L2 (primary
# CTA paths), and L3 (login / auth-gated routes) against the production
# showcase starters. The driver launches chromium in-process, so the
# `showcase-ops` container image must have `playwright install chromium`
# baked in — see `showcase/ops/Dockerfile`.
#
# Cadence: every 6 hours. Chosen to match the aimock-wiring cadence so
# operators tailing Railway logs see the two slow-path probes tick on the
# same clock edge — less cognitive load than staggered schedules.
#
# Timeout: 600s (10 min). L1-L3 historically completes in <4 min; 10 min
# gives headroom for a slow Railway cold-start + a flaky dep. The driver
# enforces the same limit internally (so a hung Playwright run is killed
# deterministically, not just abandoned by the invoker).
kind: e2e_smoke
id: e2e-smoke
schedule: "0 */6 * * *"
timeout_ms: 600000
target:
  key: "e2e_smoke:l1-3"
  suite: "l1-3"
