<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1190" viewBox="0 0 720 1190" role="img" aria-labelledby="title desc">
  <title id="title">How CopilotKit Threads create a continuous conversation experience on mobile</title>
  <desc id="desc">A vertical view of the user journey, the Threads interface and runtime inside the app, and Enterprise Intelligence as the durable Threads platform.</desc>
  <defs>
    <linearGradient id="experience-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BEC2FF" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#85ECCE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFAC4D" stop-opacity="0.07"/>
    </linearGradient>
    <marker id="arrow-light" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#AFAFB7"/>
    </marker>
    <marker id="arrow-lilac" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#BEC2FF"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="718" height="1188" rx="8" fill="#111014" stroke="#3A3941" stroke-width="2"/>
  <rect x="2" y="2" width="716" height="430" rx="7" fill="url(#experience-glow)"/>
  <text x="48" y="45" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#AFAFB7">WHAT USERS EXPERIENCE</text>

  <path d="M76 104V352" fill="none" stroke="#57575B" stroke-width="3"/>
  <circle cx="76" cy="106" r="10" fill="#7479B8"/>
  <circle cx="76" cy="230" r="10" fill="#8A671D"/>
  <circle cx="76" cy="354" r="10" fill="#3A9A7D"/>

  <rect x="112" y="68" width="560" height="92" rx="16" fill="#1C1B20" stroke="#7479B8" stroke-width="2"/>
  <text x="140" y="98" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">NOW</text>
  <text x="140" y="133" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Start a conversation</text>

  <rect x="112" y="192" width="560" height="92" rx="16" fill="#1C1B20" stroke="#8A671D" stroke-width="2"/>
  <text x="140" y="222" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#FFF388">LATER</text>
  <text x="140" y="257" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Leave or switch devices</text>

  <rect x="112" y="316" width="560" height="92" rx="16" fill="#1C1B20" stroke="#3A9A7D" stroke-width="2"/>
  <text x="140" y="346" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#85ECCE">RETURN</text>
  <text x="140" y="381" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">Continue where you left off</text>

  <rect x="32" y="454" width="656" height="394" rx="24" fill="#211B31"/>
  <text x="64" y="495" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#AFAFB7">IN YOUR APP</text>

  <rect x="64" y="518" width="592" height="70" rx="16" fill="#1C1B20" stroke="#3A3941" stroke-width="2"/>
  <circle cx="96" cy="553" r="15" fill="#7479B8"/>
  <path d="M90 553H102M96 547V559" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="126" y="548" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Threads Drawer</text>
  <text x="126" y="573" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">or a custom useThreads interface</text>

  <path d="M360 588V614" fill="none" stroke="#AFAFB7" stroke-width="2.5" marker-end="url(#arrow-light)"/>
  <rect x="64" y="624" width="592" height="70" rx="16" fill="#1C1B20" stroke="#3A3941" stroke-width="2"/>
  <text x="94" y="654" font-family="Spline Sans Mono, monospace" font-size="21" font-weight="600" fill="#FFFFFF">CopilotChat</text>
  <text x="94" y="679" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">opens a stable threadId</text>

  <path d="M360 694V720" fill="none" stroke="#AFAFB7" stroke-width="2.5" marker-end="url(#arrow-light)"/>
  <rect x="64" y="730" width="358" height="78" rx="16" fill="#1C1B20" stroke="#3A3941" stroke-width="2"/>
  <text x="92" y="762" font-family="Spline Sans Mono, monospace" font-size="20" font-weight="600" fill="#FFFFFF">CopilotRuntime</text>
  <text x="92" y="788" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">relays AG-UI events</text>
  <path d="M422 769H448" fill="none" stroke="#AFAFB7" stroke-width="2.5" marker-end="url(#arrow-light)"/>
  <rect x="458" y="730" width="198" height="78" rx="16" fill="#1C1B20" stroke="#3A3941" stroke-width="2"/>
  <text x="484" y="762" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="21" font-weight="700" fill="#FFFFFF">Your agent</text>
  <text x="484" y="788" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="16" fill="#AFAFB7">any framework</text>

  <path d="M292 808V884" fill="none" stroke="#BEC2FF" stroke-width="3" marker-end="url(#arrow-lilac)"/>
  <text x="276" y="850" text-anchor="end" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">events + metadata</text>
  <path d="M428 884V808" fill="none" stroke="#BEC2FF" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow-lilac)"/>
  <text x="444" y="850" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">replay + live sync</text>

  <rect x="32" y="898" width="656" height="248" rx="24" fill="#F7F7F9"/>
  <text x="64" y="939" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#8066B5">ENTERPRISE INTELLIGENCE</text>
  <text x="64" y="980" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#010507">The Threads platform</text>
  <text x="64" y="1010" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">Cloud-hosted or self-hosted. Stores every</text>
  <text x="64" y="1036" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">conversation's events and metadata.</text>

  <circle cx="72" cy="1074" r="7" fill="#8066B5"/>
  <text x="92" y="1081" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#010507">Durable history</text>
  <circle cx="370" cy="1074" r="7" fill="#8A671D"/>
  <text x="390" y="1081" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#010507">Realtime sync</text>
  <circle cx="72" cy="1117" r="7" fill="#189370"/>
  <text x="92" y="1124" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#010507">Replay to live</text>
  <circle cx="370" cy="1117" r="7" fill="#C87A26"/>
  <text x="390" y="1124" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#010507">Lifecycle + locking</text>

  <text x="48" y="1172" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="16" fill="#AFAFB7">Threads outlive any single tab, device, or agent run.</text>
</svg>
