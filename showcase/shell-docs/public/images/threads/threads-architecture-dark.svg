<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">How CopilotKit Threads create a continuous conversation experience</title>
  <desc id="desc">A user starts a conversation, leaves, and returns to continue it. In the app, Threads Drawer or a custom useThreads interface connects through CopilotChat and CopilotRuntime to an agent. Enterprise Intelligence stores durable history and returns replayed and live events to the user experience.</desc>
  <defs>
    <linearGradient id="experience-glow-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#BEC2FF" stop-opacity="0.12"/>
      <stop offset="0.52" stop-color="#85ECCE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFAC4D" stop-opacity="0.07"/>
    </linearGradient>
    <marker id="arrow-light" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#AFAFB7"/>
    </marker>
    <marker id="arrow-lilac-dark" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#BEC2FF"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="758" rx="8" fill="#111014" stroke="#3A3941" stroke-width="2"/>
  <rect x="2" y="2" width="1196" height="232" rx="7" fill="url(#experience-glow-dark)"/>

  <text x="56" y="46" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#AFAFB7">WHAT USERS EXPERIENCE</text>

  <rect x="56" y="68" width="316" height="132" rx="18" fill="#1C1B20" stroke="#7479B8" stroke-width="2"/>
  <text x="82" y="99" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">NOW</text>
  <text x="82" y="133" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">Start a conversation</text>
  <path d="M84 154H235C245 154 251 160 251 170V176H102C92 176 84 168 84 158Z" fill="#33294C"/>
  <circle cx="269" cy="168" r="12" fill="#7479B8"/>

  <path d="M384 134H420" fill="none" stroke="#AFAFB7" stroke-width="2.5" marker-end="url(#arrow-light)"/>

  <rect x="434" y="68" width="316" height="132" rx="18" fill="#1C1B20" stroke="#8A671D" stroke-width="2"/>
  <text x="460" y="99" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#FFF388">LATER</text>
  <text x="460" y="133" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">Leave or switch devices</text>
  <path d="M460 158H610" stroke="#57575B" stroke-width="8" stroke-linecap="round"/>
  <path d="M460 178H682" stroke="#343339" stroke-width="8" stroke-linecap="round"/>

  <path d="M762 134H798" fill="none" stroke="#AFAFB7" stroke-width="2.5" marker-end="url(#arrow-light)"/>

  <rect x="812" y="68" width="332" height="132" rx="18" fill="#1C1B20" stroke="#3A9A7D" stroke-width="2"/>
  <text x="838" y="99" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#85ECCE">RETURN</text>
  <text x="838" y="133" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">Continue where you left off</text>
  <path d="M838 158H1044" stroke="#285C4D" stroke-width="8" stroke-linecap="round"/>
  <path d="M838 178H1090" stroke="#203B34" stroke-width="8" stroke-linecap="round"/>

  <rect x="40" y="258" width="1120" height="190" rx="24" fill="#211B31"/>
  <text x="72" y="298" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#AFAFB7">IN YOUR APP</text>

  <rect x="72" y="320" width="1056" height="88" rx="18" fill="#1C1B20" stroke="#3A3941" stroke-width="2"/>
  <line x1="358" y1="336" x2="358" y2="392" stroke="#3A3941" stroke-width="2"/>
  <line x1="590" y1="336" x2="590" y2="392" stroke="#3A3941" stroke-width="2"/>
  <line x1="842" y1="336" x2="842" y2="392" stroke="#3A3941" stroke-width="2"/>

  <circle cx="102" cy="364" r="15" fill="#7479B8"/>
  <path d="M96 364H108M102 358V370" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="130" y="357" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Threads Drawer</text>
  <text x="130" y="383" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">or custom useThreads UI</text>

  <text x="390" y="357" font-family="Spline Sans Mono, monospace" font-size="20" font-weight="600" fill="#FFFFFF">CopilotChat</text>
  <text x="390" y="383" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">opens a stable threadId</text>

  <text x="622" y="357" font-family="Spline Sans Mono, monospace" font-size="20" font-weight="600" fill="#FFFFFF">CopilotRuntime</text>
  <text x="622" y="383" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">relays AG-UI events</text>

  <text x="874" y="357" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Your agent</text>
  <text x="874" y="383" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#AFAFB7">any supported framework</text>

  <path d="M718 408V482" fill="none" stroke="#BEC2FF" stroke-width="3" marker-end="url(#arrow-lilac-dark)"/>
  <rect x="600" y="433" width="236" height="31" rx="8" fill="#111014"/>
  <text x="718" y="454" text-anchor="middle" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">events + thread metadata</text>

  <rect x="40" y="492" width="1120" height="220" rx="24" fill="#F7F7F9"/>
  <text x="72" y="538" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#8066B5">ENTERPRISE INTELLIGENCE</text>
  <text x="72" y="580" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="31" font-weight="700" fill="#010507">The Threads platform</text>
  <text x="72" y="611" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" fill="#57575B">Cloud-hosted or self-hosted. Stores the events</text>
  <text x="72" y="638" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" fill="#57575B">and metadata behind every conversation.</text>

  <circle cx="610" cy="556" r="7" fill="#8066B5"/>
  <text x="630" y="564" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#010507">Durable history</text>
  <circle cx="610" cy="615" r="7" fill="#189370"/>
  <text x="630" y="623" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#010507">Replay to live</text>
  <circle cx="895" cy="556" r="7" fill="#D3B92D"/>
  <text x="915" y="564" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#010507">Realtime sync</text>
  <circle cx="895" cy="615" r="7" fill="#C47720"/>
  <text x="915" y="623" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="19" font-weight="700" fill="#010507">Lifecycle + locking</text>

  <path d="M1088 492C1150 460 1162 282 1112 212" fill="none" stroke="#BEC2FF" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow-lilac-dark)"/>
  <rect x="924" y="453" width="204" height="31" rx="8" fill="#111014"/>
  <text x="1026" y="474" text-anchor="middle" font-family="Spline Sans Mono, monospace" font-size="14" font-weight="600" fill="#BEC2FF">replay + realtime sync</text>

  <text x="72" y="683" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17" fill="#57575B">Threads outlive any single tab, device, or agent run.</text>
</svg>
