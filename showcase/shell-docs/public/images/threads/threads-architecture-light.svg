<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">How CopilotKit Threads work</title>
  <desc id="desc">Threads Drawer and a custom useThreads interface both connect through CopilotChat and CopilotRuntime to an agent and the Enterprise Intelligence thread store.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#57575B"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#6430AB"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1198" height="638" rx="8" fill="#FAFAFC" stroke="#DBDBE5" stroke-width="2"/>

  <text x="48" y="52" font-family="Spline Sans Mono, monospace" font-size="17" font-weight="600" fill="#77777C">YOUR PRODUCT</text>
  <text x="426" y="52" font-family="Spline Sans Mono, monospace" font-size="17" font-weight="600" fill="#77777C">COPILOTKIT</text>
  <text x="923" y="52" font-family="Spline Sans Mono, monospace" font-size="17" font-weight="600" fill="#77777C">YOUR BACKEND</text>

  <rect x="48" y="82" width="286" height="92" rx="8" fill="#EEE6FE" stroke="#BEC2FF" stroke-width="2"/>
  <text x="72" y="122" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#010507">Threads Drawer</text>
  <text x="72" y="151" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">Ready-made conversation UI</text>

  <rect x="48" y="198" width="286" height="92" rx="8" fill="#E8FAF5" stroke="#85ECCE" stroke-width="2"/>
  <text x="72" y="238" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="26" font-weight="700" fill="#010507">Custom thread UI</text>
  <text x="72" y="267" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">useThreads + your components</text>

  <path d="M334 128H370V165H403" fill="none" stroke="#57575B" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M334 244H370V207H403" fill="none" stroke="#57575B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="370" y="111" text-anchor="middle" font-family="Spline Sans Mono, monospace" font-size="16" fill="#57575B">stable threadId</text>

  <rect x="408" y="104" width="218" height="164" rx="8" fill="#FFFFFF" stroke="#CFCFD8" stroke-width="2"/>
  <circle cx="448" cy="143" r="17" fill="#6430AB"/>
  <path d="M440 143H456M448 135V151" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="476" y="151" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="27" font-weight="700" fill="#010507">CopilotChat</text>
  <text x="432" y="199" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">Opens and replays</text>
  <text x="432" y="227" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">the active conversation</text>

  <line x1="626" y1="186" x2="674" y2="186" stroke="#57575B" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="680" y="104" width="218" height="164" rx="8" fill="#FFFFFF" stroke="#CFCFD8" stroke-width="2"/>
  <circle cx="720" cy="143" r="17" fill="#29CC96"/>
  <path d="M712 143H728M720 135V151" stroke="#010507" stroke-width="2.5" stroke-linecap="round"/>
  <text x="748" y="151" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="27" font-weight="700" fill="#010507">Runtime</text>
  <text x="704" y="199" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">Runs the agent and</text>
  <text x="704" y="227" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">relays AG-UI events</text>

  <line x1="898" y1="186" x2="946" y2="186" stroke="#57575B" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="952" y="104" width="200" height="164" rx="8" fill="#FFF8E7" stroke="#F1D38A" stroke-width="2"/>
  <text x="976" y="151" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="27" font-weight="700" fill="#010507">Your agent</text>
  <text x="976" y="199" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">Any supported</text>
  <text x="976" y="227" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#57575B">agent framework</text>

  <path d="M789 268V338" fill="none" stroke="#6430AB" stroke-width="4" marker-end="url(#arrow-purple)"/>
  <text x="810" y="311" font-family="Spline Sans Mono, monospace" font-size="16" fill="#6430AB">events + lifecycle</text>

  <rect x="680" y="346" width="472" height="214" rx="8" fill="#201033"/>
  <text x="712" y="397" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Enterprise Intelligence</text>
  <text x="712" y="430" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#D8D4DC">Cloud-hosted or self-hosted</text>
  <line x1="712" y1="458" x2="1120" y2="458" stroke="#5B496B" stroke-width="1.5"/>
  <text x="712" y="499" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#B7FBD8">Durable event history</text>
  <text x="918" y="499" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" font-weight="700" fill="#B7FBD8">Realtime sync</text>
  <text x="712" y="532" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#FFFFFF">Replay + reconnection</text>
  <text x="918" y="532" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18" fill="#FFFFFF">Lifecycle + locking</text>

  <path d="M680 510H370V258H340" fill="none" stroke="#6430AB" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow-purple)"/>
  <rect x="402" y="492" width="236" height="36" rx="6" fill="#FAFAFC"/>
  <text x="520" y="516" text-anchor="middle" font-family="Spline Sans Mono, monospace" font-size="16" font-weight="600" fill="#6430AB">replay + realtime sync</text>
</svg>
