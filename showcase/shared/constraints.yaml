# Constraint tables for the Showcase Decision Tree.
# Generative UI: allowlist-based (demo must appear in `allowed` list)
# Interaction Modality: denylist-based (all allowed unless in `excluded` list)

generative_ui:
  constrained-declarative:
    allowed:
      - agentic-chat
      - chat-customization-css
      - tool-rendering-default-catchall
      - tool-rendering-custom-catchall
      - tool-rendering-frontend-tools
      - frontend-tools
      - gen-ui-tool-based
      - useComponent
      - multi-modal
      - suggestions
      - shared-state-read
      - shared-state-write
      - shared-state-streaming
      - readables
      - subagents
      - voice
    excluded:
      - tool-rendering
      - hitl-in-chat
      - hitl-in-app
      - gen-ui-interrupt
      - open-gen-ui

  constrained-explicit:
    allowed:
      - agentic-chat
      - chat-customization-css
      - tool-rendering-default-catchall
      - tool-rendering-custom-catchall
      - tool-rendering-frontend-tools
      - agentic-chat-reasoning
      - prebuilt-sidebar
      - prebuilt-popup
      - chat-slots
      - headless-simple
      - headless-complete
      - frontend-tools
      - gen-ui-tool-based
      - gen-ui-interrupt
      - gen-ui-agent
      - hitl-in-chat
      - hitl-in-app
      - declarative-gen-ui
      - a2ui-fixed-schema
      - mcp-apps
      - open-gen-ui
      - tool-rendering
      - useComponent
      - multi-modal
      - suggestions
      - shared-state-read
      - shared-state-write
      - shared-state-streaming
      - readables
      - subagents
      - voice

  open:
    allowed:
      - open-gen-ui
      - frontend-tools
      - multi-modal
      - suggestions
      - shared-state-read
      - shared-state-write
      - shared-state-streaming
      - readables
      - subagents
      - voice
    excluded:
      - tool-rendering
      - hitl
      - gen-ui-tool-based
      - gen-ui-interrupt
      - useComponent
      - agentic-chat

interaction_modalities:
  headless:
    excluded:
      - open-gen-ui
      - voice
  # sidebar, embedded, popup, chat: no exclusions
