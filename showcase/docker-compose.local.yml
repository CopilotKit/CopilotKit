# Run the Railway-equivalent Docker image for every showcase package locally.
# Prereq: run scripts/dev-local.sh which stages shared_python/ shared_typescript/ into each package build context first.
# Ports come from shared/local-ports.json; internal port is always 10000 (Railway convention).

services:
  langgraph-python:
    build: ./packages/langgraph-python
    image: showcase-langgraph-python:local
    container_name: showcase-langgraph-python
    env_file: .env
    ports:
      # 25 cells → external 3200-3224 mapped to internal 10000-10024
      - "3200-3224:10000-10024"
    restart: unless-stopped

  langgraph-typescript:
    build: ./packages/langgraph-typescript
    image: showcase-langgraph-typescript:local
    container_name: showcase-langgraph-typescript
    env_file: .env
    ports:
      - "3101:10000"
    restart: unless-stopped

  langgraph-fastapi:
