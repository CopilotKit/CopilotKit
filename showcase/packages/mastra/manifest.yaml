    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    animated_preview_url:
    highlight:
      - src/app/demos/gen-ui-agent/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: shared-state-read-write
