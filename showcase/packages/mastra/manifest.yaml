name: Mastra
slug: mastra
category: popular
language: typescript
logo: /logos/mastra.svg
description: >-
  TypeScript-native agent framework with built-in tool management,
  agent memory, and workflow orchestration. Integrates with CopilotKit
  via the AG-UI protocol adapter.
partner_docs: https://docs.copilotkit.ai/integrations/mastra
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/mastra
copilotkit_version: 2.0.0
backend_url: https://showcase-mastra-production.up.railway.app
deployed: true
sort_order: 20
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
managed_platform:
  name: Mastra Cloud
  url: https://mastra.ai/cloud
starter:
  path: showcase/starters/mastra
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/mastra
  demo_url: https://showcase-starter-mastra-production-3a00.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/mastra my-copilotkit-app
features:
  - cli-start
  - agentic-chat
  - hitl-in-chat
  - hitl-in-app
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - gen-ui-tool-based
  - gen-ui-agent
  - shared-state-read-write
  - shared-state-streaming
  - readonly-state-agent-context
  - subagents
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - agentic-chat-reasoning
  - reasoning-default-render
  - agent-config
  - declarative-gen-ui
  - a2ui-fixed-schema
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to scaffold the canonical Mastra starter
    tags:
      - chat-ui
    command: "npx degit CopilotKit/CopilotKit/showcase/starters/mastra my-copilotkit-app"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/mastra/tools/index.ts
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat HITL (useHumanInTheLoop — ergonomic API)
    description: Interactive approval/decision surface rendered inline in the chat via the high-level `useHumanInTheLoop` hook
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/app/demos/hitl-in-chat/page.tsx
      - src/app/demos/hitl-in-chat/time-picker-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-app
    name: In-App Human in the Loop (Frontend Tools + async HITL)
    description: Agent requests approval via useFrontendTool with an async handler; the approval UI pops up as an app-level modal OUTSIDE the chat
    tags:
      - interactivity
    route: /demos/hitl-in-app
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/app/demos/hitl-in-app/page.tsx
      - src/app/demos/hitl-in-app/approval-dialog.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl
    name: In-Chat Human in the Loop (original)
    description: Original Mastra HITL demo — kept for backwards-compat
    tags:
      - interactivity
    route: /demos/hitl
    animated_preview_url:
  - id: tool-rendering
    name: Tool Rendering
    description: Custom per-tool renderers plus a wildcard catch-all for every other tool
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - src/mastra/tools/index.ts
      - src/app/demos/tool-rendering/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering-default-catchall
    name: Tool Rendering (Default Catch-all)
    description: Out-of-the-box tool rendering — backend defines tools; frontend adds zero custom renderers
    tags:
      - generative-ui
    route: /demos/tool-rendering-default-catchall
    animated_preview_url:
    highlight:
      - src/mastra/tools/index.ts
      - src/app/demos/tool-rendering-default-catchall/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering-custom-catchall
    name: Tool Rendering (Custom Catch-all)
    description: Single branded wildcard renderer via useDefaultRenderTool
    tags:
      - generative-ui
    route: /demos/tool-rendering-custom-catchall
    animated_preview_url:
    highlight:
      - src/mastra/tools/index.ts
