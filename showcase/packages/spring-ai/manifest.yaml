name: Spring AI
slug: spring-ai
category: enterprise-platform
language: java
logo: /logos/spring-ai.svg
description: >-
  CopilotKit integration with Spring AI. Java-based agent backend with a broad
  feature coverage including frontend tools, in-chat and in-app human-in-the-
  loop, generative UI, per-tool renderers, agent context, and prebuilt chat
  surfaces (sidebar / popup / slots / headless). Demos that depend on
  LangGraph-specific primitives (interrupt, multi-agent orchestration, per-
  token state streaming, MCP-driven UI) are documented as skipped in
  PARITY_NOTES.md.
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/spring-ai
copilotkit_version: 2.0.0
backend_url: https://showcase-spring-ai-production.up.railway.app
deployed: true
sort_order: 170
generative_ui:
  - constrained-explicit
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
features:
  - agentic-chat
  - agentic-chat-reasoning
  - reasoning-default-render
  - tool-rendering-reasoning-chain
  - chat-customization-css
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering
  - frontend-tools
  - frontend-tools-async
  - hitl-in-chat
  - hitl-in-app
  - gen-ui-tool-based
  - gen-ui-agent
  - open-gen-ui
  - open-gen-ui-advanced
  - declarative-gen-ui
  - a2ui-fixed-schema
  - shared-state-read-write
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - headless-simple
  - headless-complete
  - beautiful-chat
  - readonly-state-agent-context
  - auth
  - voice
  - multimodal
  - agent-config
  - mcp-apps
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/main/java/com/copilotkit/showcase/springai/AgentConfig.java
