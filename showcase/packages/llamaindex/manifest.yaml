name: LlamaIndex
slug: llamaindex
category: emerging
language: python
logo: /logos/llamaindex.svg
description: CopilotKit integration with LlamaIndex
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/llamaindex
copilotkit_version: 2.0.0
backend_url: https://showcase-llamaindex-production.up.railway.app
deployed: true
sort_order: 110
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
starter:
  path: showcase/starters/llamaindex
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/llamaindex
  demo_url: https://showcase-starter-llamaindex-production-78fe.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/llamaindex my-copilotkit-app
features:
  - agentic-chat
  - agentic-chat-reasoning
  - reasoning-default-render
  - tool-rendering-reasoning-chain
  - frontend-tools
  - frontend-tools-async
  - hitl-in-chat
  - hitl-in-app
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - gen-ui-tool-based
  - gen-ui-agent
  - declarative-gen-ui
  - a2ui-fixed-schema
  - byoc-json-render
  - byoc-hashbrown
  - beautiful-chat
  - multimodal
  - auth
  - voice
  - open-gen-ui
  - open-gen-ui-advanced
  - agent-config
  - mcp-apps
  - shared-state-read-write
  - shared-state-streaming
  - subagents
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - headless-complete
  - readonly-state-agent-context
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: frontend-tools
    name: Frontend Tools (In-App Actions)
    description: Agent invokes client-side handlers registered with useFrontendTool
    tags:
      - interactivity
    route: /demos/frontend-tools
    animated_preview_url:
    highlight:
      - src/app/demos/frontend-tools/agent.py
      - src/app/demos/frontend-tools/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: frontend-tools-async
    name: Frontend Tools (Async)
    description: useFrontendTool with an async handler — agent awaits a simulated client-side notes DB query and uses the returned result
    tags:
      - interactivity
    route: /demos/frontend-tools-async
    animated_preview_url:
    highlight:
      - src/app/demos/frontend-tools-async/agent.py
      - src/app/demos/frontend-tools-async/page.tsx
      - src/app/demos/frontend-tools-async/notes-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat HITL (useHumanInTheLoop — ergonomic API)
    description: Interactive approval/decision surface rendered inline in the chat via the high-level `useHumanInTheLoop` hook
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    animated_preview_url:
    highlight:
      - src/app/demos/hitl-in-chat/agent.py
      - src/app/demos/hitl-in-chat/page.tsx
      - src/app/demos/hitl-in-chat/time-picker-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-app
    name: In-App Human in the Loop (Frontend Tools + async HITL)
    description: Agent requests approval via useFrontendTool with an async handler; the approval UI pops up as an app-level modal OUTSIDE the chat
    tags:
      - interactivity
    route: /demos/hitl-in-app
    animated_preview_url:
    highlight:
      - src/app/demos/hitl-in-app/agent.py
      - src/app/demos/hitl-in-app/page.tsx
