name: PydanticAI
slug: pydantic-ai
category: agent-framework
language: python
logo: /logos/pydantic-ai.svg
description: CopilotKit integration with PydanticAI
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/pydantic-ai
copilotkit_version: 2.0.0
backend_url: https://showcase-pydantic-ai-production.up.railway.app
deployed: true
sort_order: 50
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
starter:
  path: showcase/starters/pydantic-ai
  name: Sales Dashboard
  description: Full-featured sales pipeline with 5 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/pydantic-ai
  demo_url: https://showcase-starter-pydantic-ai-production-cf5b.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/pydantic-ai
    my-copilotkit-app
features:
  - agentic-chat
  - hitl-in-chat
  - tool-rendering
  - gen-ui-tool-based
  - gen-ui-agent
  - shared-state-read-write
  - shared-state-streaming
  - subagents
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat Human in the Loop
    description: User approves agent actions before execution
    tags:
      - interactivity
    route: /demos/hitl
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: tool-rendering
    name: Tool Rendering
    description: Backend agent tools rendered as UI components
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: gen-ui-tool-based
    name: Tool-Based Generative UI
    description: Agent uses tools to trigger UI generation
    tags:
      - generative-ui
    route: /demos/gen-ui-tool-based
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: gen-ui-agent
    name: Agentic Generative UI
    description: Long-running agent tasks with generated UI
    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: shared-state-read-write
    name: Shared State (Read + Write)
    description: Bidirectional agent state — UI writes preferences, agent writes notes back
    tags:
      - agent-state
    route: /demos/shared-state-read-write
    animated_preview_url:
    highlight:
      - backend/agent.py
      - backend/server.py
      - frontend/src/app/page.tsx
      - frontend/src/app/api/copilotkit/route.ts
  - id: shared-state-streaming
