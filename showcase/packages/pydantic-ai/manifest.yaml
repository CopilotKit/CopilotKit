name: PydanticAI
slug: pydantic-ai
category: agent-framework
language: python
logo: /logos/pydantic-ai.svg
description: CopilotKit integration with PydanticAI
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/pydantic-ai
copilotkit_version: 2.0.0
backend_url: https://showcase-pydantic-ai-production.up.railway.app
deployed: true
sort_order: 50
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
starter:
  path: showcase/starters/pydantic-ai
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/pydantic-ai
  demo_url: https://showcase-starter-pydantic-ai-production-cf5b.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/pydantic-ai my-copilotkit-app
features:
  - cli-start
  - agentic-chat
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - hitl
  - hitl-in-app
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - gen-ui-agent
  - shared-state-streaming
  - readonly-state-agent-context
  - open-gen-ui
  - open-gen-ui-advanced
  - declarative-gen-ui
  - a2ui-fixed-schema
  - headless-complete
  - beautiful-chat
  - byoc-json-render
  - byoc-hashbrown
  - multimodal
  - voice
  - agent-config
  - auth
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to clone the canonical starter
    tags:
      - chat-ui
    command: "npx copilotkit@latest init --framework pydantic-ai"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: prebuilt-sidebar
    name: "Pre-Built: Sidebar"
    description: Docked sidebar chat via <CopilotSidebar />
    tags:
      - chat-ui
    route: /demos/prebuilt-sidebar
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/prebuilt-sidebar/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: prebuilt-popup
    name: "Pre-Built: Popup"
    description: Floating popup chat via <CopilotPopup />
    tags:
      - chat-ui
    route: /demos/prebuilt-popup
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/prebuilt-popup/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: chat-slots
    name: Chat Customization (Slots)
    description: Customize CopilotChat via its slot system
    tags:
      - chat-ui
    route: /demos/chat-slots
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/chat-slots/page.tsx
      - src/app/demos/chat-slots/custom-welcome-screen.tsx
      - src/app/demos/chat-slots/custom-assistant-message.tsx
      - src/app/demos/chat-slots/custom-disclaimer.tsx
      - src/app/api/copilotkit/route.ts
  - id: chat-customization-css
    name: Chat Customization (CSS)
    description: Default CopilotChat re-themed via CopilotKitCSSProperties
    tags:
      - chat-ui
    route: /demos/chat-customization-css
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/chat-customization-css/page.tsx
      - src/app/demos/chat-customization-css/theme.css
