name: MS Agent Framework (.NET)
slug: ms-agent-dotnet
category: enterprise-platform
language: dotnet
logo: /logos/ms-agent-dotnet.svg
description: >-
  CopilotKit integration with Microsoft Agent Framework for .NET via AG-UI
  protocol. Full feature parity including generative UI, shared state,
  human-in-the-loop, sub-agents, and streaming.
partner_docs: https://docs.copilotkit.ai/microsoft-agent-framework
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/ms-agent-dotnet
copilotkit_version: 2.0.0
backend_url: https://showcase-ms-agent-dotnet-production.up.railway.app
deployed: true
sort_order: 160
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
starter:
  path: showcase/starters/ms-agent-dotnet
  name: Sales Dashboard
  description: Full-featured sales pipeline with 5 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/ms-agent-dotnet
  demo_url: https://showcase-starter-ms-agent-dotnet-production-b8cf.up.railway.app
  clone_command:
    npx degit CopilotKit/CopilotKit/showcase/starters/ms-agent-dotnet
    my-copilotkit-app
features:
  - agentic-chat
  - hitl-in-chat
  - tool-rendering
  - gen-ui-tool-based
  - gen-ui-agent
  - shared-state-read
  - shared-state-write
  - shared-state-streaming
  - subagents
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
  - id: hitl-in-chat
    name: In-Chat Human in the Loop
    description: User approves agent actions before execution
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    animated_preview_url:
  - id: tool-rendering
    name: Tool Rendering
    description: Backend agent tools rendered as UI components
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
  - id: gen-ui-tool-based
    name: Tool-Based Generative UI
    description: Agent uses tools to trigger UI generation
    tags:
      - generative-ui
    route: /demos/gen-ui-tool-based
    animated_preview_url:
  - id: gen-ui-agent
    name: Agentic Generative UI
    description: Long-running agent tasks with generated UI
    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    animated_preview_url:
  - id: shared-state-read
    name: Shared State (Reading)
    description: Reading agent state from UI
    tags:
      - agent-state
    route: /demos/shared-state-read
    animated_preview_url:
  - id: shared-state-write
    name: Shared State (Writing)
    description: Writing to agent state from UI
    tags:
      - agent-state
    route: /demos/shared-state-write
    animated_preview_url:
  - id: shared-state-streaming
    name: State Streaming
    description: Per-token state delta streaming from agent to UI
    tags:
      - agent-state
    route: /demos/shared-state-streaming
    animated_preview_url:
  - id: subagents
    name: Sub-Agents
    description: Multiple agents with visible task delegation
    tags:
      - multi-agent
    route: /demos/subagents
    animated_preview_url:
