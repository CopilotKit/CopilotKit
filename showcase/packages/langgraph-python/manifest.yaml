name: LangGraph (Python)
slug: langgraph-python
category: popular
language: python
logo: /logos/langgraph-python.svg
description: >-
  The most feature-complete CopilotKit integration. LangGraph provides a
  flexible graph-based framework for building agents with Python. Supports the
  full range of CopilotKit features including generative UI, shared state,
  human-in-the-loop, sub-agents, and streaming.
partner_docs: https://docs.copilotkit.ai/integrations/langgraph
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/langgraph-python
copilotkit_version: 2.0.0
backend_url: https://showcase-langgraph-python-production.up.railway.app
deployed: true
sort_order: 10
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
managed_platform:
  name: LangGraph Platform
  url: https://langsmith.com
starter:
  path: showcase/starters/langgraph-python
  name: Sales Dashboard
  description: Full-featured sales pipeline with 5 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/langgraph-python
  demo_url: https://showcase-starter-langgraph-python-production-3f57.up.railway.app
  clone_command: npx degit
    CopilotKit/CopilotKit/showcase/starters/langgraph-python my-copilotkit-app
features:
  - agentic-chat
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - headless-complete
  - agentic-chat-reasoning
  - reasoning-default-render
  - frontend-tools
  - gen-ui-tool-based
  - hitl-in-chat
  - gen-ui-interrupt
  - interrupt-headless
  - declarative-gen-ui
  - declarative-gen-ui-hardcoded
  - a2ui-fixed-schema
  - mcp-apps
  - open-gen-ui
  - open-gen-ui-advanced
  - gen-ui-agent
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering
  - tool-rendering-frontend-tools
  - tool-rendering-reasoning-chain
  - shared-state-read-write
  - shared-state-streaming
  - readonly-state-agent-context
  - subagents
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - backend/agent.py
      - frontend/src/app/page.tsx
  - id: chat-customization-css
    name: Chat Customization (CSS)
    description: Default CopilotChat re-themed via CopilotKitCSSProperties
    tags:
      - chat-ui
    route: /demos/chat-customization-css
    animated_preview_url:
    highlight:
      - backend/agent.py
      - frontend/src/app/page.tsx
      - frontend/src/app/theme.css
  - id: tool-rendering-default-catchall
    name: Tool Rendering (Default Catch-all)
    description: Out-of-the-box tool rendering — backend defines the tools; the frontend adds zero custom renderers and relies on CopilotKit's built-in default UI
    tags:
      - generative-ui
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - frontend/src/app/page.tsx
      - backend/agent.py
  - id: tool-rendering-custom-catchall
    name: Tool Rendering (Custom Catch-all)
    description: Single branded wildcard renderer via useDefaultRenderTool — the same app-designed card paints every tool call
    tags:
      - generative-ui
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - frontend/src/app/page.tsx
      - frontend/src/app/custom-catchall-renderer.tsx
      - backend/agent.py
  - id: tool-rendering-frontend-tools
    name: Tool Rendering (frontend tools) (testing)
    description: Tool is defined on the frontend via useFrontendTool; backend has no tools
    tags:
      - generative-ui
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - frontend/src/app/page.tsx
      - frontend/src/app/weather-card.tsx
      - backend/agent.py
  - id: frontend-tools
    name: Frontend Tools (In-App Actions)
    description: Agent invokes client-side handlers registered with useFrontendTool
    tags:
      - interactivity
    route: /demos/frontend-tools
    animated_preview_url:
    highlight:
      - backend/agent.py
      - frontend/src/app/page.tsx
  - id: hitl-in-chat
    name: In-Chat Human in the Loop
    description: User approves agent actions before execution
    tags:
      - interactivity
    route: /demos/hitl
    animated_preview_url:
    highlight:
      - backend/agent.py
      - frontend/src/app/page.tsx
      - frontend/src/app/time-picker-card.tsx
  - id: tool-rendering
    name: Tool Rendering
    description: Custom per-tool renderers (WeatherCard, FlightListCard) plus a wildcard catch-all for every other tool
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
