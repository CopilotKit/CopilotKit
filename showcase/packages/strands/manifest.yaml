name: AWS Strands
slug: strands
category: emerging
language: python
logo: /logos/strands.svg
description: CopilotKit integration with AWS Strands
managed_platform:
  name: AWS Bedrock AgentCore
  url: https://aws.amazon.com/bedrock/agents/
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/strands
copilotkit_version: 2.0.0
backend_url: https://showcase-strands-production.up.railway.app
deployed: true
sort_order: 130
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
starter:
  path: showcase/starters/strands
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/strands
  demo_url: https://showcase-starter-strands-production-1114.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/strands my-copilotkit-app
features:
  - cli-start
  - agentic-chat
  - chat-customization-css
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - headless-simple
  - headless-complete
  - agentic-chat-reasoning
  - reasoning-default-render
  - frontend-tools
  - frontend-tools-async
  - hitl-in-chat
  - hitl-in-app
  - tool-rendering-reasoning-chain
  - gen-ui-agent
  - declarative-gen-ui
  - a2ui-fixed-schema
  - shared-state-streaming
  - readonly-state-agent-context
  - multimodal
  - voice
  - auth
  - agent-config
  - byoc-hashbrown
  - byoc-json-render
  - open-gen-ui
  - open-gen-ui-advanced
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to clone the canonical starter
    tags:
      - chat-ui
    command: "npx copilotkit@latest init --framework strands"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: chat-customization-css
    name: Chat Customization (CSS)
    description: Default CopilotChat re-themed via CopilotKitCSSProperties
    tags:
      - chat-ui
    route: /demos/chat-customization-css
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/chat-customization-css/page.tsx
      - src/app/demos/chat-customization-css/theme.css
      - src/app/api/copilotkit/route.ts
  - id: prebuilt-sidebar
    name: "Pre-Built: Sidebar"
    description: Docked sidebar chat via <CopilotSidebar />
    tags:
      - chat-ui
    route: /demos/prebuilt-sidebar
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/prebuilt-sidebar/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: prebuilt-popup
