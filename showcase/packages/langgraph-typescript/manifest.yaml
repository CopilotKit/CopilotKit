name: LangGraph (TypeScript)
slug: langgraph-typescript
category: popular
language: typescript
logo: /logos/langgraph-typescript.svg
description: >-
  TypeScript variant of the LangGraph integration. Uses @langchain/langgraph
  to define a graph-based agent with tool calling, shared state, and memory,
  connected to CopilotKit via the LangGraph AG-UI adapter.
partner_docs: https://docs.copilotkit.ai/integrations/langgraph
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/langgraph-typescript
copilotkit_version: 2.0.0
backend_url: https://showcase-langgraph-typescript-production.up.railway.app
deployed: true
sort_order: 11
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
managed_platform:
  name: LangGraph Platform
  url: https://langsmith.com
starter:
  path: showcase/starters/langgraph-typescript
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/langgraph-typescript
  demo_url: https://showcase-starter-langgraph-typescript-production-25ca.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/langgraph-typescript my-copilotkit-app
features:
  - agentic-chat
  - hitl-in-chat
  - tool-rendering
  - gen-ui-tool-based
  - gen-ui-agent
  - shared-state-read-write
  - shared-state-streaming
  - subagents
  - byoc-hashbrown
  - byoc-json-render
  - open-gen-ui
  - open-gen-ui-advanced
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
  - id: hitl-in-chat
    name: In-Chat Human in the Loop
    description: User approves agent actions before execution
    tags:
      - interactivity
    route: /demos/hitl
    animated_preview_url:
  - id: tool-rendering
    name: Tool Rendering
    description: Backend agent tools rendered as UI components
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
  - id: gen-ui-tool-based
    name: Tool-Based Generative UI
    description: Agent uses tools to trigger UI generation
    tags:
      - generative-ui
    route: /demos/gen-ui-tool-based
    animated_preview_url:
  - id: gen-ui-agent
    name: Agentic Generative UI
    description: Long-running agent tasks with generated UI
    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    animated_preview_url:
  - id: shared-state-read-write
    name: Shared State (Read + Write)
    description: Bidirectional agent state — UI writes preferences, agent writes notes back
    tags:
      - agent-state
    route: /demos/shared-state-read-write
    animated_preview_url:
  - id: shared-state-streaming
    name: State Streaming
    description: Per-token state delta streaming from agent to UI
    tags:
      - agent-state
    route: /demos/shared-state-streaming
    animated_preview_url:
  - id: subagents
    name: Sub-Agents
    description: Multiple agents with visible task delegation
    tags:
      - multi-agent
    route: /demos/subagents
    animated_preview_url:
  - id: byoc-hashbrown
    name: BYOC Hashbrown
    description: Streaming structured output via @hashbrownai/react, rendering a sales dashboard catalog (MetricCard + PieChart + BarChart)
    tags:
      - generative-ui
    route: /demos/byoc-hashbrown
    animated_preview_url:
    highlight:
      - src/agent/byoc-hashbrown.ts
      - src/app/demos/byoc-hashbrown/page.tsx
      - src/app/demos/byoc-hashbrown/hashbrown-renderer.tsx
      - src/app/demos/byoc-hashbrown/metric-card.tsx
      - src/app/demos/byoc-hashbrown/charts/bar-chart.tsx
      - src/app/demos/byoc-hashbrown/charts/pie-chart.tsx
      - src/app/demos/byoc-hashbrown/types.ts
      - src/app/demos/byoc-hashbrown/suggestions.ts
      - src/app/api/copilotkit-byoc-hashbrown/route.ts
  - id: byoc-json-render
    name: BYOC json-render
    description: Streaming hierarchical JSON UI spec rendered via @json-render/react, with a Zod-validated catalog (MetricCard + PieChart + BarChart)
    tags:
      - generative-ui
    route: /demos/byoc-json-render
    animated_preview_url:
    highlight:
      - src/agent/byoc-json-render.ts
      - src/app/demos/byoc-json-render/page.tsx
      - src/app/demos/byoc-json-render/json-render-renderer.tsx
      - src/app/demos/byoc-json-render/registry.tsx
      - src/app/demos/byoc-json-render/catalog.ts
      - src/app/demos/byoc-json-render/metric-card.tsx
      - src/app/demos/byoc-json-render/charts/bar-chart.tsx
      - src/app/demos/byoc-json-render/charts/pie-chart.tsx
      - src/app/demos/byoc-json-render/types.ts
      - src/app/demos/byoc-json-render/suggestions.ts
      - src/app/api/copilotkit-byoc-json-render/route.ts
  - id: open-gen-ui
    name: Fully Open-Ended Generative UI
    description: Agent generates UI from an arbitrary component library
    tags:
      - generative-ui
    route: /demos/open-gen-ui
    animated_preview_url:
    highlight:
      - src/agent/open-gen-ui.ts
      - src/app/demos/open-gen-ui/page.tsx
      - src/app/api/copilotkit-ogui/route.ts
  - id: open-gen-ui-advanced
    name: "Open-Ended Gen UI (Advanced: with frontend function calling)"
    description: Agent-authored UI that can invoke frontend sandbox functions from inside the iframe
    tags:
      - generative-ui
    route: /demos/open-gen-ui-advanced
    animated_preview_url:
    highlight:
      - src/agent/open-gen-ui-advanced.ts
      - src/app/demos/open-gen-ui-advanced/page.tsx
      - src/app/demos/open-gen-ui-advanced/sandbox-functions.ts
      - src/app/demos/open-gen-ui-advanced/suggestions.ts
      - src/app/api/copilotkit-ogui/route.ts
