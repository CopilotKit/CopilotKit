name: CrewAI (Crews)
slug: crewai-crews
category: popular
language: python
logo: /logos/crewai-crews.svg
description: CopilotKit integration with CrewAI (Crews)
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/packages/crewai-crews
copilotkit_version: 2.0.0
backend_url: https://showcase-crewai-crews-production.up.railway.app
deployed: true
sort_order: 40
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
managed_platform:
  name: CrewAI Enterprise
  url: https://crewai.com/amp
starter:
  path: showcase/starters/crewai-crews
  name: Sales Dashboard
  description: Full-featured sales pipeline with 4 GenUI rendering strategies
  github_url: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/starters/crewai-crews
  demo_url: https://showcase-starter-crewai-crews-production-ad85.up.railway.app
  clone_command: npx degit CopilotKit/CopilotKit/showcase/starters/crewai-crews my-copilotkit-app
features:
  - agentic-chat
  - agentic-chat-reasoning
  - reasoning-default-render
  - chat-slots
  - chat-customization-css
  - prebuilt-sidebar
  - prebuilt-popup
  - headless-simple
  - headless-complete
  - hitl-in-chat
  - hitl-in-app
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering-reasoning-chain
  - gen-ui-tool-based
  - gen-ui-agent
  - frontend-tools
  - frontend-tools-async
  - shared-state-read-write
  - shared-state-streaming
  - readonly-state-agent-context
  - subagents
  - open-gen-ui
  - open-gen-ui-advanced
  - agent-config
  - auth
  - voice
  - multimodal
  - declarative-gen-ui
  - a2ui-fixed-schema
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
  - id: agentic-chat-reasoning
    name: Reasoning
    description: Visible reasoning/thinking chain alongside the final answer
    tags:
      - generative-ui
    route: /demos/agentic-chat-reasoning
    animated_preview_url:
  - id: reasoning-default-render
    name: Reasoning (Default Render)
    description: Built-in CopilotChatReasoningMessage renders without a custom slot
    tags:
      - generative-ui
    route: /demos/reasoning-default-render
    animated_preview_url:
  - id: prebuilt-sidebar
    name: "Pre-Built: Sidebar"
    description: Docked sidebar chat via <CopilotSidebar />
    tags:
      - chat-ui
    route: /demos/prebuilt-sidebar
    animated_preview_url:
  - id: prebuilt-popup
    name: "Pre-Built: Popup"
    description: Floating popup chat via <CopilotPopup />
    tags:
      - chat-ui
    route: /demos/prebuilt-popup
    animated_preview_url:
  - id: chat-slots
    name: Chat Customization (Slots)
    description: Customize CopilotChat via its slot system
    tags:
      - chat-ui
    route: /demos/chat-slots
    animated_preview_url:
  - id: chat-customization-css
    name: Chat Customization (CSS)
    description: Default CopilotChat re-themed via CopilotKitCSSProperties
    tags:
      - chat-ui
    route: /demos/chat-customization-css
    animated_preview_url:
  - id: headless-simple
    name: Headless Chat (Simple)
    description: Minimal custom chat surface built on useAgent
    tags:
      - chat-ui
    route: /demos/headless-simple
    animated_preview_url:
  - id: headless-complete
    name: Headless Chat (Complete)
    description: Full chat implementation built from scratch on useAgent
    tags:
      - chat-ui
    route: /demos/headless-complete
    animated_preview_url:
  - id: hitl-in-chat
    name: In-Chat Human in the Loop
