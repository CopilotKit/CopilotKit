    name: Beautiful Chat
    description: "Canonical polished flagship — combines A2UI (fixed FlightCard + dynamic render_a2ui), Open Generative UI, MCP Apps (Excalidraw), shared todos state, and useComponent/useFrontendTool in one cell, all wired to the real Hermes agent over AG-UI. Shared `todos` state is written via the manage_todos state-writer tool declared to the hermes adapter through forwarded_props."
    tags:
      - chat-ui
    route: /demos/beautiful-chat
    highlight:
      - src/app/demos/beautiful-chat/page.tsx
