name: Hermes
slug: hermes
category: agent-framework
language: python
logo: /logos/hermes.svg
description: >-
  CopilotKit integration with the Hermes agent by Nous Research, wired through
  the Hermes AG-UI adapter. A self-improving agent exposed over the AG-UI
  protocol and driven by CopilotKit's React UI.
partner_docs: https://hermes-agent.nousresearch.com/docs/
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/hermes
copilotkit_version: 2.0.0
deployed: false
# `generated` (the default, as used by langgraph-python): shell-docs renders a
# data-driven FrameworkOverview — no per-framework MDX tree required. Hermes
# ships no authored tree under shell-docs/src/content/docs/integrations/hermes,
# so `authored` here would have rendered an empty page. Flip to `authored`
# (and add the tree) if/when hermes gets hand-written docs.
docs_mode: generated
sort_order: 60
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - chat
managed_platform:
  name: Nous Portal
  url: https://portal.nousresearch.com
not_supported_features:
  # a2ui-recovery: the EXHAUST hard-fail end-state requires an AGENT-emitted
  # tool result carrying the `a2ui_recovery_exhausted` envelope, which the
  # langgraph variants produce in-graph via `ag_ui_langgraph.get_a2ui_tools`.
  # Hermes has no A2UI backend, and its aimock transport cannot emit an
  # agent-side tool result the A2UI middleware would parse for that envelope,
  # so the demo cannot go fully green. HEAL works; EXHAUST does not. Same
  # omission as pydantic-ai (which also lacks this demo entirely).
  - a2ui-recovery
  # gen-ui-interrupt / interrupt-headless: QUARANTINED upstream. langgraph-python
  # ITSELF marks these not-supported — a @copilotkit/react-core/v2
  # useInterrupt/useHeadlessInterrupt RESUME-PATH hook bug (backend resumes and
  # streams HTTP 200, but the frontend never appends the confirmation assistant
  # bubble). The fix is a published-package change, out of scope for this integration.
  - gen-ui-interrupt
  - interrupt-headless
features:
  - cli-start
  - beautiful-chat
  - agentic-chat
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - headless-complete
  - frontend-tools
  - frontend-tools-async
  - hitl-in-chat
  - hitl-in-app
  - gen-ui-tool-based
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering-reasoning-chain
  - readonly-state-agent-context
  - shared-state-read
  - shared-state-read-write
  - gen-ui-agent
  - agent-config
  - multimodal
  - declarative-json-render
  - declarative-hashbrown
  - reasoning-default
  - reasoning-custom
  - auth
  - voice
  - open-gen-ui
  - open-gen-ui-advanced
  - declarative-gen-ui
  - a2ui-fixed-schema
  - mcp-apps
# Framework-pattern flags consumed by shell-docs (<WhenFrameworkHas>). Hermes
# is the generic-AG-UI analog of pydantic-ai (same copilotRuntimeNextJSAppRouter
# + HttpAgent + ExperimentalEmptyAdapter wiring), so its patterns match:
#   a2ui: fixed schema loaded via the middleware-injected render_a2ui path.
#   interrupt: CopilotKit promise-based frontend interrupt (no native backend
#     interrupt — hermes has no graph); HITL demos use the render-and-wait path.
#   agent_config: typed config forwarded as shared state (forwarded_props).
#   auth: CopilotKit runtime onRequest hook (see api/copilotkit-auth/route.ts).
a2ui_pattern: schema-loading
interrupt_pattern: promise-based
agent_config_pattern: shared-state
auth_pattern: runtime-onrequest
demos:
