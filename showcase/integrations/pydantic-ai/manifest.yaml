name: PydanticAI
slug: pydantic-ai
category: agent-framework
language: python
logo: /logos/pydantic-ai.svg
description: CopilotKit integration with PydanticAI
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/pydantic-ai
copilotkit_version: 2.0.0
deployed: true
docs_mode: authored
sort_order: 50
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
not_supported_features:
  - shared-state-streaming
  # QUARANTINED pending a @copilotkit/react-core release. gen-ui-interrupt /
  # interrupt-headless fail turn-2 on a useInterrupt/useHeadlessInterrupt
  # RESUME-PATH hook bug in @copilotkit/react-core/v2: backend resumes + streams
  # (HTTP 200) but the frontend never appends the confirmation assistant bubble,
  # so the harness DOM settle-check times out. Fix is a published-package change
  # (out of scope here); honestly marked not-supported (skipped-incapable, not
  # green, not red) rather than a regression. Demos remain wired below.
  - gen-ui-interrupt
  - interrupt-headless
  - reasoning-default-render
  - agentic-chat-reasoning
  - tool-rendering-reasoning-chain
features:
  - cli-start
  - agentic-chat
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - hitl
  - hitl-in-app
  - hitl-in-chat
  - hitl-in-chat-booking
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - gen-ui-agent
  - gen-ui-tool-based
  - shared-state-read-write
  - readonly-state-agent-context
  - subagents
  - open-gen-ui
  - open-gen-ui-advanced
  - declarative-gen-ui
  - a2ui-fixed-schema
  - headless-complete
  - beautiful-chat
  - declarative-json-render
  - declarative-hashbrown
  - multimodal
  - voice
  - agent-config
  - auth
  - reasoning-default
  - reasoning-custom
  - mcp-apps
  - shared-state-read
a2ui_pattern: schema-loading
interrupt_pattern: promise-based
agent_config_pattern: shared-state
auth_pattern: runtime-onrequest
