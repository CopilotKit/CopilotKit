name: OpenClaw
slug: openclaw
category: emerging
language: typescript
logo: /logos/openclaw.svg
description: CopilotKit integration with OpenClaw — a self-hosted multi-channel
  AI gateway. Connects via the clawg-ui AG-UI adapter (operator-auth route), so
  a CopilotKit frontend drives an OpenClaw agent with streaming responses, tool
  rendering, and A2UI.
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/openclaw
copilotkit_version: 2.0.0
deployed: false
docs_mode: hidden
sort_order: 145
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
not_supported_features:
  - shared-state-streaming
  - gen-ui-interrupt
  - interrupt-headless
features:
  - beautiful-chat
  - cli-start
  - agentic-chat
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - headless-complete
  - reasoning-custom
  - reasoning-default
  - frontend-tools
  - frontend-tools-async
  - gen-ui-tool-based
  - hitl-in-chat
  - hitl-in-chat-booking
  - hitl
  - hitl-in-app
  - declarative-gen-ui
  - a2ui-fixed-schema
  - mcp-apps
  - gen-ui-agent
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering
  - tool-rendering-reasoning-chain
  - shared-state-read-write
  - readonly-state-agent-context
  - subagents
  - multimodal
  - auth
  - declarative-hashbrown
  - declarative-json-render
  - open-gen-ui
  - open-gen-ui-advanced
  - voice
  - agent-config
agent_config_pattern: shared-state
interrupt_pattern: promise-based
a2ui_pattern: schema-loading
auth_pattern: runtime-onrequest
