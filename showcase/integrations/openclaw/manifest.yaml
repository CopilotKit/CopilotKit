name: OpenClaw
slug: openclaw
category: emerging
language: typescript
logo: /logos/openclaw.svg
description: >-
  CopilotKit integration with OpenClaw — a self-hosted multi-channel AI gateway.
  Connects via the clawg-ui AG-UI adapter (operator-auth route), so a CopilotKit
  frontend drives an OpenClaw agent with streaming responses and server-side
  tool rendering.
partner_docs: null
docs_mode: hidden
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/openclaw
copilotkit_version: 2.0.0
deployed: false
sort_order: 145
interaction_modalities:
  - sidebar
  - embedded
  - chat
features:
  - agentic-chat
  - agentic-chat-reasoning
  - tool-rendering
  - frontend-tools
  - hitl-in-chat
  - hitl-in-app
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-customization-css
  - chat-slots
  - reasoning-custom
  - hitl
  - agent-config
  - frontend-tools-async
  - readonly-state-agent-context
  - gen-ui-agent
  - gen-ui-tool-based
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
demos:
  - id: agentic-chat
    name: Agentic Chat
    description: >-
      Streaming chat with an OpenClaw agent through the clawg-ui AG-UI adapter.
    tags:
      - chat-ui
    route: /demos/agentic-chat
    highlight:
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: agentic-chat-reasoning
    name: Agentic Chat (Reasoning)
    description: >-
      The OpenClaw agent in reasoning "stream" mode — REASONING_* events render
      as a live reasoning panel alongside the streamed answer.
    tags:
      - chat-ui
    route: /demos/agentic-chat-reasoning
    highlight:
      - src/app/demos/agentic-chat-reasoning/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering
    name: Tool Rendering
    description: >-
      Renders the OpenClaw agent's server-side tool calls (e.g. shell/read)
      inline in the conversation as tool-call cards.
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    highlight:
      - src/app/demos/tool-rendering/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: frontend-tools
    name: Frontend Tools
    description: >-
      A tool defined in React, executed in the browser, and invoked by the
      OpenClaw agent — forwarded over AG-UI as an OpenClaw client tool.
    tags:
      - interactivity
    route: /demos/frontend-tools
    highlight:
      - src/app/demos/frontend-tools/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat HITL (useHumanInTheLoop)
    description: >-
      An approval/decision surface rendered inline in the chat via the
      high-level useHumanInTheLoop hook — the agent pauses for the user's
      choice, which returns as the tool result.
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    highlight:
      - src/app/demos/hitl-in-chat/page.tsx
      - src/app/demos/hitl-in-chat/time-picker-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-app
    name: In-App Human in the Loop
    description: >-
      The agent requests approval via a frontend tool with an async handler;
      the approval UI pops up as an app-level modal OUTSIDE the chat.
    tags:
      - interactivity
    route: /demos/hitl-in-app
    highlight:
      - src/app/demos/hitl-in-app/page.tsx
      - src/app/demos/hitl-in-app/approval-dialog.tsx
      - src/app/api/copilotkit/route.ts
  - id: prebuilt-sidebar
    name: Prebuilt Sidebar
    description: The OpenClaw agent in CopilotKit's prebuilt docked sidebar.
    tags:
      - chat-ui
    route: /demos/prebuilt-sidebar
    highlight:
      - src/app/demos/prebuilt-sidebar/page.tsx
  - id: prebuilt-popup
    name: Prebuilt Popup
    description: The OpenClaw agent in CopilotKit's floating popup widget.
    tags:
      - chat-ui
    route: /demos/prebuilt-popup
    highlight:
      - src/app/demos/prebuilt-popup/page.tsx
  - id: chat-customization-css
    name: Chat Customization (CSS)
    description: The built-in chat, fully restyled via scoped CSS variables.
    tags:
      - chat-ui
    route: /demos/chat-customization-css
    highlight:
      - src/app/demos/chat-customization-css/page.tsx
      - src/app/demos/chat-customization-css/theme.css
  - id: chat-slots
    name: "Chat Customization: Slots"
    description: Customize CopilotChat via its slot system.
    tags:
      - chat-ui
    route: /demos/chat-slots
    highlight:
      - src/app/demos/chat-slots/page.tsx
      - src/app/demos/chat-slots/slot-wrappers.tsx
      - src/app/api/copilotkit/route.ts
  - id: reasoning-custom
    name: "Reasoning: Custom"
    description: >-
      The OpenClaw agent's REASONING_* events rendered through a custom
      reasoningMessage slot (ReasoningBlock) alongside the streamed answer.
    tags:
      - chat-ui
    route: /demos/reasoning-custom
    highlight:
      - src/app/demos/reasoning-custom/page.tsx
      - src/app/demos/reasoning-custom/reasoning-block.tsx
      - src/app/demos/reasoning-custom/suggestions.ts
  - id: hitl
    name: Human in the Loop
    description: >-
      The agent proposes a list of task steps via the useHumanInTheLoop hook;
      an inline review card lets the user enable/disable steps and confirm or
      reject, returning the decision as the tool result.
    tags:
      - interactivity
    route: /demos/hitl
    highlight:
      - src/app/demos/hitl/page.tsx
      - src/app/demos/hitl/steps-feedback.tsx
      - src/app/api/copilotkit/route.ts
  - id: agent-config
    name: Agent Config Object
    description: >-
      Forward a typed config object (tone / expertise / response length) from
      the provider to the OpenClaw agent via useAgentContext — clawg-ui appends
      it to the prompt so the agent adapts every reply.
    tags:
      - platform
    route: /demos/agent-config
    highlight:
      - src/app/demos/agent-config/page.tsx
      - src/app/demos/agent-config/config-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: frontend-tools-async
    name: Frontend Tools (Async)
    description: >-
      A tool defined in React with an ASYNC handler, executed in the browser and
      invoked by the OpenClaw agent — the handler awaits a client-side round-trip
      before applying the result.
    tags:
      - interactivity
    route: /demos/frontend-tools-async
    highlight:
      - src/app/demos/frontend-tools-async/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: readonly-state-agent-context
    name: "Shared State: Frontend Context"
    description: >-
      The frontend publishes read-only UI state (name, timezone, recent
      activity) to the OpenClaw agent via useAgentContext — the agent can read
      it but cannot modify it.
    tags:
      - agent-state
    route: /demos/readonly-state-agent-context
    highlight:
      - src/app/demos/readonly-state-agent-context/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: gen-ui-agent
    name: Agentic Generative UI
    description: >-
      The OpenClaw agent calls a structured generate_recipe tool; the frontend
      renders its arguments as a rich recipe card via useRenderTool.
    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    highlight:
      - src/app/demos/gen-ui-agent/page.tsx
      - src/app/demos/gen-ui-agent/recipe-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: gen-ui-tool-based
    name: Tool-Based Generative UI
    description: >-
      A frontend tool with a render function — the OpenClaw agent calls
      render_chart and the tool's render function draws a bar or pie chart inline
      from the arguments.
    tags:
      - generative-ui
    route: /demos/gen-ui-tool-based
    highlight:
      - src/app/demos/gen-ui-tool-based/page.tsx
      - src/app/demos/gen-ui-tool-based/chart-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering-default-catchall
    name: Tool Rendering (Default)
    description: >-
      Renders the OpenClaw agent's server-side tool calls (e.g. shell/read)
      inline using CopilotKit's built-in default tool-call card — zero custom
      renderers.
    tags:
      - agent-capabilities
    route: /demos/tool-rendering-default-catchall
    highlight:
      - src/app/demos/tool-rendering-default-catchall/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering-custom-catchall
    name: Tool Rendering (Custom Catch-all)
    description: >-
      A single branded wildcard renderer via useDefaultRenderTool — the same
      app-designed card paints every OpenClaw server-side tool call.
    tags:
      - agent-capabilities
    route: /demos/tool-rendering-custom-catchall
    highlight:
      - src/app/demos/tool-rendering-custom-catchall/page.tsx
      - src/app/demos/tool-rendering-custom-catchall/custom-catchall-renderer.tsx
      - src/app/api/copilotkit/route.ts
