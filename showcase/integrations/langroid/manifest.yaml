name: Langroid
slug: langroid
category: emerging
language: python
logo: /logos/langroid.svg
description: CopilotKit integration with Langroid
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/langroid
copilotkit_version: 2.0.0
backend_url: https://showcase-langroid-production.up.railway.app
deployed: true
sort_order: 140
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
not_supported_features:
  - shared-state-streaming
features:
  - cli-start
  - agentic-chat
  - hitl
  - hitl-in-app
  - hitl-in-chat
  - hitl-in-chat-booking
  - tool-rendering
  - gen-ui-agent
  - gen-ui-tool-based
  - shared-state-read-write
  - subagents
  - chat-customization-css
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - agentic-chat-reasoning
  - reasoning-default-render
  - readonly-state-agent-context
  - declarative-gen-ui
  - auth
  - headless-complete
  - agent-config
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - tool-rendering-reasoning-chain
  - open-gen-ui
  - open-gen-ui-advanced
  - voice
  - multimodal
  - byoc-hashbrown
  - byoc-json-render
  - mcp-apps
  - beautiful-chat
  - a2ui-fixed-schema
  - gen-ui-interrupt
  - interrupt-headless
agent_config_pattern: shared-state
interrupt_pattern: promise-based

a2ui_pattern: schema-loading
auth_pattern: runtime-onrequest
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to clone the canonical starter
    tags:
      - chat-ui
    command: "npx copilotkit@latest init --framework langroid"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl
    name: In-Chat Human in the Loop
    description: User approves agent actions before execution
    tags:
      - interactivity
    route: /demos/hitl
    animated_preview_url:
    highlight:
      - src/agents/agent.py
      - src/app/demos/hitl/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat HITL (useHumanInTheLoop — ergonomic API)
    description: Interactive approval/decision surface rendered inline in the chat via the high-level `useHumanInTheLoop` hook
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    animated_preview_url:
    highlight:
      - src/app/demos/hitl-in-chat/page.tsx
      - src/app/demos/hitl-in-chat/time-picker-card.tsx
      - src/app/api/copilotkit/route.ts
