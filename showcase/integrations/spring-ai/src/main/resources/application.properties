server.port=8000
# Fail-fast enforced by OpenAiApiKeyValidator — see Javadoc for why we can't use :?message syntax.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
# The showcase convention is that `OPENAI_BASE_URL` includes `/v1` (most SDKs
# expect a full base path). Spring-AI is the exception: it appends
# `/v1/chat/completions` itself, so feeding it the showcase-wide OPENAI_BASE_URL
# (e.g. http://aimock:4010/v1) produces http://aimock:4010/v1/v1/chat/completions.
# We expose a separate `SPRING_AI_OPENAI_BASE_URL` carrying only the host
# (e.g. http://aimock:4010 for local aimock, https://api.openai.com for the real API).
# Default stays on the real OpenAI API.
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=gpt-4.1
# Allow up to 5 tool-execution iterations per conversation turn. The D5
# fixtures require at least 3 (subagents: research -> writing -> critique).
# Cap=1 (the old default) caused returnDirect=true after the very first tool
# call, preventing the model from being re-invoked to produce a follow-up
# text response or to chain additional tool calls.
copilotkit.tool.max-iterations=${COPILOTKIT_TOOL_MAX_ITERATIONS:5}
# Force SimpleClientHttpRequestFactory (HttpURLConnection) instead of the default
# JdkClientHttpRequestFactory. The JDK HttpClient pools TCP connections and reuses
# them across requests. When Spring AI re-invokes the model after executing a tool
# call, it hits the pooled socket within milliseconds — before the async eviction
# from jdk.httpclient.keepalive.timeout=0 has a chance to close it, and before the
# server's Connection:close FIN propagates. The result is
# java.net.SocketException: Connection reset. SimpleClientHttpRequestFactory creates
# a fresh HttpURLConnection per request, sidestepping the pooling issue entirely.
# This only affects the synchronous RestClient path (.call()); the reactive WebClient
# path (.stream()) is handled by WebClientConfig's JDK HTTP/1.1 connector.
spring.http.client.factory=simple
