name: Spring AI
slug: spring-ai
category: enterprise-platform
language: java
logo: /logos/spring-ai.svg
description: >-
  CopilotKit integration with Spring AI. Java-based agent backend with full
  feature coverage including frontend tools, in-chat and in-app human-in-the-
  loop, generative UI, per-tool renderers, agent context, interrupt-adapted
  scheduling (Strategy B), per-token state streaming, and prebuilt chat
  surfaces (sidebar / popup / slots / headless).
  loop, generative UI, per-tool renderers, agent context, per-token state
  streaming, and prebuilt chat surfaces (sidebar / popup / slots / headless).
  Demos that depend on LangGraph-specific primitives (interrupt, multi-agent
  orchestration, MCP-driven UI) are documented as skipped in PARITY_NOTES.md.
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/spring-ai
copilotkit_version: 2.0.0
backend_url: https://showcase-spring-ai-production.up.railway.app
deployed: true
sort_order: 170
generative_ui:
  - constrained-explicit
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
not_supported_features:
  - shared-state-streaming
features:
  - cli-start
  - agentic-chat
  - agentic-chat-reasoning
  - reasoning-default-render
  - tool-rendering-reasoning-chain
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - chat-customization-css
  - frontend-tools
  - frontend-tools-async
  - gen-ui-agent
  - gen-ui-tool-based
  - open-gen-ui
  - open-gen-ui-advanced
  - declarative-gen-ui
  - a2ui-fixed-schema
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - headless-simple
  - headless-complete
  - beautiful-chat
  - readonly-state-agent-context
  - shared-state-read-write
  - subagents
  - auth
  - voice
  - multimodal
  - agent-config
  - hitl-in-chat
  - hitl-in-chat-booking
  - hitl-in-app
  - hitl
  - tool-rendering
  - mcp-apps
  - byoc-hashbrown
  - byoc-json-render
  - gen-ui-interrupt
  - interrupt-headless
a2ui_pattern: schema-inline
agent_config_pattern: shared-state
auth_pattern: runtime-onrequest
