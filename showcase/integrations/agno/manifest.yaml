name: Agno
slug: agno
category: emerging
language: python
logo: /logos/agno.svg
description: >-
  CopilotKit integration with Agno. Supports the full range of CopilotKit features
  including generative UI, shared state, human-in-the-loop, sub-agents, and streaming.
partner_docs: null
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/agno
copilotkit_version: 2.0.0
backend_url: https://showcase-agno-production.up.railway.app
deployed: true
sort_order: 90
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
features:
  - cli-start
  - agentic-chat
  - tool-rendering
  - gen-ui-agent
  - gen-ui-tool-based
  - shared-state-read-write
  - subagents
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - hitl
  - hitl-in-chat
  - hitl-in-chat-booking
  - hitl-in-app
  - readonly-state-agent-context
  - mcp-apps
  - open-gen-ui
  - open-gen-ui-advanced
  - agent-config
  - voice
  - multimodal
  - byoc-hashbrown
  - byoc-json-render
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - agentic-chat-reasoning
  - reasoning-default-render
  - tool-rendering-reasoning-chain
  - headless-complete
  - gen-ui-interrupt
  - interrupt-headless
  - auth
  - beautiful-chat
  - a2ui-fixed-schema
  - declarative-gen-ui
not_supported_features:
  - shared-state-streaming
agent_config_pattern: shared-state

a2ui_pattern: schema-loading
auth_pattern: runtime-onrequest
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to clone the canonical starter
    tags:
      - chat-ui
    command: "npx copilotkit@latest init --framework agno"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/agents/main.py
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering
    name: Tool Rendering
    description: Backend agent tools rendered as UI components
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - src/agents/main.py
      - tools/get_weather.py
      - tools/query_data.py
      - tools/schedule_meeting.py
      - tools/search_flights.py
      - src/app/demos/tool-rendering/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: gen-ui-agent
    name: Agentic Generative UI
    description: Long-running agent tasks with generated UI
    tags:
      - generative-ui
    route: /demos/gen-ui-agent
    animated_preview_url:
    highlight:
      - src/agents/main.py
      - src/app/demos/gen-ui-agent/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: shared-state-streaming
