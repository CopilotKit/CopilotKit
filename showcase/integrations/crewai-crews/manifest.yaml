    route: /demos/a2ui-fixed-schema
    animated_preview_url:
    highlight:
      - src/agents/a2ui_fixed.py
      - src/app/demos/a2ui-fixed-schema/page.tsx
      - src/app/demos/a2ui-fixed-schema/a2ui/catalog.ts
