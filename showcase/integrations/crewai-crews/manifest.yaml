      - generative-ui
    route: /demos/byoc-hashbrown
    animated_preview_url:
  - id: byoc-json-render
    name: BYOC (json-render)
    description: Flat {root, elements} spec rendered by @json-render/react against a Zod catalog
    tags:
      - generative-ui
    route: /demos/byoc-json-render
    animated_preview_url:
  - id: beautiful-chat
    name: Beautiful Chat
    description: Flagship showcase - polished brand-styled chat with A2UI, Open Generative UI, and shared-state todos
    tags:
      - chat-ui
    route: /demos/beautiful-chat
  - id: mcp-apps
    name: MCP Apps
    description: MCP server-driven UI via activity renderers
    tags:
      - generative-ui
    route: /demos/mcp-apps
    animated_preview_url:
    highlight:
