name: Mastra
slug: mastra
category: popular
language: typescript
logo: /logos/mastra.svg
description: >-
  TypeScript-native agent framework with built-in tool management,
  agent memory, and workflow orchestration. Integrates with CopilotKit
  via the AG-UI protocol adapter.
partner_docs: https://docs.copilotkit.ai/integrations/mastra
repo: https://github.com/CopilotKit/CopilotKit/tree/main/showcase/integrations/mastra
copilotkit_version: 2.0.0
backend_url: https://showcase-mastra-production.up.railway.app
deployed: true
sort_order: 20
generative_ui:
  - constrained-explicit
  - a2ui-fixed-schema
  - a2ui-dynamic-schema
interaction_modalities:
  - sidebar
  - embedded
  - chat
managed_platform:
  name: Mastra Cloud
  url: https://mastra.ai/cloud
not_supported_features:
  - shared-state-streaming
features:
  - cli-start
  - agentic-chat
  - hitl-in-chat
  - hitl-in-app
  - tool-rendering
  - tool-rendering-default-catchall
  - tool-rendering-custom-catchall
  - gen-ui-agent
  - readonly-state-agent-context
  - prebuilt-sidebar
  - prebuilt-popup
  - chat-slots
  - chat-customization-css
  - headless-simple
  - frontend-tools
  - frontend-tools-async
  - agentic-chat-reasoning
  - reasoning-default-render
  - agent-config
  - declarative-gen-ui
  - a2ui-fixed-schema
  - headless-complete
  - auth
  - shared-state-read-write
  - subagents
  - beautiful-chat
  - byoc-hashbrown
  - byoc-json-render
  - multimodal
  - open-gen-ui
  - open-gen-ui-advanced
  - voice
  - gen-ui-tool-based
  - hitl
  - hitl-in-chat-booking
  - mcp-apps
  - tool-rendering-reasoning-chain
  - gen-ui-interrupt
  - interrupt-headless
a2ui_pattern: llm-driven
agent_config_pattern: shared-state
auth_pattern: runtime-onrequest
demos:
  - id: cli-start
    name: CLI Start Command
    description: Copy-paste command to scaffold the canonical Mastra starter
    tags:
      - chat-ui
    command: "npx degit CopilotKit/CopilotKit/showcase/integrations/mastra my-copilotkit-app"
  - id: agentic-chat
    name: Agentic Chat
    description: Natural conversation with frontend tool execution
    tags:
      - chat-ui
    route: /demos/agentic-chat
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/mastra/tools/index.ts
      - src/app/demos/agentic-chat/page.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-chat
    name: In-Chat HITL (useHumanInTheLoop — ergonomic API)
    description: Interactive approval/decision surface rendered inline in the chat via the high-level `useHumanInTheLoop` hook
    tags:
      - interactivity
    route: /demos/hitl-in-chat
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/app/demos/hitl-in-chat/page.tsx
      - src/app/demos/hitl-in-chat/time-picker-card.tsx
      - src/app/api/copilotkit/route.ts
  - id: hitl-in-app
    name: In-App Human in the Loop (Frontend Tools + async HITL)
    description: Agent requests approval via useFrontendTool with an async handler; the approval UI pops up as an app-level modal OUTSIDE the chat
    tags:
      - interactivity
    route: /demos/hitl-in-app
    animated_preview_url:
    highlight:
      - src/mastra/agents/index.ts
      - src/app/demos/hitl-in-app/page.tsx
      - src/app/demos/hitl-in-app/approval-dialog.tsx
      - src/app/api/copilotkit/route.ts
  - id: tool-rendering
    name: Tool Rendering
    description: Custom per-tool renderers plus a wildcard catch-all for every other tool
    tags:
      - agent-capabilities
    route: /demos/tool-rendering
    animated_preview_url:
    highlight:
      - src/mastra/tools/index.ts
      - shared-tools/get-weather.ts
      - shared-tools/query-data.ts
      - shared-tools/schedule-meeting.ts
      - shared-tools/search-flights.ts
