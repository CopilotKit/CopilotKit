<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CopilotKit Web Inspector Standalone</title>
    <script type="module" src="/main.ts"></script>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f7f7f9;
        color: #010507;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid #dbdbe5;
        background: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
      }

      p {
        margin: 4px 0 0;
        color: #57575b;
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid #dbdbe5;
        border-radius: 6px;
        background: #ffffff;
        color: #010507;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 7px 10px;
      }

      button:hover {
        border-color: #bec2ff;
      }

      .scenario-copy {
        min-width: min(360px, 100%);
        text-align: right;
      }

      .scenario-copy strong {
        display: block;
        font-size: 12px;
      }

      .scenario-copy span {
        display: block;
        max-width: 460px;
        color: #57575b;
        font-size: 11px;
        line-height: 1.35;
      }

      #thread-inspector-host,
      #threads-lab-host {
        min-height: 0;
        padding: 16px;
      }

      cpk-thread-inspector {
        display: block;
        height: calc(100vh - 98px);
        min-height: 520px;
        border: 1px solid #dbdbe5;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
      }

      #threads-lab-host {
        position: relative;
        min-height: calc(100vh - 76px);
        overflow: hidden;
      }

      cpk-web-inspector {
        position: absolute;
        inset: 16px;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Web Inspector Standalone QA</h1>
          <p>
            Local-only harness for real Inspector UI with mocked runtime state.
          </p>
        </div>
        <div class="toolbar">
          <div class="controls" aria-label="Harness mode">
            <button type="button" data-mode="threads-lab">
              Threads tab states
            </button>
            <button type="button" data-mode="thread-detail">
              Thread detail
            </button>
          </div>
          <div
            class="controls"
            data-controls="threads-lab"
            aria-label="Threads tab scenarios"
          ></div>
          <div
            class="controls"
            data-controls="thread-detail"
            aria-label="Thread detail scenarios"
          >
            <button type="button" data-scenario="events">AG-UI events</button>
            <button type="button" data-scenario="messages">
              Messages only
            </button>
            <button type="button" data-scenario="raw">Raw event only</button>
          </div>
          <div class="scenario-copy">
            <strong id="scenario-title"></strong>
            <span id="scenario-description"></span>
          </div>
        </div>
      </header>
      <section id="threads-lab-host"></section>
      <section id="thread-inspector-host"></section>
    </main>
  </body>
</html>
